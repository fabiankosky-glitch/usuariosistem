<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Administración - En Construcción</title>
    <script type="module">
        import { auth } from './firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = 'login.html';
            }
        });
    </script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; text-align: center; padding: 50px; }
        h1 { color: #2c3e50; }
        p { color: #7f8c8d; }
        .btn-back { background: none; border: 1px solid #999; padding: 10px 20px; border-radius: 8px; cursor: pointer; text-decoration: none; color: #333; }
    </style>
</head>
<body>
    <h1><i class="fas fa-cogs"></i> Administración</h1>
    <p>Esta sección está actualmente en construcción.</p>
    <button onclick="window.location.href='index.html'" class="btn-back">⬅️ Volver al Menú Principal</button>
</body>
</html>
