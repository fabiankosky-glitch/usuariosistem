<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administración - Fundación NC</title>
    <!-- MOTOR DE SEGURIDAD E2EE -->
    <script src="https://cloudflare.com"></script>
    <style>
        :root { --primary: #0f3460; --bg: #1a1a2e; --white: #ffffff; --accent: #27ae60; --danger: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }

        /* MODAL DE SEGURIDAD (VENTANA EMERGENTE) */
        #modalClave { position: fixed; z-index: 10000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(26, 26, 46, 0.98); display: flex; justify-content: center; align-items: center; backdrop-filter: blur(10px); }
        .modal-content { background: white; padding: 40px; border-radius: 25px; text-align: center; width: 90%; max-width: 400px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); border: 4px solid var(--primary); }
        .input-clave { width: 100%; padding: 15px; margin: 20px 0; border-radius: 12px; border: 2px solid #ddd; font-size: 24px; text-align: center; letter-spacing: 8px; box-sizing: border-box; }
        .btn-acceder { background: var(--primary); color: white; padding: 15px; width: 100%; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; }

        /* PANEL ADMINISTRATIVO (DESENFOCADO HASTA VALIDAR) */
        #panelMaestro { display: none; width: 90%; max-width: 1000px; background: var(--white); padding: 40px; border-radius: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); text-align: center; filter: blur(15px); transition: filter 0.6s ease; }

        .grid-admin { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; margin-top: 30px; }
        .btn-card { background: #fff; border: 2px solid #eee; padding: 45px 20px; border-radius: 20px; display: flex; flex-direction: column; align-items: center; text-decoration: none; color: var(--primary); transition: 0.3s; cursor: pointer; }
        .btn-card:hover { transform: translateY(-10px); border-color: var(--primary); box-shadow: 0 15px 30px rgba(15,52,96,0.2); background: #fcfcfc; }
        .btn-card i { font-size: 55px; margin-bottom: 20px; font-style: normal; }
        .btn-card span { font-weight: bold; text-transform: uppercase; font-size: 14px; letter-spacing: 1px; }
    </style>
</head>
<body>

<!-- VENTANA EMERGENTE DE ACCESO -->
<div id="modalClave">
    <div class="modal-content">
        <i style="font-size: 60px; font-style: normal;">🔐</i>
        <h2 style="color: var(--primary); margin-top: 15px;">ALTA DIRECCIÓN</h2>
        <p style="color: #666; font-size: 14px;">Identificación de Administrador requerida</p>
        <input type="password" id="passMaster" class="input-clave" placeholder="****" autofocus>
        <button class="btn-acceder" onclick="verificarAcceso()">DESCIFRAR PANEL</button>
        <button onclick="window.location.href='index.html'" style="background:none; border:none; color:var(--danger); margin-top:15px; cursor:pointer; font-weight:bold;">✖ VOLVER</button>
    </div>
</div>

<!-- PANEL PRINCIPAL -->
<div id="panelMaestro">
    <div style="border-bottom: 3px solid var(--primary); padding-bottom: 15px; margin-bottom: 30px;">
        <h1 style="color: var(--primary); margin: 0; letter-spacing: 1px;">⚙️ BÓVEDA ADMINISTRATIVA E2EE</h1>
        <small style="color: #666; font-weight: bold; text-transform: uppercase;">Control de Gestión - Nivel: Alta Gerencia</small>
    </div>

    <div class="grid-admin">
        <!-- 1. GESTIÓN DE TALENTO HUMANO -->
        <a href="gestion_talento.html" class="btn-card">
            <i>👥</i>
            <span>Gestión de Talento Humano</span>
        </a>

        <!-- 2. DATOS DE LA IPS -->
        <div class="btn-card" onclick="alert('Módulo Cifrado')">
            <i>🏥</i>
            <span>Configuración IPS (NIT/Hab)</span>
        </div>

        <!-- 3. TRAZABILIDAD -->
        <div class="btn-card" onclick="alert('Módulo Cifrado')">
            <i>📜</i>
            <span>Auditoría de Accesos</span>
        </div>

        <!-- 4. SEGURIDAD -->
        <div class="btn-card" onclick="alert('Módulo Cifrado')">
            <i>🔑</i>
            <span>Gestión de Llaves Máximas</span>
        </div>

        <!-- 5. ESTADÍSTICAS -->
        <div class="btn-card" onclick="alert('Módulo Cifrado')">
            <i>📊</i>
            <span>Estadísticas de Impacto</span>
        </div>
    </div>

    <div style="margin-top: 40px;">
        <button onclick="window.location.href='index.html'" style="background:#f8f9fa; border:1px solid #ddd; padding:12px 25px; border-radius:12px; color:var(--primary); font-weight:bold; cursor:pointer;">
            ⬅ CERRAR SESIÓN ADMINISTRATIVA
        </button>
    </div>
</div>

<script>
    const LLAVE_MAESTRA = "ADMIN2024*"; // Tu clave de acceso

    function verificarAcceso() {
        const input = document.getElementById("passMaster").value;
        if (input === LLAVE_MAESTRA) {
            document.getElementById("modalClave").style.display = "none";
            const panel = document.getElementById("panelMaestro");
            panel.style.display = "block";
            setTimeout(() => { panel.style.filter = "blur(0px)"; }, 50);
        } else {
            alert("❌ Llave incorrecta");
            document.getElementById("passMaster").value = "";
        }
    }

    // Enter para entrar
    document.getElementById("passMaster").addEventListener("keyup", (e) => {
        if (e.key === "Enter") verificarAcceso();
    });
</script>

</body>
</html>
