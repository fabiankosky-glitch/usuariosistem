<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Folder Terapéutico</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; text-align: center; }
        .header { background: #27ae60; color: white; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .btn-accion { width: 80%; max-width: 300px; padding: 15px; margin: 10px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn-add { background: #2ecc71; }
        .btn-show { background: #34495e; }
        
        /* Contenedor de Formulario (Oculto al inicio) */
        #seccionAgregar { display: none; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-top: 20px; }
        textarea { width: 100%; height: 100px; margin-top: 10px; border-radius: 5px; border: 1px solid #ddd; padding: 10px; }
        
        /* Estilo para el historial */
        #historial { margin-top: 20px; text-align: left; max-width: 500px; margin-left: auto; margin-right: auto; }
        .registro-card { background: #fff; padding: 15px; border-radius: 8px; margin-bottom: 10px; border-left: 5px solid #27ae60; position: relative; }
        .lock-icon { position: absolute; right: 10px; top: 10px; font-size: 18px; }
    </style>
</head>
<body>

    <div class="header">
        <h2 id="nombrePaciente">Cargando...</h2>
        <p>📁 Folder Terapéutico</p>
    </div>

    <!-- BOTONES PRINCIPALES -->
    <button class="btn-accion btn-add" onclick="mostrarFormulario()">➕ Agregar Evolución</button>
    <button class="btn-accion btn-show" onclick="cargarHistorial()">👁️ Mostrar Historial</button>

    <!-- SECCIÓN PARA AGREGAR (Cámara + Texto) -->
    <div id="seccionAgregar">
        <h3>Nueva Entrada</h3>
        <p>1. Capture Documento/Evidencia:</p>
        <input type="file" accept="image/*" capture="camera" id="fotoEvidencia" style="margin-bottom: 15px;">
        
        <p>2. Redacte la Evolución:</p>
        <textarea id="textoEvolucion" placeholder="Escriba aquí los avances..."></textarea>
        
        <button class="btn-accion btn-add" style="width:100%" onclick="guardarEnNube()">✅ Guardar y Bloquear</button>
        <button onclick="cerrarFormulario()" style="background:none; border:none; color:red; cursor:pointer;">Cancelar</button>
    </div>

    <!-- SECCIÓN PARA MOSTRAR DATOS -->
    <div id="historial"></div>

    <script type="module">
        import { initializeApp } from "https://gstatic.com";
        import { getFirestore, doc, getDoc, collection, addDoc, query, where, getDocs, orderBy } from "https://gstatic.com";

        const firebaseConfig = {
            apiKey: "AIzaSyC78y2m79f9764f-YTuPYfP",
            authDomain: "://firebaseapp.com",
            projectId: "caminosnuevosdatabase",
            storageBucket: "caminosnuevosdatabase.firebasestorage.app",
            appId: "1:907500835423:web:f56b459ab4d57d92a81ea"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Obtener ID del paciente desde la URL
        const urlParams = new URLSearchParams(window.location.search);
        const pacienteId = urlParams.get('id');

        // Cargar nombre del paciente al iniciar
        async function obtenerNombre() {
            const docRef = doc(db, "pacientes", pacienteId);
            const docSnap = await getDoc(docRef);
            if (docSnap.exists()) {
                document.getElementById("nombrePaciente").innerText = docSnap.data().nombre;
            }
        }
        obtenerNombre();

        // Funciones de Interfaz
        window.mostrarFormulario = () => {
            document.getElementById("seccionAgregar").style.display = "block";
            document.getElementById("historial").innerHTML = "";
        };
        window.cerrarFormulario = () => document.getElementById("seccionAgregar").style.display = "none";

        // GUARDAR EN LA NUBE
        window.guardarEnNube = async () => {
            const texto = document.getElementById("textoEvolucion").value;
            if(!texto) return alert("Por favor escriba la evolución");

            try {
                await addDoc(collection(db, "evoluciones_terapeuticas"), {
                    idPaciente: pacienteId,
                    evolucion: texto,
                    fecha: Date.now(),
                    tipo: "Terapéutico",
                    bloqueado: true
                });
                alert("Registro Guardado Exitosamente");
                location.reload(); // Recargar para limpiar todo
            } catch (e) {
                alert("Error al guardar: " + e.message);
            }
        };

        // CARGAR HISTORIAL
        window.cargarHistorial = async () => {
            const container = document.getElementById("historial");
            container.innerHTML = "Cargando historial...";
            document.getElementById("seccionAgregar").style.display = "none";

            const q = query(
                collection(db, "evoluciones_terapeuticas"), 
                where("idPaciente", "==", pacienteId),
                orderBy("fecha", "desc")
            );

            const querySnapshot = await getDocs(q);
            container.innerHTML = "";

            querySnapshot.forEach((doc) => {
                const data = doc.data();
                const fecha = new Date(data.fecha).toLocaleDateString();
                container.innerHTML += `
                    <div class="registro-card">
                        <span class="lock-icon">🔒</span>
                        <strong>Fecha: ${fecha}</strong><br>
                        <p>${data.evolucion}</p>
                    </div>`;
            });
        });
    </script>
</body>
</html>
