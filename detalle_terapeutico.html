<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Folder Terapéutico</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; text-align: center; padding: 20px; }
        .card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 500px; margin: 0 auto; }
        h2, h3 { color: #2c3e50; }
        
        /* Botones de Menú Principal */
        .btn-menu { width: 90%; max-width: 350px; padding: 20px; margin: 10px; border: none; border-radius: 12px; color: white; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-add { background: #27ae60; }
        .btn-show { background: #2980b9; }
        .btn-menu:hover { opacity: 0.9; transform: scale(1.02); }

        /* Formulario y Inputs */
        select, textarea { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
        textarea { height: 120px; resize: none; }
        .preview-camera { background: black; width: 100%; height: 200px; border-radius: 10px; margin: 10px 0; display: flex; align-items: center; justify-content: center; color: white; overflow: hidden; }
        
        /* Botones de acción dentro de secciones */
        .btn-accion { width: 100%; padding: 15px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        /* Historial */
        .registro-item { background: #fff; padding: 15px; border-radius: 10px; margin-bottom: 15px; text-align: left; border-left: 6px solid #27ae60; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

    <div id="header">
        <h2 id="nombrePaciente">Cargando Paciente...</h2>
        <hr style="width: 50%; border: 1px solid #ddd;">
    </div>

    <!-- 1. MENÚ DE INICIO (Los dos botones comunes) -->
    <div id="menuPrincipal">
        <button class="btn-menu btn-add" onclick="abrirFormulario()">➕ Nueva Evolución</button>
        <button class="btn-menu btn-show" onclick="verHistorial()">👁️ Ver Historial Terapéutico</button>
        <br><br>
        <a href="historias.html" style="text-decoration:none; color:#7f8c8d; font-weight:bold;">⬅ Volver a Pacientes</a>
    </div>

    <!-- 2. SECCIÓN AGREGAR (Cámara + Evolución) -->
    <div id="seccionAgregar" style="display: none;" class="card">
        <h3>📓 Nueva Evolución</h3>
        
        <label>Modalidad de Terapia:</label>
        <select id="modalidad">
            <option>Individual</option>
            <option>De Grupo</option>
            <option>Confrontación</option>
            <option>Feedback</option>
        </select>

        <!-- 1. CÁMARA CORREGIDA: Usamos <video> para ver la imagen en vivo -->
        <div class="preview-camera" style="background: #000; border-radius: 10px; overflow: hidden; height: 250px; display: flex; align-items: center; justify-content: center;">
            <video id="video" autoplay playsinline style="width:100%; height:100%; object-fit:cover;"></video>
            <img id="imgPreview" style="width:100%; height:100%; object-fit:cover; display:none;">
            <canvas id="canvas" style="display:none;"></canvas>
        </div>

        <!-- El botón ahora ejecuta la captura del video -->
        <button class="btn-accion" style="background:#3498db" onclick="window.tomarFoto()">📸 Tomar Foto de Documento</button>

        <textarea id="textoEvolucion" placeholder="Escriba aquí la evolución del paciente..."></textarea>

        <button class="btn-accion" style="background:#27ae60" onclick="window.guardarRegistro()">🚀 Guardar Registro Protegido</button>
        <button class="btn-accion" style="background:#95a5a6" onclick="window.volver()">Cancelar</button>
    </div>

    <!-- 3. SECCIÓN MOSTRAR (Historial) -->
    <div id="seccionHistorial" style="display: none;" class="card">
        <h3>📋 Evoluciones Guardadas</h3>
        <div id="listaEvoluciones">Buscando registros...</div>
        <button class="btn-accion" style="background:#95a5a6" onclick="window.volver()">Volver al Menú</button>
    </div>

   <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, where, getDocs, orderBy, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        const firebaseConfig = {
            apiKey: "AIzaSyC78y2m79f9764f-YTuPYfP",
            authDomain: "caminosnuevosdatabase.firebaseapp.com",
            projectId: "caminosnuevosdatabase",
            storageBucket: "caminosnuevosdatabase.firebasestorage.app",
            appId: "1:907500835423:web:f56b459ab4d57d92a81ea"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const params = new URLSearchParams(window.location.search);
        const idPaciente = params.get("id");
        let fotoBase64 = null;
        let streamActivo = null;

        // 1. CARGAR DATOS (Se ejecuta al abrir la página)
        async function cargarDatosPaciente() {
            if (!idPaciente) return;
            try {
                const snap = await getDoc(doc(db, "pacientes", idPaciente));
                if (snap.exists()) {
                    document.getElementById("nombrePaciente").innerText = snap.data().nombre;
                }
            } catch (e) { console.error("Error cargando nombre:", e); }
        }
        cargarDatosPaciente();

        // 2. NAVEGACIÓN: ABRIR FORMULARIO Y PRENDER CÁMARA
        window.abrirFormulario = () => {
            document.getElementById("menuPrincipal").style.display = "none";
            document.getElementById("seccionAgregar").style.display = "block";
            
            // Solo pedimos la cámara AQUÍ para que los botones no se bloqueen antes
            const video = document.getElementById('video');
            navigator.mediaDevices.getUserMedia({ video: true })
                .then(stream => { 
                    streamActivo = stream;
                    video.srcObject = stream; 
                })
                .catch(err => {
                    alert("Cámara bloqueada. Por favor permite el acceso en el candado de la barra de direcciones.");
                });
        };

        // 3. NAVEGACIÓN: VER HISTORIAL
        window.verHistorial = async () => {
            document.getElementById("menuPrincipal").style.display = "none";
            document.getElementById("seccionHistorial").style.display = "block";
            const lista = document.getElementById("listaEvoluciones");
            lista.innerHTML = "Buscando registros...";

            try {
                const q = query(collection(db, "evoluciones_terapeuticas"), where("idPaciente", "==", idPaciente), orderBy("fecha", "desc"));
                const querySnapshot = await getDocs(q);
                lista.innerHTML = querySnapshot.empty ? "No hay registros aún." : "";
                
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const fechaTexto = new Date(data.fecha).toLocaleString();
                    lista.innerHTML += `
                        <div class="registro-item" style="display:flex; justify-content:space-between; align-items:center; padding:12px; border-bottom:1px solid #eee; background:white; margin-bottom:5px; border-radius:8px;">
                            <div style="text-align:left;">
                                <strong>📅 ${fechaTexto}</strong><br>
                                <small style="color:#7f8c8d;">🏷️ ${data.modalidad}</small>
                            </div>
                            <button onclick="verDetalleCompleto('${data.modalidad}', '${data.fecha}', \`${data.texto}\`, '${data.fotoDoc || ""}')" 
                                    style="background:#2980b9; color:white; border:none; padding:8px 15px; border-radius:6px; cursor:pointer;">
                                👁️ Ver
                            </button>
                        </div>`;
                });
            } catch (e) { lista.innerHTML = "Error al cargar historial."; }
        };

        // 4. LÓGICA DE CAPTURA Y GUARDADO
        window.tomarFoto = () => {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            fotoBase64 = canvas.toDataURL('image/jpeg', 0.5);
            
            document.getElementById('imgPreview').src = fotoBase64;
            document.getElementById('imgPreview').style.display = "block";
            video.style.display = "none";
            alert("📸 Captura lista");
        };

        window.guardarRegistro = async () => {
            const texto = document.getElementById("textoEvolucion").value;
            const mod = document.getElementById("modalidad").value;

            if (!texto) return alert("Escriba la evolución.");
            if (!fotoBase64) return alert("Tome la foto del documento.");

            try {
                await addDoc(collection(db, "evoluciones_terapeuticas"), {
                    idPaciente, modalidad: mod, texto, fotoDoc: fotoBase64, fecha: Date.now()
                });
                alert("✅ Guardado con éxito");
                window.location.reload();
            } catch (e) { alert("Error al guardar en Firebase."); }
        };

        window.volver = () => {
            if (streamActivo) streamActivo.getTracks().forEach(t => t.stop());
            window.location.reload(); 
        };

        // 5. REPORTE DETALLADO (Popup)
        window.verDetalleCompleto = (mod, fechaRaw, texto, foto) => {
            const win = window.open("", "_blank", "width=600,height=800");
            const fecha = new Date(Number(fechaRaw)).toLocaleString();
            win.document.write(`
                <html><body style="font-family:sans-serif; padding:20px; background:#f4f7f6;">
                    <div style="background:white; padding:20px; border-radius:10px;">
                        <h2 style="color:#2980b9;">Reporte de Evolución</h2>
                        <p><b>Fecha:</b> ${fecha} | <b>Modalidad:</b> ${mod}</p>
                        <hr><p style="white-space:pre-wrap;">${texto}</p>
                        ${foto ? `<img src="${foto}" style="width:100%; border-radius:10px; margin-top:10px;">` : ""}
                        <br><button onclick="window.close()" style="margin-top:20px; padding:10px; cursor:pointer;">Cerrar</button>
                    </div>
                </body></html>`);
        };
    </script>
