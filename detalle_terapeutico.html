<!DOCTYPE html>
<html>
<head>
    <title>Evolución Terapéutica</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f7f6; text-align: center; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        select, textarea, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; }
        button { background: #27ae60; color: white; border: none; font-weight: bold; cursor: pointer; }
        #btnCamara { background: #2980b9; }
        video, canvas { width: 100%; border-radius: 10px; background: #000; }
        canvas { display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>📓 Nueva Evolución Terapéutica</h2>
    
    <label>Modalidad de Terapia:</label>
    <select id="modalidad">
        <option value="Individual">Individual</option>
        <option value="Grupo">De Grupo</option>
        <option value="Confrontacion">Confrontación</option>
        <option value="Feedback">Feedback</option>
    </select>

    <video id="video" autoplay playsinline></video>
    <button id="btnCamara">📸 Tomar Foto de Documento</button>
    <canvas id="canvas"></canvas>

    <textarea id="evolucion" rows="5" placeholder="Escribe la evolución aquí..."></textarea>
    
    <button id="btnGuardar">🚀 Guardar Registro Protegido</button>
</div>

<script type="module">
    // Aquí iría tu configuración de Firebase (la misma que usaste en index.html)
    // ...
    
    let fotoDocumento = null;
    const video = document.getElementById('video');
    
    // Encender cámara
    navigator.mediaDevices.getUserMedia({ video: true }).then(s => video.srcObject = s);

    // Capturar foto
    document.getElementById('btnCamara').onclick = () => {
        const canvas = document.getElementById('canvas');
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        fotoDocumento = canvas.toDataURL('image/jpeg', 0.5);
        alert("Foto del documento capturada ✅");
    };

    // Lógica de Guardado con Bloqueo
    document.getElementById('btnGuardar').onclick = async () => {
        const nota = document.getElementById('evolucion').value;
        const mod = document.getElementById('modalidad').value;

        if(!nota || !fotoDocumento) return alert("Falta la foto o la nota");

        try {
            // Guardamos en una subcolección dentro del paciente
            // Esto lo hace "inmodificable" por la lógica que definiremos
            alert("Guardando evolución... Registro bloqueado legalmente.");
            // Aquí va el push a Firebase
            location.href = "menu.html"; 
        } catch(e) { alert("Error: " + e.message); }
    };
</script>
</body>
</html>
