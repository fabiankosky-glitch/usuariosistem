<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Folder Terapéutico</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; text-align: center; padding: 20px; }
        .card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 500px; margin: 0 auto; }
        h2, h3 { color: #2c3e50; }
        
        /* Botones de Menú Principal */
        .btn-menu { width: 90%; max-width: 350px; padding: 20px; margin: 10px; border: none; border-radius: 12px; color: white; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-add { background: #27ae60; }
        .btn-show { background: #2980b9; }
        .btn-menu:hover { opacity: 0.9; transform: scale(1.02); }

        /* Formulario y Inputs */
        select, textarea { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
        textarea { height: 120px; resize: none; }
        .preview-camera { background: black; width: 100%; height: 200px; border-radius: 10px; margin: 10px 0; display: flex; align-items: center; justify-content: center; color: white; overflow: hidden; }
        
        /* Botones de acción dentro de secciones */
        .btn-accion { width: 100%; padding: 15px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        /* Historial */
        .registro-item { background: #fff; padding: 15px; border-radius: 10px; margin-bottom: 15px; text-align: left; border-left: 6px solid #27ae60; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

    <div id="header">
        <h2 id="nombrePaciente">Cargando Paciente...</h2>
        <hr style="width: 50%; border: 1px solid #ddd;">
    </div>

    <!-- 1. MENÚ DE INICIO (Los dos botones comunes) -->
    <div id="menuPrincipal">
        <button class="btn-menu btn-add" onclick="abrirFormulario()">➕ Nueva Evolución</button>
        <button class="btn-menu btn-show" onclick="verHistorial()">👁️ Ver Historial Terapéutico</button>
        <br><br>
        <a href="historias.html" style="text-decoration:none; color:#7f8c8d; font-weight:bold;">⬅ Volver a Pacientes</a>
    </div>

    <!-- 2. SECCIÓN AGREGAR (Cámara + Evolución) -->
    <div id="seccionAgregar" style="display: none;" class="card">
        <h3>📓 Nueva Evolución</h3>
        
        <label>Modalidad de Terapia:</label>
        <select id="modalidad">
            <option>Individual</option>
            <option>De Grupo</option>
            <option>Confrontación</option>
            <option>Feedback</option>
        </select>

        <div class="preview-camera">
            <span id="txtCamara">Cámara no iniciada</span>
            <img id="imgPreview" style="width:100%; height:100%; object-fit:cover; display:none;">
        </div>

        <input type="file" accept="image/*" capture="camera" id="inputCamara" style="display:none;" onchange="previsualizarFoto(event)">
        <button class="btn-accion" style="background:#3498db" onclick="document.getElementById('inputCamara').click()">📸 Tomar Foto de Documento</button>

        <textarea id="textoEvolucion" placeholder="Escriba aquí la evolución del paciente..."></textarea>

        <button class="btn-accion" style="background:#27ae60" onclick="guardarRegistro()">🚀 Guardar Registro Protegido</button>
        <button class="btn-accion" style="background:#95a5a6" onclick="volver()">Cancelar</button>
    </div>

    <!-- 3. SECCIÓN MOSTRAR (Historial) -->
    <div id="seccionHistorial" style="display: none;" class="card">
        <h3>📋 Evoluciones Guardadas</h3>
        <div id="listaEvoluciones">Buscando registros...</div>
        <button class="btn-accion" style="background:#95a5a6" onclick="volver()">Volver al Menú</button>
    </div>

   <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, where, getDocs, orderBy, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        const firebaseConfig = {
            apiKey: "AIzaSyC78y2m79f9764f-YTuPYfP",
            authDomain: "://firebaseapp.com",
            projectId: "caminosnuevosdatabase",
            storageBucket: "caminosnuevosdatabase.firebasestorage.app",
            appId: "1:907500835423:web:f56b459ab4d57d92a81ea"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Obtener el ID del paciente de la URL
        const params = new URLSearchParams(window.location.search);
        const idPaciente = params.get("id");

        // Cargar nombre del paciente
        async function cargarDatosPaciente() {
            if (!idPaciente) return;
            const snap = await getDoc(doc(db, "pacientes", idPaciente));
            if (snap.exists()) {
                document.getElementById("nombrePaciente").innerText = snap.data().nombre;
            }
        }
        cargarDatosPaciente();

        // --- NAVEGACIÓN ---
        window.abrirFormulario = () => {
            document.getElementById("menuPrincipal").style.display = "none";
            document.getElementById("seccionAgregar").style.display = "block";
        };

        window.verHistorial = async () => {
            document.getElementById("menuPrincipal").style.display = "none";
            document.getElementById("seccionHistorial").style.display = "block";
            
            const lista = document.getElementById("listaEvoluciones");
            lista.innerHTML = "Cargando...";

            try {
                const q = query(collection(db, "evoluciones_terapeuticas"), where("idPaciente", "==", idPaciente), orderBy("fecha", "desc"));
                const querySnapshot = await getDocs(q);
                
                lista.innerHTML = "";
                if (querySnapshot.empty) {
                    lista.innerHTML = "No hay registros aún.";
                    return;
                }

                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const fechaTexto = new Date(data.fecha).toLocaleString();
                    
                    // Miniatura de la foto si existe
                    const fotoMini = data.fotoDoc ? `<img src="${data.fotoDoc}" style="width:40px; height:40px; border-radius:5px; object-fit:cover; margin-right:10px; border:1px solid #ddd;">` : "";

                    lista.innerHTML += `
                        <div class="registro-item" style="display:flex; justify-content:space-between; align-items:center; padding:10px; border-bottom:1px solid #eee;">
                            <div style="text-align:left; display:flex; align-items:center;">
                                ${fotoMini}
                                <div>
                                    <strong>📅 ${fechaTexto}</strong><br>
                                    <small>🏷️ ${data.modalidad}</small>
                                </div>
                            </div>
                            <button onclick="verDetalleCompleto('${data.modalidad}', '${data.fecha}', \`${data.texto}\`, '${data.fotoDoc || ""}')" 
                                    style="background:#2980b9; color:white; border:none; padding:8px 15px; border-radius:6px; cursor:pointer; font-weight:bold;">
                                👁️ Ver
                            </button>
                        </div>`;
                });
            } catch (e) {
                lista.innerHTML = "Error al cargar: " + e.message;
            }
        };

        // ESTA FUNCIÓN ES LA QUE ABRE LA VENTANA CON EL DOCUMENTO
        window.verDetalleCompleto = (mod, fechaRaw, texto, foto) => {
            const fecha = new Date(Number(fechaRaw)).toLocaleString();
            const win = window.open("", "_blank", "width=600,height=800");
            win.document.write(`
                <html>
                <head><title>Detalle de Evolución</title></head>
                <body style="font-family:sans-serif; padding:30px; line-height:1.6; color:#333;">
                    <div style="text-align:center; border-bottom:2px solid #2980b9; padding-bottom:10px; margin-bottom:20px;">
                        <h2 style="margin:0; color:#2980b9;">📄 Evolución Terapéutica</h2>
                        <p style="margin:5px 0;"><strong>Modalidad:</strong> ${mod} | <strong>Fecha:</strong> ${fecha}</p>
                    </div>
                    <div style="background:#f9f9f9; padding:15px; border-radius:8px; border:1px solid #eee; min-height:100px; white-space:pre-wrap;">${texto}</div>
                    ${foto ? `<div style="margin-top:20px; text-align:center;"><p><strong>Evidencia Adjunta:</strong></p><img src="${foto}" style="width:100%; border-radius:10px; box-shadow:0 4px 8px rgba(0,0,0,0.2);"></div>` : ""}
                    <br><br>
                    <center><button onclick="window.close()" style="background:#95a5a6; color:white; border:none; padding:10px 20px; border-radius:5px; cursor:pointer; font-weight:bold;">Cerrar Documento</button></center>
                </body>
                </html>
            `);
        };
        window.volver = () => {
            document.getElementById("menuPrincipal").style.display = "block";
            document.getElementById("seccionAgregar").style.display = "none";
            document.getElementById("seccionHistorial").style.display = "none";
        };

        // --- LÓGICA DE CÁMARA Y GUARDADO ---
window.guardarRegistro = async () => {
    const texto = document.getElementById("textoEvolucion").value;
    const mod = document.getElementById("modalidad").value;
    const fotoData = document.getElementById("imgPreview").src; // Esto toma la foto de la cámara

    if (!texto) return alert("Escriba la evolución antes de guardar.");

    try {
        await addDoc(collection(db, "evoluciones_terapeuticas"), {
            idPaciente: idPaciente,
            modalidad: mod,
            texto: texto,
            fotoDoc: fotoData, // Guardamos la foto como texto largo (Base64)
            fecha: Date.now(),
            bloqueado: true
        });
        alert("✅ Registro y Foto guardados correctamente.");
        volver();
    } catch (e) {
        alert("Error al guardar: " + e.message);
    }
};
    </script>
</body>
</html>
