<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Folder Terapéutico</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; text-align: center; padding: 20px; }
        .card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 500px; margin: 0 auto; }
        h2, h3 { color: #2c3e50; }
        .btn-menu { width: 90%; max-width: 350px; padding: 20px; margin: 10px; border: none; border-radius: 12px; color: white; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-add { background: #27ae60; }
        .btn-show { background: #2980b9; }
        select, textarea { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
        textarea { height: 120px; resize: none; }
        .preview-camera { background: black; width: 100%; height: 200px; border-radius: 10px; margin: 10px 0; display: flex; align-items: center; justify-content: center; color: white; overflow: hidden; border: 2px solid #ddd; }
        .btn-accion { width: 100%; padding: 15px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .registro-item { background: white; padding: 12px; border-radius: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #eee; }
    </style>
</head>
<body>

    <div id="header">
        <h2 id="nombrePaciente">Cargando Paciente...</h2>
        <hr style="width: 50%; border: 1px solid #ddd;">
    </div>

    <!-- 1. MENÚ DE INICIO -->
    <div id="menuPrincipal">
        <button class="btn-menu btn-add" onclick="abrirFormulario()">➕ Nueva Evolución</button>
        <button class="btn-menu btn-show" onclick="verHistorial()">👁️ Ver Historial Terapéutico</button>
        <br><br>
        <a href="historias.html" style="text-decoration:none; color:#7f8c8d; font-weight:bold;">⬅ Volver a Pacientes</a>
    </div>

    <!-- 2. SECCIÓN AGREGAR -->
    <div id="seccionAgregar" style="display: none;" class="card">
        <h3>📓 Nueva Evolución</h3>
        <select id="modalidad">
            <option>Individual</option>
            <option>De Grupo</option>
            <option>Confrontación</option>
            <option>Feedback</option>
        </select>

        <div class="preview-camera">
            <span id="txtCamara">Cámara no iniciada</span>
            <img id="imgPreview" style="width:100%; height:100%; object-fit:cover; display:none;">
        </div>

        <input type="file" accept="image/*" capture="camera" id="inputCamara" style="display:none;" onchange="window.previsualizarFoto(event)">
        <button class="btn-accion" style="background:#3498db" onclick="document.getElementById('inputCamara').click()">📸 Tomar Foto de Documento</button>

        <textarea id="textoEvolucion" placeholder="Escriba aquí la evolución..."></textarea>
        <button class="btn-accion" style="background:#27ae60" onclick="guardarRegistro()">🚀 Guardar Registro Protegido</button>
        <button class="btn-accion" style="background:#95a5a6" onclick="volver()">Cancelar</button>
    </div>

    <!-- 3. SECCIÓN MOSTRAR -->
    <div id="seccionHistorial" style="display: none;" class="card">
        <h3>📋 Evoluciones Guardadas</h3>
        <div id="listaEvoluciones">Buscando registros...</div>
        <button class="btn-accion" style="background:#95a5a6" onclick="volver()">Volver al Menú</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://gstatic.com";
        import { getFirestore, doc, getDoc, collection, addDoc, query, where, getDocs, orderBy } from "https://gstatic.com";

        const firebaseConfig = {
            apiKey: "AIzaSyC78y2m79f9764f-YTuPYfP",
            authDomain: "://firebaseapp.com",
            projectId: "caminosnuevosdatabase",
            storageBucket: "caminosnuevosdatabase.firebasestorage.app",
            appId: "1:907500835423:web:f56b459ab4d57d92a81ea"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const params = new URLSearchParams(window.location.search);
        const idPaciente = params.get("id");

        async function cargarDatosPaciente() {
            if (!idPaciente) return;
            const snap = await getDoc(doc(db, "pacientes", idPaciente));
            if (snap.exists()) document.getElementById("nombrePaciente").innerText = snap.data().nombre;
        }
        cargarDatosPaciente();

        window.abrirFormulario = () => {
            document.getElementById("menuPrincipal").style.display = "none";
            document.getElementById("seccionAgregar").style.display = "block";
        };

        window.volver = () => {
            document.getElementById("menuPrincipal").style.display = "block";
            document.getElementById("seccionAgregar").style.display = "none";
            document.getElementById("seccionHistorial").style.display = "none";
        };

        // --- LÓGICA DE CÁMARA CORREGIDA ---
        window.previsualizarFoto = (event) => {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = document.getElementById("imgPreview");
                    const txt = document.getElementById("txtCamara");
                    img.src = e.target.result;
                    img.style.display = "block";
                    txt.style.display = "none";
                };
                reader.readAsDataURL(file);
            }
        };

        // --- GUARDADO UNIFICADO ---
        window.guardarRegistro = async () => {
            const texto = document.getElementById("textoEvolucion").value;
            const mod = document.getElementById("modalidad").value;
            const preview = document.getElementById("imgPreview");
            const fotoData = preview.style.display === "block" ? preview.src : "";

            if (!texto) return alert("Por favor, escriba la evolución.");

            try {
                await addDoc(collection(db, "evoluciones_terapeuticas"), {
                    idPaciente, modalidad: mod, texto, fotoDoc: fotoData, fecha: Date.now(), bloqueado: true
                });
                alert("✅ Registro guardado exitosamente.");
                location.reload();
            } catch (e) { alert("Error: " + e.message); }
        };

        // --- HISTORIAL ---
        window.verHistorial = async () => {
            document.getElementById("menuPrincipal").style.display = "none";
            document.getElementById("seccionHistorial").style.display = "block";
            const lista = document.getElementById("listaEvoluciones");
            lista.innerHTML = "Cargando...";

            try {
                const q = query(collection(db, "evoluciones_terapeuticas"), where("idPaciente", "==", idPaciente), orderBy("fecha", "desc"));
                const snap = await getDocs(q);
                lista.innerHTML = "";
                if (snap.empty) { lista.innerHTML = "No hay registros."; return; }

                snap.forEach((doc) => {
                    const d = doc.data();
                    const fechaT = new Date(d.fecha).toLocaleString();
                    const mini = d.fotoDoc ? `<img src="${d.fotoDoc}" style="width:40px; height:40px; border-radius:5px; object-fit:cover; margin-right:10px;">` : "📄 ";
                    
                    lista.innerHTML += `
                        <div class="registro-item">
                            <div style="display:flex; align-items:center;">${mini} <strong>${fechaT}</strong></div>
                            <button onclick="verDetalleCompleto('${d.modalidad}', '${d.fecha}', \`${d.texto}\`, '${d.fotoDoc || ""}')" style="background:#2980b9; color:white; border:none; padding:8px 15px; border-radius:6px; cursor:pointer; font-weight:bold;">👁️ Ver</button>
                        </div>`;
                });
            } catch (e) { lista.innerHTML = "Error: " + e.message; }
        };

        // --- DETALLE FINAL ---
        window.verDetalleCompleto = (mod, fechaRaw, texto, foto) => {
            const nombre = document.getElementById("nombrePaciente").innerText;
            const win = window.open("", "_blank", "width=650,height=850");
            win.document.write(`
                <html><body style="font-family:sans-serif; padding:30px; line-height:1.6; background:#f4f7f6;">
                    <div style="background:white; padding:20px; border-radius:10px; box-shadow:0 5px 15px rgba(0,0,0,0.1); max-width:600px; margin:auto;">
                        <h2 style="color:#2980b9; text-align:center; border-bottom:2px solid #2980b9; padding-bottom:10px;">📄 REPORTE: ${nombre}</h2>
                        <p><strong>Fecha:</strong> ${new Date(Number(fechaRaw)).toLocaleString()} | <strong>Modalidad:</strong> ${mod}</p>
                        <div style="background:#f9f9f9; padding:15px; border-radius:8px; border:1px solid #eee; white-space:pre-wrap;">${texto}</div>
                        ${foto ? `<div style="margin-top:20px; text-align:center;"><p><strong>Evidencia:</strong></p><img src="${foto}" style="width:100%; border-radius:10px; border:1px solid #ddd;"></div>` : ""}
                        <br><center><button onclick="window.close()" style="background:#95a5a6; color:white; border:none; padding:10px 20px; border-radius:5px; font-weight:bold;">Cerrar</button></center>
                    </div>
                </body></html>`);
        };
    </script>
</body>
</html>
