<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Talento Humano E2EE - Fundación NC</title>
    
    <!-- MOTOR DE SEGURIDAD Y PRESERVACIÓN (ORDEN CRÍTICO) -->
    <script src="https://cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root { --primary: #0f3460; --accent: #27ae60; --danger: #e74c3c; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 35px; border-radius: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .header { border-bottom: 3px solid var(--primary); padding-bottom: 15px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; }
        .btn-principal { background: var(--primary); color: white; padding: 12px 25px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; text-align: left; }
        th, td { padding: 18px; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; color: var(--primary); text-transform: uppercase; font-size: 11px; }
        .modal-legal { display: none; position: fixed; z-index: 10000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); }
        .modal-content { background: white; margin: 3% auto; padding: 35px; border-radius: 25px; width: 85%; max-width: 850px; border: 3px solid var(--primary); }
        input, select { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 10px; border: 1px solid #ccc; box-sizing: border-box; }
        .box-soportes { background: #f9f9f9; padding: 20px; border-radius: 15px; border: 2px dashed #0f3460; text-align: left; }
        .soporte-tag { background: white; padding: 10px; border-radius: 8px; margin-bottom: 8px; border: 1px solid #ddd; display: flex; justify-content: space-between; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <h2 style="color: var(--primary); margin: 0;">🛡️ ADMINISTRACIÓN DE TALENTO HUMANO</h2>
            <small style="color: #666; font-weight: bold;">EXPEDIENTE DIGITAL CIFRADO (E2EE) - RES. 3100 DE 2019</small>
        </div>
        <div style="display:flex; gap:10px;">
            <button class="btn-principal" onclick="abrirModal()">➕ VINCULAR PROFESIONAL</button>
            <button class="btn-principal" style="background:#6c757d" onclick="window.location.href='administracion.html'">⬅ VOLVER</button>
        </div>
    </div>
    <table id="tablaPersonal">
        <thead>
            <tr>
                <th>PROFESIONAL</th>
                <th>IDENTIFICACIÓN</th>
                <th>TARJETA PROF.</th>
                <th>CARGO</th>
                <th>VINCULACIÓN</th>
                <th>ACCIONES</th>
            </tr>
        </thead>
        <tbody id="cuerpoTabla"></tbody>
    </table>
</div>

<div id="modalVinculacion" class="modal-legal">
    <div class="modal-content">
        <h3 style="color: var(--primary); border-bottom: 2px solid var(--primary); padding-bottom: 10px;">📋 REGISTRO DE VINCULACIÓN PROFESIONAL</h3>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; text-align: left;">
            <div>
                <label>Nombre Completo:</label><input type="text" id="pNombre">
                <label>Documento (CC):</label><input type="text" id="pCC">
                <label>Tarjeta Profesional:</label><input type="text" id="pTP">
                <label>Cargo / Especialidad:</label>
                <select id="pCargo">
                    <option value="Psicologia">Psicología</option>
                    <option value="Terapeuta">Terapeuta</option>
                    <option value="Director(a) Terapeutico">Director(a) Terapéutico</option>
                    <option value="Psiquiatria">Psiquiatría</option>
                    <option value="Medico">Médico</option>
                    <option value="Director(a) General">Director(a) General</option>
                    <option value="Administrador">Administrador</option>
                </select>
                <label>PIN de Firma (4 dígitos):</label><input type="password" id="pPIN" maxlength="4" style="text-align:center; letter-spacing:8px;">
            </div>
            <div class="box-soportes">
                <label>ANEXAR SOPORTE LEGAL:</label>
                <select id="tipoDoc">
                    <option value="Diploma">Diploma/Acta</option>
                    <option value="Tarjeta">Tarjeta Prof.</option>
                    <option value="Rethus">Inscripción ReTHUS</option>
                    <option value="Antecedentes">Antecedentes</option>
                </select>
                <input type="file" id="archivoInput">
                <button class="btn-principal" style="width:100%; background:#34495e;" onclick="adicionarInfo()">📂 ADICIONAR AL EXPEDIENTE</button>
                <div id="listaPrevia"></div>
            </div>
        </div>
        <div style="margin-top:25px; display:flex; gap:15px;">
            <button class="btn-principal" style="background:var(--accent); flex:1;" onclick="guardarE2EE()">💾 SELLAR Y CIFRAR</button>
            <button class="btn-principal" style="background:var(--danger); flex:1;" onclick="cerrarModal()">CANCELAR</button>
        </div>
    </div>
</div>

<script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import {  getFirestore, collection, addDoc, getDocs  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        const firebaseConfig = {
            apiKey: "AIzaSyC78y2m79f9764f-YTuPYfP",
            authDomain: "caminosnuevosdatabase.firebaseapp.com",
            projectId: "caminosnuevosdatabase",
            storageBucket: "caminosnuevosdatabase.firebasestorage.app",
            appId: "1:907500835423:web:f56b459ab4d57d92a81ea"
        };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const LLAVE_ADMIN = "ADMIN2024*"; 
    let soporteTemp = [];

    const cifrar = (t) => CryptoJS.AES.encrypt(t, LLAVE_ADMIN).toString();
    const descifrar = (h) => {
        try { return CryptoJS.AES.decrypt(h, LLAVE_ADMIN).toString(CryptoJS.enc.Utf8); }
        catch(e) { return "PROTEGIDO"; }
    };

    window.abrirModal = () => document.getElementById('modalVinculacion').style.display = 'block';
    window.cerrarModal = () => { document.getElementById('modalVinculacion').style.display = 'none'; soporteTemp = []; document.getElementById('listaPrevia').innerHTML = ""; };

    window.adicionarInfo = () => {
        const fileInput = document.getElementById('archivoInput');
        const tipo = document.getElementById('tipoDoc').value;
        if (fileInput.files.length === 0) return alert("Seleccione archivo");
        const reader = new FileReader();
        reader.onload = (e) => {
            soporteTemp.push({ tipo, nombre: fileInput.files[0].name, data: e.target.result });
            document.getElementById('listaPrevia').innerHTML += `<div class='soporte-tag'><span>✅ ${tipo}</span></div>`;
        };
        reader.readAsDataURL(fileInput.files[0]);
    };

    window.guardarE2EE = async () => {
        const n = document.getElementById('pNombre').value;
        const cc = document.getElementById('pCC').value;
        const tp = document.getElementById('pTP').value;
        const ca = document.getElementById('pCargo').value;
        const pi = document.getElementById('pPIN').value;
        if (!n || !cc || !pi) return alert("Faltan datos");

        try {
            await addDoc(collection(db, "talento_humano_cifrado"), {
                nombre: cifrar(n), cc: cifrar(cc), tp: cifrar(tp), cargo: cifrar(ca), pin: cifrar(pi),
                expediente: soporteTemp.map(s => ({ tipo: s.tipo, archivo: cifrar(s.data) })),
                fecha: new Date().toLocaleString()
            });
            alert("🎯 PROFESIONAL VINCULADO"); location.reload();
        } catch(e) { alert(e.message); }
    };

    async function cargar() {
        const snap = await getDocs(collection(db, "talento_humano_cifrado"));
        let h = "";
        snap.forEach(doc => {
            const d = doc.data();
            h += `<tr>
                <td><strong>${descifrar(d.nombre)}</strong></td>
                <td>${descifrar(d.cc)}</td>
                <td>${descifrar(d.tp)}</td>
                <td>${descifrar(d.cargo)}</td>
                <td>${d.fecha}</td>
                <td><button class='btn-principal' style='padding:5px; font-size:10px;'>👁️ VER CV</button></td>
            </tr>`;
        });
        document.getElementById("cuerpoTabla").innerHTML = h;
    }
    cargar();
</script>
</body>
</html>
