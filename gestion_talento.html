<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Talento Humano E2EE - Fundación NC</title>
    
    <!-- MOTOR DE SEGURIDAD Y PRESERVACIÓN (ORDEN CRÍTICO) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
             :root { --primary: #0f3460; --secondary: #16213e; --accent: #27ae60; --danger: #e74c3c; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 35px; border-radius: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .header { border-bottom: 3px solid var(--primary); padding-bottom: 15px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; }
        .btn-principal { background: var(--primary); color: white; padding: 12px 25px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; text-transform: uppercase; font-size: 11px; letter-spacing: 1px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; text-align: left; }
        th, td { padding: 18px; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; color: var(--primary); text-transform: uppercase; font-size: 11px; letter-spacing: 1px; }
        
        .badge-habilitado { color: white; padding: 5px 12px; border-radius: 20px; font-size: 10px; font-weight: bold; display: inline-block; }

        .modal-legal { display: none; position: fixed; z-index: 10000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); }
        .modal-content { background: white; margin: 3% auto; padding: 35px; border-radius: 25px; width: 85%; max-width: 850px; border: 3px solid var(--primary); box-shadow: 0 25px 60px rgba(0,0,0,0.5); }
        label { font-weight: bold; font-size: 13px; color: var(--primary); display: block; margin-bottom: 5px; }
        input, select, textarea { width: 100%; padding: 14px; margin-bottom: 12px; border-radius: 10px; border: 1px solid #ccc; box-sizing: border-box; }
        
        .box-soportes { background: #f9f9f9; padding: 20px; border-radius: 15px; border: 2px dashed #0f3460; text-align: left; }
        .soporte-tag { background: white; padding: 10px; border-radius: 8px; margin-bottom: 8px; border: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <h2 style="color: var(--primary); margin: 0;">🛡️ ADMINISTRACIÓN DE TALENTO HUMANO</h2>
            <small style="color: #666; font-weight: bold;">EXPEDIENTE DIGITAL CIFRADO - RESOLUCIÓN 3100/2019</small>
        </div>
        <div style="display:flex; gap:10px;">
            <button class="btn-principal" onclick="abrirModal()">➕ VINCULAR PROFESIONAL</button>
            <button class="btn-principal" style="background:#6c757d" onclick="window.location.href='administracion.html'">⬅ VOLVER</button>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>PROFESIONAL / CC</th>
                <th>TARJETA PROF.</th>
                <th>CARGO / ESPECIALIDAD</th>
                <th>ESTADO DE ACCESO</th>
                <th>ACCIONES DE CONTROL</th>
            </tr>
        </thead>
        <tbody id="tablaPersonal">
            <!-- Carga dinámica -->
        </tbody>
    </table>
</div>

<!-- MODAL DE REGISTRO INTEGRAL -->
<div id="modalVinculacion" class="modal-legal">
    <div class="modal-content">
        <h3 style="color: var(--primary); border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin-top: 0;">📋 REGISTRO DE VINCULACIÓN PROFESIONAL</h3>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; text-align: left;">
            <!-- DATOS IDENTITARIOS -->
            <div>
                <label>Nombre Completo:</label>
                <input type="text" id="pNombre" placeholder="Nombre completo">
                <label>Documento (CC):</label>
                <input type="text" id="pCC" placeholder="Cédula de Ciudadanía">
                <label>Tarjeta Profesional:</label>
                <input type="text" id="pTP" placeholder="Registro ReTHUS">
                <label>Cargo / Especialidad:</label>
                <select id="pCargo">
                    <option value="Psicologia">Psicología</option>
                    <option value="Terapeuta">Terapeuta</option>
                    <option value="Director(a) Terapeutico">Director(a) Terapéutico</option>
                    <option value="Psiquiatria">Psiquiatría</option>
                    <option value="Medico">Médico</option>
                    <option value="Director(a) General">Director(a) General</option>
                    <option value="Administrador">Administrador</option>
                </select>
                <label>PIN de Firma (4 dígitos):</label>
                <input type="password" id="pPIN" maxlength="4" style="text-align:center; letter-spacing:8px; font-size: 18px;">
            </div>
            <!-- SOPORTES LEGALES -->
            <div class="box-soportes">
                <label>ANEXAR SOPORTES (PDF/JPG):</label>
                <input type="file" id="archivoInput" style="font-size: 11px;">
                <button class="btn-principal" style="width:100%; background:#34495e; margin-top:10px;" onclick="adicionarSoporte()">📂 ADICIONAR AL EXPEDIENTE</button>
                <div id="listaPrevia" style="margin-top:10px; max-height: 150px; overflow-y: auto;"></div>
            </div>
        </div>
        <div style="margin-top:25px; display:flex; gap:15px;">
            <button class="btn-principal" style="background:var(--accent); flex:1;" onclick="guardarProfesional()">💾 SELLAR Y CIFRAR VINCULACIÓN</button>
            <button class="btn-principal" style="background:var(--danger); flex:1;" onclick="cerrarModal()">CANCELAR</button>
        </div>
    </div>
</div>

<script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        const firebaseConfig = {
            apiKey: "AIzaSyC78y2m79f9764f-YTuPYfP",
            authDomain: "caminosnuevosdatabase.firebaseapp.com",
            projectId: "caminosnuevosdatabase",
            storageBucket: "caminosnuevosdatabase.firebasestorage.app",
            appId: "1:907500835423:web:f56b459ab4d57d92a81ea"
        };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const LLAVE_ADMIN = "ADMIN2024*"; 
    let soporteTemp = [];

    // MOTOR DE CIFRADO E2EE
    window.cifrarDato = (t) => CryptoJS.AES.encrypt(t, LLAVE_ADMIN).toString();
    window.descifrarDato = (h) => {
        try { return CryptoJS.AES.decrypt(h, LLAVE_ADMIN).toString(CryptoJS.enc.Utf8) || "PROTEGIDO"; }
        catch(e) { return "ERROR"; }
    };

    // --- FUNCIÓN PARA ACTIVAR/DESACTIVAR ACCESO ---
    window.alternarEstado = async (id, estadoActual) => {
        const nuevoEstado = estadoActual === "HABILITADO" ? "INACTIVO" : "HABILITADO";
        const confirmacion = confirm(`¿Desea cambiar el estado a ${nuevoEstado}?`);
        
        if (confirmacion) {
            try {
                const docRef = doc(db, "talento_humano_cifrado", id);
                await updateDoc(docRef, { estado: nuevoEstado });
                alert(`🎯 ACCESO ACTUALIZADO A: ${nuevoEstado}`);
                location.reload();
            } catch (e) { alert("Error: " + e.message); }
        }
    };

    // --- RENDERIZADO DE TABLA CON CONTROL DE ESTADO ---
    async function cargarListaProfesionales() {
        const q = query(collection(db, "talento_humano_cifrado"), orderBy("timestamp", "desc"));
        const snap = await getDocs(q);
        let h = "";
        
        snap.forEach(docSnap => {
            const d = docSnap.data();
            const colorEstado = d.estado === "HABILITADO" ? "var(--accent)" : "var(--danger)";
            const textoBoton = d.estado === "HABILITADO" ? "DESACTIVAR" : "ACTIVAR";

            h += `<tr>
                <td><strong>${descifrarDato(d.identidad.nombre)}</strong><br><small>CC: ${descifrarDato(d.identidad.cc)}</small></td>
                <td>${descifrarDato(d.identidad.tp)}</td>
                <td>${descifrarDato(d.identidad.cargo)}</td>
                <td><span class="badge-habilitado" style="background:${colorEstado}">${d.estado}</span></td>
                <td>
                    <button class="btn-principal" style="padding:6px; font-size:10px; background:#34495e" onclick="alternarEstado('${docSnap.id}', '${d.estado}')">
                        ${textoBoton}
                    </button>
                    <button class="btn-principal" style="padding:6px; font-size:10px;" onclick="alert('Descifrando CV...')">👁️ VER CV</button>
                </td>
            </tr>`;
        });
        document.getElementById("tablaPersonal").innerHTML = h || "<tr><td colspan='5'>No hay personal vinculado.</td></tr>";
    }

    // GESTIÓN DE MODALES Y ARCHIVOS
    window.abrirModal = () => document.getElementById('modalVinculacion').style.display = 'block';
    window.cerrarModal = () => { document.getElementById('modalVinculacion').style.display = 'none'; soporteTemp = []; document.getElementById('listaPrevia').innerHTML = ""; };

    window.adicionarSoporte = () => {
        const fileInput = document.getElementById('archivoInput').files[0];
        if (!fileInput) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            soporteTemp.push({ nombre: fileInput.name, data: e.target.result });
            document.getElementById('listaPrevia').innerHTML += `<div class='soporte-tag'><span>✅ ${fileInput.name.substring(0,20)}...</span></div>`;
        };
        reader.readAsDataURL(fileInput);
    };

    window.guardarProfesional = async () => {
        const n = document.getElementById('pNombre').value;
        const cc = document.getElementById('pCC').value;
        const t = document.getElementById('pTP').value;
        const ca = document.getElementById('pCargo').value;
        const pi = document.getElementById('pPIN').value;

        if (!n || !cc || !pi) return alert("Nombre, Cédula y PIN son obligatorios.");

        try {
            await addDoc(collection(db, "talento_humano_cifrado"), {
                identidad: { 
                    nombre: cifrarDato(n), 
                    cc: cifrarDato(cc), 
                    tp: cifrarDato(t), 
                    cargo: cifrarDato(ca), 
                    pin_acceso: cifrarDato(pi) 
                },
                expediente: soporteTemp.map(s => ({ nombre: s.nombre, archivo: cifrarDato(s.data) })),
                estado: "HABILITADO",
                timestamp: serverTimestamp()
            });
            alert("🎯 PROFESIONAL VINCULADO Y CIFRADO.");
            location.reload();
        } catch (e) { alert("Error: " + e.message); }
    };

    cargarListaProfesionales();
</script>
</body>
</html>
