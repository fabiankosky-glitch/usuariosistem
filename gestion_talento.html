html<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talento Humano E2EE - Fundación NC</title>
    <!-- LIBRERÍAS DE SEGURIDAD -->
   <script  src="https://cloudflare.com/crypto-js/4.1.1/crypto-js.min.js">
    <style>
        :root { --primary: #0f3460; --secondary: #16213e; --accent: #27ae60; --danger: #e74c3c; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 35px; border-radius: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        
        /* CABECERA PROFESIONAL */
        .header { border-bottom: 3px solid var(--primary); padding-bottom: 15px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; }
        .btn-principal { background: var(--primary); color: white; padding: 12px 25px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-principal:hover { background: var(--secondary); transform: translateY(-2px); }

        /* TABLA DE TALENTO HUMANO */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; }
        th, td { padding: 15px; border-bottom: 1px solid #eee; text-align: left; }
        th { background: #f8f9fa; color: var(--primary); text-transform: uppercase; font-size: 12px; }
        .status-pill { background: var(--accent); color: white; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; }

        /* MODAL DE VINCULACIÓN LEGAL */
        .modal-legal { display: none; position: fixed; z-index: 10000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); }
        .modal-content { background: white; margin: 3% auto; padding: 35px; border-radius: 25px; width: 85%; max-width: 850px; border: 3px solid var(--primary); box-shadow: 0 25px 60px rgba(0,0,0,0.5); }
        
        .grid-form { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
        label { font-weight: bold; font-size: 13px; color: var(--primary); display: block; margin-bottom: 5px; }
        input, select { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 10px; border: 1px solid #ccc; box-sizing: border-box; }
        
        /* ÁREA DE SOPORTES (PDF/JPG) */
        .box-soportes { background: #f9f9f9; padding: 20px; border-radius: 15px; border: 2px dashed #ccc; }
        .soporte-item { background: white; padding: 10px; border-radius: 8px; margin-bottom: 8px; border: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
        .btn-add { background: var(--secondary); color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <h2 style="color: var(--primary); margin: 0;">👥 GESTIÓN DE TALENTO HUMANO</h2>
            <small style="color: #666; font-weight: bold;">ESTÁNDAR DE HABILITACIÓN - RESOLUCIÓN 3100/2019</small>
        </div>
        <div style="display: flex; gap: 10px;">
            <button class="btn-principal" onclick="abrirModal()">➕ VINCULAR PROFESIONAL</button>
            <button class="btn-principal" style="background:#6c757d;" onclick="window.location.href='administracion.html'">⬅ VOLVER</button>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>IDENTIFICACIÓN</th>
                <th>PROFESIONAL</th>
                <th>TARJETA PROF.</th>
                <th>CARGO/ESPECIALIDAD</th>
                <th>ESTADO</th>
                <th>SOPORTES LEGALES</th>
            </tr>
        </thead>
        <tbody id="tablaPersonal">
            <!-- CARGA DINÁMICA E2EE -->
        </tbody>
    </table>
</div>

<!-- MODAL DE VINCULACIÓN INTEGRAL -->
<div id="modalVinculacion" class="modal-legal">
    <div class="modal-content">
        <h3 style="color: var(--primary); border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin-top: 0;">📝 REGISTRO DE VINCULACIÓN Y HOJA DE VIDA</h3>
        
        <div class="grid-form">
            <!-- COLUMNA 1: DATOS PERSONALES -->
            <div style="text-align: left;">
                <label>Nombre Completo:</label>
                <input type="text" id="pNombre" placeholder="Nombre según documento">
                
                <label>Número de Cédula:</label>
                <input type="text" id="pCedula" placeholder="CC">
                
                <label>Tarjeta Profesional (TP):</label>
                <input type="text" id="pTP" placeholder="Registro ReTHUS">
                
                <label>Cargo / Especialidad:</label>
                <select id="pCargo">
                    <option value="Psicología Clínica">Psicología Clínica</option>
                    <option value="Trabajo Social">Trabajo Social</option>
                    <option value="Dirección Médica">Dirección Médica</option>
                    <option value="Administración">Administración</option>
                </select>

                <label>PIN de Firma Digital (4 Dígitos):</label>
                <input type="password" id="pPIN" maxlength="4" style="text-align: center; letter-spacing: 8px; font-size: 20px;">
            </div>

            <!-- COLUMNA 2: CARGA DE ARCHIVOS (SOPORTES) -->
            <div class="box-soportes" style="text-align: left;">
                <label style="color: var(--accent);">📁 ANEXAR SOPORTE DOCUMENTAL:</label>
                <select id="tipoDoc">
                    <option value="Diploma/Acta">Diploma o Acta de Grado</option>
                    <option value="Tarjeta Física">Tarjeta Profesional (Foto/PDF)</option>
                    <option value="Rethus">Inscripción ReTHUS</option>
                    <option value="Antecedentes">Antecedentes (Policía/Procuraduría)</option>
                    <option value="Referencias">Referencias Laborales</option>
                </select>
                <input type="file" id="archivoInput" style="font-size: 11px;">
                <button class="btn-add" onclick="adicionarArchivo()">📂 ADICIONAR AL EXPEDIENTE</button>
                
                <div id="listaPrevia" style="max-height: 180px; overflow-y: auto; border-top: 1px solid #ddd; padding-top: 10px;">
                    <!-- Archivos en espera -->
                </div>
            </div>
        </div>

        <div style="margin-top: 30px; display: flex; gap: 15px;">
            <button class="btn-principal" style="background: var(--accent); flex: 1; padding: 15px;" onclick="guardarVinculacionE2EE()">💾 FINALIZAR Y CIFRAR VINCULACIÓN</button>
            <button class="btn-principal" style="background: var(--danger); flex: 1; padding: 15px;" onclick="cerrarModal()">CANCELAR</button>
        </div>
    </div>
</div>

<script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import {  getFirestore, collection, addDoc, getDocs, serverTimestamp  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        const firebaseConfig = {
            apiKey: "AIzaSyC78y2m79f9764f-YTuPYfP",
            authDomain: "caminosnuevosdatabase.firebaseapp.com",
            projectId: "caminosnuevosdatabase",
            storageBucket: "caminosnuevosdatabase.firebasestorage.app",
            appId: "1:907500835423:web:f56b459ab4d57d92a81ea"
        };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    
    // LLAVE MAESTRA DE ADMINISTRACIÓN (Debe coincidir con la de administracion.html)
    const LLAVE_MAESTRA_ADMIN = "ADMIN2024*"; 

    let archivosCargados = [];

    // MOTOR DE CIFRADO E2EE
    const cifrarE2EE = (t) => CryptoJS.AES.encrypt(t, LLAVE_MAESTRA_ADMIN).toString();
    const descifrarE2EE = (h) => {
        try { 
            return CryptoJS.AES.decrypt(h, LLAVE_MAESTRA_ADMIN).toString(CryptoJS.enc.Utf8) || "DATO_PROTEGIDO"; 
        } catch(e) { return "ERROR_KEY"; }
    };

    window.abrirModal = () => document.getElementById('modalVinculacion').style.display = 'block';
    window.cerrarModal = () => {
        document.getElementById('modalVinculacion').style.display = 'none';
        archivosCargados = [];
        document.getElementById('listaPrevia').innerHTML = "";
    };

    // FUNCIÓN PARA ADICIONAR INFORMACIÓN LAS VECES QUE QUIERA
    window.adicionarArchivo = () => {
        const file = document.getElementById('archivoInput').files[0];
        const tipo = document.getElementById('tipoDoc').value;
        if (!file) return alert("Seleccione un archivo.");

        const reader = new FileReader();
        reader.onload = (e) => {
            archivosCargados.push({
                categoria: tipo,
                nombre: file.name,
                base64: e.target.result
            });
            renderizarLista();
        };
        reader.readAsDataURL(file);
    };

    function renderizarLista() {
        document.getElementById('listaPrevia').innerHTML = archivosCargados.map((a, i) => `
            <div class="soporte-item">
                <span>✅ ${a.categoria}: ${a.nombre.substring(0,20)}...</span>
                <b onclick="archivosCargados.splice(${i},1); renderizarLista()" style="color:red; cursor:pointer;">✖</b>
            </div>
        `).join('');
    }

    // GUARDADO CON CIFRADO DE EXTREMO A EXTREMO
    window.guardarVinculacionE2EE = async () => {
        const p = {
            nombre: document.getElementById('pNombre').value,
            cc: document.getElementById('pCedula').value,
            tp: document.getElementById('pTP').value,
            cargo: document.getElementById('pCargo').value,
            pin: document.getElementById('pPIN').value
        };

        if (!p.nombre || !p.tp || !p.pin || archivosCargados.length === 0) {
            return alert("Error: Debe completar datos y subir al menos un soporte legal.");
        }

        try {
            console.log("Cifrando expediente del profesional...");
            await addDoc(collection(db, "talento_humano_cifrado"), {
                // Credencial Cifrada
                identidad: {
                    nombre: cifrarE2EE(p.nombre),
                    cc: cifrarE2EE(p.cc),
                    tp: cifrarE2EE(p.tp),
                    cargo: cifrarE2EE(p.cargo),
                    pin_acceso: cifrarE2EE(p.pin)
                },
                // Hojas de Vida Cifradas (PDFs y Fotos)
                expediente_digital: archivosCargados.map(a => ({
                    tipo: a.categoria,
                    archivo_cifrado: cifrarE2EE(a.base64)
                })),
                fecha_vinculacion: new Date().toLocaleString(),
                timestamp: serverTimestamp(),
                estado: "HABILITADO",
                audit_hash: btoa(p.cc + Date.now()).substring(0,12)
            });

            alert("🎯 PROFESIONAL VINCULADO Y CIFRADO EXITOSAMENTE.");
            cerrarModal();
            cargarListaPersonal();
        } catch (e) { alert("Error Firebase: " + e.message); }
    };

    async function cargarListaPersonal() {
        const snap = await getDocs(collection(db, "talento_humano_cifrado"));
        let html = "";
        snap.forEach(doc => {
            const d = doc.data();
            html += `<tr>
                <td>${descifrarE2EE(d.identidad.cc)}</td>
                <td><strong>${descifrarE2EE(d.identidad.nombre)}</strong></td>
                <td>${descifrarE2EE(d.identidad.tp)}</td>
                <td>${descifrarE2EE(d.identidad.cargo)}</td>
                <td><span class="status-pill">${d.estado}</span></td>
                <td><button class="btn-principal" style="padding:5px 10px; font-size:10px;" onclick="alert('Descargando Hoja de Vida Cifrada...')">👁️ VER CV</button></td>
            </tr>`;
        });
        document.getElementById("tablaPersonal").innerHTML = html;
    }
    cargarListaPersonal();
</script>
</body>
</html>
