<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Talento Humano E2EE - Fundación NC</title>
    
    <!-- MOTOR DE SEGURIDAD Y PRESERVACIÓN (ORDEN CRÍTICO) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --primary: #0f3460; --accent: #27ae60; --danger: #e74c3c; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .header { border-bottom: 3px solid var(--primary); padding-bottom: 15px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; }
        .btn-blue { background: var(--primary); color: white; padding: 12px 20px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 11px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; text-align: left; }
        th, td { padding: 15px; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; color: var(--primary); font-size: 10px; text-transform: uppercase; }

        /* ESTILO DE LA CREDENCIAL EMERGENTE */
        .card-credencial { background: linear-gradient(135deg, #0f3460 0%, #16213e 100%); color: white; padding: 25px; border-radius: 20px; text-align: center; border: 4px solid #ffd700; }
        .pin-display { font-size: 32px; font-weight: bold; letter-spacing: 5px; color: #ffd700; margin: 15px 0; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 10px; }

        .modal-legal { display: none; position: fixed; z-index: 10000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); }
        .modal-content { background: white; margin: 5% auto; padding: 30px; border-radius: 25px; width: 90%; max-width: 500px; border: 3px solid var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 style="color: var(--primary); margin: 0;">🛡️ BÓVEDA DE CREDENCIALES PROFESIONALES</h2>
        <button class="btn-blue" onclick="abrirModalRegistro()">➕ VINCULAR NUEVO PERFIL</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>PROFESIONAL</th>
                <th>CARGO REGISTRADO</th>
                <th>ESTADO</th>
                <th>LLAVES DE ACCESO</th>
            </tr>
        </thead>
        <tbody id="tablaPersonal"></tbody>
    </table>
</div>

<!-- MODAL DE REGISTRO (LO QUE YA TENÍAS) -->
<div id="modalRegistro" class="modal-legal">
    <div class="modal-content">
        <h3 style="color:var(--primary); text-align:left;">📝 NUEVO REGISTRO PROFESIONAL</h3>
        <input type="text" id="pNom" placeholder="Nombre Completo">
        <input type="text" id="pCC" placeholder="Cédula">
        <select id="pCar">
            <option value="Psicologia">Psicología</option>
            <option value="Terapeuta">Terapeuta</option>
            <option value="Director(a) Terapeutico">Director(a) Terapéutico</option>
            <option value="Psiquiatria">Psiquiatría</option>
            <option value="Medico">Médico</option>
            <option value="Director(a) General">Director(a) General</option>
            <option value="Administrador">Administrador</option>
        </select>
        <input type="password" id="pPin" placeholder="PIN de 4 dígitos" maxlength="4" style="text-align:center;">
        <button class="btn-blue" style="width:100%; background:var(--accent);" onclick="guardar()">GUARDAR Y CIFRAR</button>
        <button class="btn-blue" style="width:100%; background:var(--danger); margin-top:10px;" onclick="cerrarModal()">CANCELAR</button>
    </div>
</div>

<!-- MODAL DE VISOR DE CREDENCIAL (NUEVO) -->
<div id="modalCredencial" class="modal-legal">
    <div class="modal-content" style="background:transparent; border:none; box-shadow:none;">
        <div id="cuerpoCredencial"></div>
        <button class="btn-blue" style="width:100%; margin-top:20px; background:var(--danger);" onclick="document.getElementById('modalCredencial').style.display='none'">CERRAR VISOR</button>
    </div>
</div>

<script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import {getFirestore, collection, addDoc, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        const firebaseConfig = {
            apiKey: "AIzaSyC78y2m79f9764f-YTuPYfP",
            authDomain: "caminosnuevosdatabase.firebaseapp.com",
            projectId: "caminosnuevosdatabase",
            storageBucket: "caminosnuevosdatabase.firebasestorage.app",
            appId: "1:907500835423:web:f56b459ab4d57d92a81ea"
        }

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const LLAVE_MASTER = "ADMIN2024*"; 

    const cifrar = (t) => CryptoJS.AES.encrypt(t, LLAVE_MASTER).toString();
    const descifrar = (h) => {
        try { return CryptoJS.AES.decrypt(h, LLAVE_MASTER).toString(CryptoJS.enc.Utf8); }
        catch(e) { return "ERROR"; }
    };

    window.abrirModalRegistro = () => document.getElementById('modalRegistro').style.display = 'block';
    window.cerrarModal = () => document.getElementById('modalRegistro').style.display = 'none';

    window.guardar = async () => {
        const n = document.getElementById('pNom').value;
        const c = document.getElementById('pCC').value;
        const r = document.getElementById('pCar').value;
        const p = document.getElementById('pPin').value;

        await addDoc(collection(db, "talento_humano_cifrado"), {
            info: { n: cifrar(n), cc: cifrar(c), car: cifrar(r), pin: cifrar(p) },
            estado: "HABILITADO",
            fecha: new Date().toLocaleString()
        });
        alert("REGISTRADO"); location.reload();
    };

    // FUNCIÓN PARA MOSTRAR LAS CREDENCIALES OLVIDADAS
    window.verCredencial = async (id) => {
        const pass = prompt("🔐 LLAVE MAESTRA DE ADMINISTRADOR:");
        if(pass !== LLAVE_MASTER) return alert("ACCESO DENEGADO");

        const snap = await getDoc(doc(db, "talento_humano_cifrado", id));
        const d = snap.data().info;

        document.getElementById('cuerpoCredencial').innerHTML = `
            <div class="card-credencial">
                <h2 style="margin:0;">ID PROFESIONAL</h2>
                <hr style="border:1px solid #ffd700; margin:15px 0;">
                <p><strong>NOMBRE:</strong><br>${descifrar(d.n)}</p>
                <p><strong>CARGO REQUERIDO:</strong><br><span style="color:#ffd700">${descifrar(d.car)}</span></p>
                <p><strong>PIN DE FIRMA:</strong></p>
                <div class="pin-display">${descifrar(d.pin)}</div>
                <small style="font-size:9px;">Use estos datos exactos en la Carpeta Psicológica</small>
            </div>
        `;
        document.getElementById('modalCredencial').style.display = 'block';
    };

    async function cargar() {
        const snap = await getDocs(collection(db, "talento_humano_cifrado"));
        let h = "";
        snap.forEach(docSnap => {
            const d = docSnap.data();
            h += `<tr>
                <td><strong>${descifrar(d.info.n)}</strong></td>
                <td>${descifrar(d.info.car)}</td>
                <td style="color:green; font-weight:bold;">${d.estado}</td>
                <td><button class="btn-blue" style="background:#e67e22;" onclick="verCredencial('${docSnap.id}')">👁️ VER CREDENCIAL</button></td>
            </tr>`;
        });
        document.getElementById('tablaPersonal').innerHTML = h;
    }
    cargar();
</script>
</body>
</html>
