<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil del Paciente - Nuevos Caminos</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; text-align: center; padding: 20px; margin: 0; }
        .container { max-width: 500px; margin: auto; }
        .card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .foto-perfil { width: 150px; height: 150px; border-radius: 50%; border: 5px solid #2c3e50; object-fit: cover; margin-bottom: 10px; background: #eee; }
        .btn-folder { width: 100%; padding: 15px; margin: 8px 0; border: none; border-radius: 10px; color: white; font-size: 18px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; text-decoration: none; }
        .btn-med { background: #e67e22; }
        .btn-ter { background: #27ae60; }
        .btn-psi { background: #9b59b6; }
        .grid-estados { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .btn-estado { padding: 10px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; font-size: 12px; }
        .status-badge { display: inline-block; padding: 5px 15px; border-radius: 20px; color: white; font-size: 12px; font-weight: bold; margin-bottom: 10px; }
        .datos-lista { text-align: left; background: #f9f9f9; padding: 15px; border-radius: 10px; font-size: 14px; border: 1px solid #eee; margin-top: 15px; }
        .novedad-item { font-size:12px; border-left:3px solid #e74c3c; padding:8px; margin-bottom:10px; background:#fff; text-align: left; }
    </style>
</head>
<body>

    <div class="container">
        <!-- FICHA PRINCIPAL -->
        <div class="card">
            <img id="fotoPaciente" src="https://placeholder.com" class="foto-perfil">
            <h2 id="nombrePaciente">Cargando...</h2>
            <div id="badgeEstado" class="status-badge" style="background: #95a5a6;">ESTADO...</div>
            
            <div id="datosTecnicos" class="datos-lista">
                <p><strong>🪪 Cédula:</strong> <span id="txtCedula">...</span></p>
                <p><strong>🎂 Edad:</strong> <span id="txtEdad">...</span> años</p>
                <p><strong>🚻 Sexo:</strong> <span id="txtSexo">...</span></p>
                <p><strong>📅 Ingreso:</strong> <span id="txtFecha">...</span></p>
            </div>
            <br>
            <button onclick="window.location.href='historias.html'" style="background:none; border:none; color:#3498db; cursor:pointer; font-weight:bold;">⬅ Volver al Listado</button>
        </div>

        <!-- CARPETAS -->
        <div class="card">
            <h3>📂 Carpetas del Sistema</h3>
            <button id="btn-medico" class="btn-folder btn-med" onclick="irA('medico')">⚕️ Folder Médico</button>
            <button id="btn-terapeutico" class="btn-folder btn-ter" onclick="irA('terapeutico')">📝 Folder Terapéutico</button>
            <button id="btn-psicologico" class="btn-folder btn-psi" onclick="irA('psicologico')">🧠 Folder Psicológico</button>
        </div>

        <!-- CAMBIO DE CATEGORÍA -->
        <div id="seccion-estados" class="card">
            <h3>🔄 Cambiar de Categoría</h3>
            <div class="grid-estados">
                <button class="btn-estado" style="background:#27ae60;" onclick="moverPaciente('activos')">🟢 Activo</button>
                <button class="btn-estado" style="background:#16a085;" onclick="moverPaciente('desprendimiento')">🤝 Desprendimiento</button>
                <button class="btn-estado" style="background:#f39c12;" onclick="moverPaciente('abandonos')">🟠 Abandono</button>
                <button class="btn-estado" style="background:#e74c3c;" onclick="moverPaciente('fugas')">🔴 Fuga</button>
                <button class="btn-estado" style="background:#3498db; grid-column: span 2;" onclick="moverPaciente('movilizaciones')">🔵 Movilización</button>
            </div>
        </div>

        <!-- HISTORIAL DE NOVEDADES -->
        <div class="card">
            <h3>📜 Historial de Novedades Legales</h3>
            <div id="historialNovedades">Cargando historial...</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://gstatic.com";
        import { getFirestore, doc, getDoc, updateDoc, collection, addDoc, query, where, getDocs, orderBy } from "https://gstatic.com";

        const firebaseConfig = {
            apiKey: "AIzaSyC78y2m79f9764f-YTuPYfP",
            authDomain: "://firebaseapp.com",
            projectId: "caminosnuevosdatabase",
            storageBucket: "caminosnuevosdatabase.firebasestorage.app",
            appId: "1:907500835423:web:f56b459ab4d57d92a81ea"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        const params = new URLSearchParams(window.location.search);
        const idPaciente = params.get("id");
        const rolActual = sessionStorage.getItem('rolActivo');

        // SEGURIDAD INICIAL
        if (sessionStorage.getItem('autenticado') !== 'true') { window.location.href = 'login.html'; }

        // APLICAR RESTRICCIONES DE ROL
        if (rolActual === 'terapeuta') {
            document.getElementById('btn-psicologico').style.display = 'none';
            document.getElementById('seccion-estados').style.display = 'none';
        }

        // CARGAR PACIENTE
        async function cargarPaciente() {
            if (!idPaciente) return;
            const snap = await getDoc(doc(db, "pacientes", idPaciente));
            if (snap.exists()) {
                const p = snap.data();
                document.getElementById("nombrePaciente").innerText = p.nombre;
                document.getElementById("txtCedula").innerText = p.cedula || "N/A";
                document.getElementById("txtEdad").innerText = p.edad || "--";
                document.getElementById("txtSexo").innerText = p.sexo || "N/A";
                document.getElementById("txtFecha").innerText = p.fechaIngreso || "N/A";
                document.getElementById("fotoPaciente").src = p.fotoID || p.foto || 'https://placeholder.com';
                
                const badge = document.getElementById("badgeEstado");
                badge.innerText = (p.estado || "activos").toUpperCase();
                const colores = { activos: '#27ae60', desprendimiento: '#16a085', abandonos: '#f39c12', fugas: '#e74c3c', movilizaciones: '#3498db' };
                badge.style.background = colores[p.estado || "activos"];
            }
        }

        // CARGAR NOVEDADES
        async function cargarNovedades() {
            const hist = document.getElementById("historialNovedades");
            try {
                const q = query(collection(db, "novedades"), where("pacienteId", "==", idPaciente), orderBy("timestamp", "desc"));
                const snap = await getDocs(q);
                let html = "";
                snap.forEach(doc => {
                    const n = doc.data();
                    html += `<div class="novedad-item">
                        <strong>${n.fechaHora}</strong>: ${n.estadoAnterior} ➔ ${n.estadoNuevo.toUpperCase()}<br>
                        <em>Motivo: ${n.motivoNovedad}</em><br>
                        <small>Responsable: ${n.usuarioResponsable}</small>
                    </div>`;
                });
                hist.innerHTML = html || "No hay novedades registradas.";
            } catch (e) { hist.innerHTML = "Aún sin historial (se requiere crear índice en Firebase)."; }
        }

        // FUNCIÓN GLOBAL MOVER PACIENTE
        window.moverPaciente = async (nuevoEstado) => {
            if (rolActual === 'terapeuta') return alert("🚫 Sin permisos.");
            const motivo = prompt("Escriba el motivo legal del cambio:");
            if (!motivo) return;

            if (confirm("¿Confirmar movimiento?")) {
                try {
                    const nombreP = document.getElementById("nombrePaciente").innerText;
                    const estadoAnt = document.getElementById("badgeEstado").innerText;

                    // 1. Guardar Novedad
                    await addDoc(collection(db, "novedades"), {
                        pacienteId: idPaciente,
                        pacienteNombre: nombreP,
                        estadoAnterior: estadoAnt,
                        estadoNuevo: nuevoEstado,
                        motivoNovedad: motivo,
                        usuarioResponsable: rolActual,
                        fechaHora: new Date().toLocaleString(),
                        timestamp: Date.now()
                    });

                    // 2. Actualizar Paciente
                    await updateDoc(doc(db, "pacientes", idPaciente), { estado: nuevoEstado });
                    
                    alert("✅ Novedad registrada.");
                    location.reload();
                } catch (e) { alert("Error: " + e.message); }
            }
        };

        window.irA = (tipo) => {
            const archivos = { 'medico': 'detalle_clinico.html', 'terapeutico': 'detalle_terapeutico.html', 'psicologico': 'detalle_psicologico.html' };
            window.location.href = `${archivos[tipo]}?id=${idPaciente}`;
        };

        cargarPaciente();
        cargarNovedades();
    </script>
</body>
</html>
