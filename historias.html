   <script type="module">
        // 1. CORRECCIÓN: Añadido 'onSnapshot' a la importación
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, onSnapshot, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyC78y2m79f9764f-YTuPYfP",
            authDomain: "caminosnuevosdatabase.firebaseapp.com",
            projectId: "caminosnuevosdatabase",
            storageBucket: "caminosnuevosdatabase.firebasestorage.app",
            appId: "1:907500835423:web:f56b459ab4d57d92a81ea"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Función para abrir/cerrar las listas (Debe ser window para que el HTML la vea)
        window.toggleLista = (id) => {
            const el = document.getElementById(id);
            if (el.style.display === "block") {
                el.style.display = "none";
            } else {
                el.style.display = "block";
            }
        };

        // 2. LÓGICA DE ESCUCHA EN TIEMPO REAL
        onSnapshot(collection(db, "pacientes"), (snapshot) => {
            const grupos = { activos: [], desprendimiento: [], abandonos: [], fugas: [], movilizaciones: [] };

            snapshot.forEach((doc) => {
                const p = { id: doc.id, ...doc.data() };
                const estado = p.estado || "activos";
                if (grupos[estado]) {
                    grupos[estado].push(p);
                }
            });

            // Actualizar cada sección visual
            Object.keys(grupos).forEach(cat => renderizarGrupo(cat, grupos[cat]));
        });

        function renderizarGrupo(cat, pacientes) {
            const div = document.getElementById(`lista-${cat}`);
            const count = document.getElementById(`count-${cat}`);
            if (!div || !count) return;

            count.innerText = pacientes.length;
            div.innerHTML = pacientes.length === 0 ? "<p style='color:gray; padding:10px;'>Sin pacientes en esta categoría.</p>" : "";
            
            pacientes.forEach(p => {
                div.innerHTML += `
                    <div class="paciente-card" style="display:flex; justify-content:space-between; align-items:center; padding:10px; border-bottom:1px solid #eee;">
                        <div style="text-align:left;">
                            <strong>${p.nombre}</strong><br>
                            <small style="color:gray;">ID: ${p.id.substring(0,5)}</small>
                        </div>
                        <button class="btn-ver" onclick="window.location.href='perfil_paciente.html?id=${p.id}'" 
                                style="background:#2c3e50; color:white; border:none; padding:8px 12px; border-radius:5px; cursor:pointer; font-weight:bold;">
                            📂 Abrir
                        </button>
                    </div>`;
            });
        }
    </script>
</body>
</html>
