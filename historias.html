<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Historias Clínicas</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; text-align: center; }
        .container { max-width: 800px; margin: auto; }
        .categoria-section { margin-bottom: 15px; text-align: left; }
        .categoria-header { 
            padding: 12px 20px; border-radius: 10px; color: white; font-weight: bold; 
            display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .activos { background: #27ae60; }
        .desprendimiento { background: #16a085; }
        .abandonos { background: #f39c12; }
        .fugas { background: #e74c3c; }
        .movilizaciones { background: #3498db; }
        .paciente-lista { background: white; border-radius: 0 0 10px 10px; padding: 5px 15px; margin-top: -5px; border: 1px solid #ddd; display: none; }
        .paciente-card { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #eee; align-items: center; }
        .btn-ver { background: #2c3e50; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2>📊 Control de Historias Clínicas</h2>
        <p>Haz clic en una categoría para desplegar. <strong>(Datos de demostración)</strong></p>
        <div style="margin-bottom: 20px;">
            <input type="text" id="buscador" onkeyup="filtrarPacientes()" 
                   placeholder="🔍 Buscar por nombre..." 
                   style="width: 100%; padding: 15px; border-radius: 25px; border: 2px solid #3498db; font-size: 16px; outline: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
        </div>
        <div class="categoria-section"><div class="categoria-header activos" onclick="toggleLista('lista-activos')"><span>🟢 USUARIOS ACTIVOS</span><span id="count-activos">0</span></div><div id="lista-activos" class="paciente-lista"></div></div>
        <div class="categoria-section"><div class="categoria-header desprendimiento" onclick="toggleLista('lista-desprendimiento')"><span>🤝 DESPRENDIMIENTO</span><span id="count-desprendimiento">0</span></div><div id="lista-desprendimiento" class="paciente-lista"></div></div>
        <div class="categoria-section"><div class="categoria-header abandonos" onclick="toggleLista('lista-abandonos')"><span>🟠 ABANDONOS</span><span id="count-abandonos">0</span></div><div id="lista-abandonos" class="paciente-lista"></div></div>
        <div class="categoria-section"><div class="categoria-header fugas" onclick="toggleLista('lista-fugas')"><span>🔴 FUGAS</span><span id="count-fugas">0</span></div><div id="lista-fugas" class="paciente-lista"></div></div>
        <div class="categoria-section"><div class="categoria-header movilizaciones" onclick="toggleLista('lista-movilizaciones')"><span>🔵 MOVILIZACIONES</span><span id="count-movilizaciones">0</span></div><div id="lista-movilizaciones" class="paciente-lista"></div></div>
    </div>

<script>
    // --- DATOS DE EJEMPLO (REEMPLAZO DE FIREBASE) ---
    // Como la conexión a Firebase fue removida para la demostración, 
    // usamos datos fijos para que la página siga funcionando.
    const mockPacientes = [
        { id: '1', nombre: 'Juan Pérez (Demo)', estado: 'activos', fotoURL: 'https://i.pravatar.cc/150?img=1' },
        { id: '2', nombre: 'Ana Gómez (Demo)', estado: 'activos', fotoURL: 'https://i.pravatar.cc/150?img=2' },
        { id: '3', nombre: 'Carlos Ruiz (Demo)', estado: 'desprendimiento', fotoURL: 'https://i.pravatar.cc/150?img=3' },
        { id: '4', nombre: 'María Fernández (Demo)', estado: 'abandonos', fotoURL: 'https://i.pravatar.cc/150?img=4' },
        { id: '5', nombre: 'Luis Torres (Demo)', estado: 'fugas', fotoURL: 'https://i.pravatar.cc/150?img=5' },
        { id: '6', nombre: 'Sofía Castro (Demo)', estado: 'movilizaciones', fotoURL: 'https://i.pravatar.cc/150?img=6' },
        { id: '7', nombre: 'Pedro Ramírez (Demo)', estado: 'activos', fotoURL: 'https://i.pravatar.cc/150?img=7' }
    ];

    // --- FUNCIONES DE LA PÁGINA ---

    // Función para mostrar u ocultar las listas de pacientes
    window.toggleLista = (id) => {
        const el = document.getElementById(id);
        if (el) {
            el.style.display = (el.style.display === "block") ? "none" : "block";
        }
    };

    // Función para filtrar pacientes según el buscador
    window.filtrarPacientes = () => {
        const busqueda = document.getElementById("buscador").value.toLowerCase();
        const tarjetas = document.querySelectorAll(".paciente-card");

        tarjetas.forEach(tarjeta => {
            const contenido = tarjeta.innerText.toLowerCase();
            tarjeta.style.display = contenido.includes(busqueda) ? "flex" : "none";
        });

        // Si el usuario escribe algo, abrimos todas las listas para que vea los resultados
        if (busqueda.length > 0) {
            const listas = document.querySelectorAll(".paciente-lista");
            listas.forEach(lista => {
                if (lista.style.display !== "block") {
                    lista.style.display = "block";
                }
            });
        }
    };

    // --- LÓGICA PRINCIPAL PARA RENDERIZAR PACIENTES ---

    // Esta función se ejecuta cuando la página carga
    document.addEventListener('DOMContentLoaded', () => {
        console.log("Cargando datos de pacientes de demostración...");

        const grupos = { activos: [], desprendimiento: [], abandonos: [], fugas: [], movilizaciones: [] };
        
        // 1. Clasificar pacientes en grupos
        mockPacientes.forEach(p => {
            const estado = p.estado || "activos";
            if (grupos[estado]) {
                grupos[estado].push(p);
            }
        });

        // 2. Renderizar cada grupo en el HTML
        Object.keys(grupos).forEach(cat => {
            const div = document.getElementById(`lista-${cat}`);
            const count = document.getElementById(`count-${cat}`);
            
            if (!div || !count) {
                console.error(`Elemento no encontrado para la categoría: ${cat}`);
                return;
            }

            count.innerText = grupos[cat].length;
            
            if (grupos[cat].length === 0) {
                div.innerHTML = "<p style='color:gray; padding:10px;'>Vacío</p>";
            } else {
                let cardsHTML = '';
                grupos[cat].forEach(p => {
                    const imagenUrl = p.fotoURL || 'https://via.placeholder.com/50';
                    cardsHTML += `
                        <div class="paciente-card">
                            <div style="display:flex; align-items:center; text-align:left;">
                                <img src="${imagenUrl}" style="width:45px; height:45px; border-radius:50%; object-fit:cover; margin-right:12px; border:2px solid #ddd;">
                                <div>
                                    <strong>${p.nombre}</strong>
                                </div>
                            </div>
                            <button class="btn-ver" onclick="alert('La vista de perfil está deshabilitada en el modo de demostración. ID Paciente: ${p.id}')">
                                📂 Abrir
                            </button>
                        </div>`;
                });
                div.innerHTML = cardsHTML;
            }
        });
        console.log("Datos de demostración cargados.");
    });
</script>
</body>
</html>
