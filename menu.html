<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú de Pacientes</title>
    <!-- Librerías estables -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; }
        nav { background: #2c3e50; padding: 15px; display: flex; justify-content: center; gap: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        nav a { color: white; text-decoration: none; font-weight: bold; }
        .container { padding: 20px; max-width: 600px; margin: auto; }
        .paciente-card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; display: flex; align-items: center; gap: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-left: 5px solid #2980b9; }
        .paciente-card img { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; border: 2px solid #ddd; }
        .info { flex-grow: 1; }
        .info strong { font-size: 18px; color: #2c3e50; }
        .btn-ver { background: #2980b9; color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<nav>
    <a href="index.html">📝 Registro</a>
    <a href="menu.html">📋 Ver Pacientes</a>
</nav>

<div class="container">
    <h2 style="text-align: center; color: #2c3e50;">Pacientes Registrados</h2>
    <div id="listaPacientes" style="text-align: center; color: #7f8c8d; font-style: italic;">Buscando en la base de datos...</div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyC78y2K4T9rMFMVsG_UQxTmPANzV7Yapf8",
        authDomain: "://firebaseapp.com",
        projectId: "caminosnuevosdatabase",
        storageBucket: "caminosnuevosdatabase.firebasestorage.app",
        appId: "1:907500835423:web:f50b459a84f5d7d92a81ea"
    };

    // Inicializar Firebase
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();

    // Función para leer pacientes
    db.collection("pacientes").onSnapshot((snapshot) => {
        const lista = document.getElementById("listaPacientes");
        
        if (snapshot.empty) {
            lista.innerHTML = "No hay pacientes registrados aún.";
            return;
        }

        lista.innerHTML = ""; // Limpiar el "Cargando"
        
        snapshot.forEach((doc) => {
            const p = doc.data();
            lista.innerHTML += `
                <div class="paciente-card">
                    <img src="${p.foto || 'https://placeholder.com'}" alt="Foto">
                    <div class="info">
                        <strong>${p.nombre}</strong><br>
                        <small>Registrado el: ${p.fecha || 'N/A'}</small>
                    </div>
                    <button class="btn-ver" onclick="location.href='carpetas.html?id=${doc.id}'">📂 Ver</button>
                </div>
            `;
        });
    }, (error) => {
        console.error("Error de Firebase:", error);
        document.getElementById("listaPacientes").innerHTML = "Error de conexión: " + error.message;
    });
</script>
</body>
</html>
</body>
</html>
