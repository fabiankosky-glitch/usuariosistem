<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Maestro RA22 - Camino</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #fdf6f0; margin: 0; padding: 20px; color: #333; }
        .header { background-color: #2c3e50; padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; color: white; }
        .header button { background-color: #3498db; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-size: 16px; }
        .header button:hover { background-color: #2980b9; }
        .main-title { text-align: center; margin: 20px 0; color: #d35400; }
        .main-title h2 { font-size: 24px; font-weight: bold; }
        .main-title .fa-pills { margin-right: 10px; }
        .paciente-card { background-color: #fff; border: 2px solid #f39c12; border-radius: 10px; margin-bottom: 20px; padding: 20px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .paciente-info { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; }
        .paciente-details h3 { margin: 0 0 5px 0; font-size: 22px; color: #2c3e50; }
        .paciente-status { font-size: 14px; font-weight: bold; color: #27ae60; }
        .paciente-status .dot { height: 10px; width: 10px; background-color: #27ae60; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .paciente-actions { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
        .paciente-actions button { border: none; padding: 8px 12px; border-radius: 5px; color: white; cursor: pointer; font-size: 12px; font-weight: bold; display: flex; align-items: center; gap: 5px; }
        .btn-por-medicar { background-color: #95a5a6; } 
        .btn-medicado { background-color: #e74c3c; } 
        .btn-agregar { background-color: #2ecc71; } 
        .btn-historial { background-color: #3498db; } 
        .btn-ultimo-ra22 { background-color: #34495e; }

        .historial-container { display: none; margin-top: 20px; padding: 15px; background-color: #eaf5ff; border: 1px solid #3498db; border-radius: 8px; }
        .historial-container.visible { display: block; }
        .historial-header { font-weight: bold; font-size: 18px; margin-bottom: 10px; color: #2980b9; }
        .historial-content ul { list-style-type: none; padding: 0; }
        .historial-content li { background: #fff; padding: 8px; border-radius: 4px; margin-bottom: 5px; }
        .btn-cerrar-historial { display: block; margin: 10px auto 0; background: none; border: none; color: #3498db; cursor: pointer; }
    </style>
    <script type="module">
        import { auth } from './firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = 'login.html';
            }
        });
    </script>
</head>
<body>
    <div class="header"><button onclick="window.location.href='libros.html'">&larr; Volver al Menú de Libros</button></div>
    <div class="main-title"><h2><i class="fas fa-pills"></i> LIBRO CORRECTO: GESTIÓN INTEGRAL Y RA22</h2></div>
    <div id="pacientes-lista"></div>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, getDocs, doc, query, where, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const pacientesLista = document.getElementById('pacientes-lista');

        function createPatientCard(paciente, pacienteId) {
            const isMedicated = paciente.medicadoHoy || false;
            const medicadoBtnClass = isMedicated ? 'btn-medicado' : 'btn-por-medicar';
            const medicadoBtnIcon = isMedicated ? 'fa-check-circle' : 'fa-pills';
            const medicadoBtnText = isMedicated ? 'MEDICADO' : 'POR MEDICAR';
            
            return `
                <div class="paciente-card" id="paciente-${pacienteId}">
                    <div class="paciente-info">
                        <div class="paciente-details"><h3>${paciente.nombre}</h3><div class="paciente-status"><span class="dot"></span>PACIENTE ACTIVO</div></div>
                        <div class="paciente-actions">
                            <button id="med-btn-${pacienteId}" class="${medicadoBtnClass}"><i class="fas ${medicadoBtnIcon}"></i> ${medicadoBtnText}</button>
                            <button class="btn-agregar" onclick="location.href='registro_medicamentos.html?id=${pacienteId}'"><i class="fas fa-plus"></i> AGREGAR</button>
                            <button class="btn-historial" onclick="toggleHistorial('${pacienteId}')"><i class="fas fa-book-medical"></i> HISTORIAL</button>
                            <button class="btn-ultimo-ra22" onclick="mostrarUltimoRA22('${pacienteId}', '${paciente.nombre}')"><i class="fas fa-file-alt"></i> ULTIMO RA22</button>
                        </div>
                    </div>
                    <div class="historial-container" id="historial-${pacienteId}">
                        <div class="historial-header"><i class="fas fa-history"></i> Historial de Tratamientos: ${paciente.nombre}</div>
                        <div class="historial-content">Cargando historial...</div>
                        <button class="btn-cerrar-historial" onclick="toggleHistorial('${pacienteId}')">Cerrar Historial</button>
                    </div>
                </div>
            `;
        }

        async function cargarPacientes() {
            pacientesLista.innerHTML = '<p>Cargando pacientes...</p>';
            try {
                const q = query(collection(db, "pacientes"), where("estado", "==", "activos"));
                const querySnapshot = await getDocs(q);
                if (querySnapshot.empty) {
                    pacientesLista.innerHTML = '<p>No hay pacientes activos.</p>';
                    return;
                }
                
                pacientesLista.innerHTML = '';
                for (const doc of querySnapshot.docs) {
                    const paciente = doc.data();
                    const medicadoHoy = await verificarMedicadoHoy(doc.id);
                    paciente.medicadoHoy = medicadoHoy;
                    pacientesLista.innerHTML += createPatientCard(paciente, doc.id);
                }
            } catch (error) { 
                console.error("Error cargando pacientes: ", error); 
                pacientesLista.innerHTML = '<p style="color: red;">Error al cargar pacientes. Es posible que falten índices en Firestore.</p>'; 
            }
        }

        async function verificarMedicadoHoy(pacienteId) {
            const hoy = new Date();
            const inicioHoy = new Date(hoy.setHours(0, 0, 0, 0)).toISOString();
            const finHoy = new Date(hoy.setHours(23, 59, 59, 999)).toISOString();
            const q = query(collection(db, "medicamentos"), where("pacienteId", "==", pacienteId), where("fecha", ">=", inicioHoy), where("fecha", "<=", finHoy));
            const snap = await getDocs(q);
            return !snap.empty;
        }

        window.toggleHistorial = async (pacienteId) => {
            const histDiv = document.getElementById(`historial-${pacienteId}`);
            const histContent = histDiv.querySelector('.historial-content');
            const isVisible = histDiv.classList.toggle('visible');
            
            if (isVisible && histContent.innerHTML.includes('Cargando')) {
                try {
                    const q = query(collection(db, "medicamentos"), where('pacienteId', '==', pacienteId), orderBy("fecha", "desc"), limit(5));
                    const snap = await getDocs(q);
                    if (snap.empty) { 
                        histContent.innerHTML = 'No hay registros de medicamentos.'; 
                        return; 
                    }
                    histContent.innerHTML = '<ul>' + snap.docs.map(d => `<li><strong>${new Date(d.data().fecha).toLocaleDateString('es-CO')} ${new Date(d.data().fecha).toLocaleTimeString('es-CO')}</strong>: ${d.data().nombreProducto} - ${d.data().salidas}</li>`).join('') + '</ul>';
                } catch (e) { 
                    console.error("Error al cargar historial: ", e);
                    histContent.innerHTML = 'Error al cargar el historial.'; 
                }
            }
        };

        window.mostrarUltimoRA22 = async (pacienteId, pacienteNombre) => {
            try {
                const q = query(collection(db, "medicamentos"), where("pacienteId", "==", pacienteId), orderBy("fecha", "desc"), limit(1));
                const snap = await getDocs(q);

                if (snap.empty) {
                    alert("No hay registros de medicamentos para este paciente.");
                    return;
                }

                const ultimoMedicamento = snap.docs[0].data();
                const fecha = new Date(ultimoMedicamento.fecha).toLocaleString('es-CO');

                const ra22HTML = `
                    <!DOCTYPE html>
                    <html lang="es">
                    <head>
                        <meta charset="UTF-8">
                        <title>Informe RA22 - ${pacienteNombre}</title>
                        <style>
                            body { font-family: sans-serif; }
                            .container { padding: 20px; border: 1px solid #ccc; }
                            h1 { text-align: center; }
                            .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
                            .info-item { padding: 10px; border: 1px solid #eee; }
                        </style>
                    </head>
                    <body>
                        <div class="container">
                            <h1>Informe de Administración de Medicamentos (RA22)</h1>
                            <div class="info-grid">
                                <div class="info-item"><strong>Paciente:</strong> ${pacienteNombre}</div>
                                <div class="info-item"><strong>Fecha y Hora:</strong> ${fecha}</div>
                                <div class="info-item"><strong>Medicamento:</strong> ${ultimoMedicamento.nombreProducto}</div>
                                <div class="info-item"><strong>Dosis:</strong> ${ultimoMedicamento.salidas}</div>
                                <div class="info-item"><strong>Vía:</strong> ${ultimoMedicamento.via}</div>
                                <div class="info-item"><strong>Firma (Administró):</strong> ${ultimoMedicamento.firma}</div>
                            </div>
                        </div>
                    </body>
                    </html>
                `;

                const ra22Window = window.open("", "_blank");
                ra22Window.document.write(ra22HTML);
                ra22Window.document.close();

            } catch (error) {
                console.error("Error al generar el informe RA22: ", error);
                alert("No se pudo generar el informe.");
            }
        };
        
        cargarPacientes();
    </script>
</body>
</html>
