<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Maestro RA22 - Camino</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fdf6f0;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .header {
            background-color: #2c3e50;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: white;
        }
        .header button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        .header button:hover {
            background-color: #2980b9;
        }
        .main-title {
            text-align: center;
            margin: 20px 0;
            color: #d35400; /* Naranja oscuro */
        }
        .main-title h2 {
            font-size: 24px;
            font-weight: bold;
        }
        .main-title .fa-pills {
            margin-right: 10px;
        }
        .paciente-card {
            background-color: #fff;
            border: 2px solid #f39c12; /* Borde naranja */
            border-radius: 10px;
            margin-bottom: 20px;
            padding: 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .paciente-info {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
        }
        .paciente-details h3 {
            margin: 0 0 5px 0;
            font-size: 22px;
            color: #2c3e50;
        }
        .paciente-status {
            font-size: 14px;
            font-weight: bold;
            color: #27ae60; /* Verde */
        }
        .paciente-status .dot {
            height: 10px;
            width: 10px;
            background-color: #27ae60;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }
        .paciente-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        .paciente-actions button {
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            color: white;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .btn-por-medicar { background-color: #bdc3c7; } /* Gris claro */
        .btn-medicado { background-color: #e74c3c; } /* Rojo */
        .btn-agregar { background-color: #2ecc71; } /* Verde */
        .btn-historial { background-color: #3498db; } /* Azul */
        .btn-ultimo-ra22 { background-color: #34495e; } /* Azul oscuro/gris */

        .historial-container {
            display: none;
            margin-top: 20px;
            padding: 15px;
            background-color: #eaf5ff; /* Azul claro */
            border: 1px solid #3498db; /* Borde azul */
            border-radius: 8px;
        }
        .historial-container.visible {
            display: block;
        }
        .historial-header {
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 10px;
            color: #2980b9;
        }
        .historial-content {
            font-size: 16px;
        }
        .historial-content ul {
            list-style-type: none;
            padding: 0;
        }
        .historial-content li {
            background: #fff;
            padding: 8px;
            border-radius: 4px;
            margin-bottom: 5px;
        }
        .btn-cerrar-historial {
            display: block;
            margin: 10px auto 0;
            background: none;
            border: none;
            color: #3498db;
            cursor: pointer;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="header">
        <button onclick="window.location.href='menu.html'">&larr; Volver al Menú</button>
    </div>

    <div class="main-title">
        <h2><i class="fas fa-pills"></i> LIBRO CORRECTO: GESTIÓN INTEGRAL Y RA22</h2>
    </div>

    <div id="pacientes-lista">
        <!-- Los pacientes se cargarán aquí dinámicamente -->
    </div>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, getDocs, doc, query, where, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const pacientesLista = document.getElementById('pacientes-lista');

        // Helper function to create patient card HTML
        function createPatientCard(paciente, pacienteId) {
            const isMedicated = paciente.medicadoHoy || false; // Assume a field 'medicadoHoy'
            const medicadoBtnClass = isMedicated ? 'btn-medicado' : 'btn-por-medicar';
            const medicadoBtnIcon = isMedicated ? 'fa-check-circle' : 'fa-clock';
            const medicadoBtnText = isMedicated ? 'MEDICADO' : 'POR MEDICAR';

            return `
                <div class="paciente-card" id="paciente-${pacienteId}">
                    <div class="paciente-info">
                        <div class="paciente-details">
                            <h3>${paciente.nombre}</h3>
                            <div class="paciente-status"><span class="dot"></span>PACIENTE ACTIVO</div>
                        </div>
                        <div class="paciente-actions">
                            <button id="med-btn-${pacienteId}" class="${medicadoBtnClass}" onclick="toggleMedicationStatus('${pacienteId}', ${!isMedicated})">
                                <i class="fas ${medicadoBtnIcon}"></i> ${medicadoBtnText}
                            </button>
                            <button class="btn-agregar" onclick="location.href='libro_de_turno.html?id=${pacienteId}'"><i class="fas fa-plus"></i> AGREGAR</button>
                            <button class="btn-historial" onclick="toggleHistorial('${pacienteId}')"><i class="fas fa-book-medical"></i> HISTORIAL</button>
                            <button class="btn-ultimo-ra22" onclick="location.href='libro_de_turno.html?id=${pacienteId}'"><i class="fas fa-file-alt"></i> ULTIMO RA22</button>
                        </div>
                    </div>
                    <div class="historial-container" id="historial-${pacienteId}">
                        <div class="historial-header"><i class="fas fa-history"></i> Historial de Tratamientos: ${paciente.nombre}</div>
                        <div class="historial-content">Cargando historial...</div>
                        <button class="btn-cerrar-historial" onclick="toggleHistorial('${pacienteId}')">Cerrar Historial</button>
                    </div>
                </div>
            `;
        }
        
        // Function to load patients
        async function cargarPacientes() {
            pacientesLista.innerHTML = '<p style="text-align:center;">Cargando pacientes...</p>';
            try {
                const q = query(collection(db, "pacientes"), where("estado", "==", "activos"));
                const querySnapshot = await getDocs(q);

                if (querySnapshot.empty) {
                    pacientesLista.innerHTML = '<p style="text-align:center;">No hay pacientes activos en este momento.</p>';
                    return;
                }

                pacientesLista.innerHTML = ''; // Clear loading message
                querySnapshot.forEach(doc => {
                    pacientesLista.innerHTML += createPatientCard(doc.data(), doc.id);
                });
            } catch (error) {
                console.error("Error cargando pacientes: ", error);
                pacientesLista.innerHTML = '<p style="text-align:center; color: red;">Error al cargar los pacientes.</p>';
            }
        }

        // Function for Historial button
        window.toggleHistorial = async (pacienteId) => {
            const historialDiv = document.getElementById(`historial-${pacienteId}`);
            if (!historialDiv) return;

            const historialContent = historialDiv.querySelector('.historial-content');
            const isVisible = historialDiv.classList.toggle('visible');

            // Fetch data only if opening and not already loaded
            if (isVisible && historialContent.innerHTML === 'Cargando historial...') {
                try {
                    // Assuming medication logs are in a 'medicamentos' collection
                    const q = query(collection(db, "medicamentos"), where("pacienteId", "==", pacienteId));
                    const querySnapshot = await getDocs(q);
                    
                    if (querySnapshot.empty) {
                        historialContent.innerHTML = 'No hay historial de medicamentos para este paciente.';
                    } else {
                        let html = '<ul>';
                        let registros = [];
                        querySnapshot.forEach(doc => registros.push(doc.data()));
                        // Sort by date, newest first
                        registros.sort((a,b) => b.fecha - a.fecha);

                        registros.forEach(data => {
                            const fecha = new Date(data.fecha).toLocaleString('es-CO');
                            html += `<li><strong>${fecha}:</strong> ${data.nombreProducto || 'N/A'} - Salida: ${data.salidas || 0}</li>`;
                        });
                        html += '</ul>';
                        historialContent.innerHTML = html;
                    }
                } catch (e) {
                    historialContent.innerHTML = 'Error al cargar el historial.';
                    console.error("Error fetching history: ", e);
                }
            }
        };

        // Function for "POR MEDICAR / MEDICADO" button
        window.toggleMedicationStatus = async (pacienteId, newStatus) => {
            const pacienteRef = doc(db, "pacientes", pacienteId);
            const medBtn = document.getElementById(`med-btn-${pacienteId}`);
            
            try {
                // Update the patient's status in Firestore
                await updateDoc(pacienteRef, {
                    medicadoHoy: newStatus 
                });

                // Update the button UI
                medBtn.classList.toggle('btn-por-medicar', !newStatus);
                medBtn.classList.toggle('btn-medicado', newStatus);
                medBtn.innerHTML = newStatus 
                    ? `<i class="fas fa-check-circle"></i> MEDICADO` 
                    : `<i class="fas fa-clock"></i> POR MEDICAR`;
                // Update the onclick attribute for the next toggle
                medBtn.setAttribute('onclick', `toggleMedicationStatus('${pacienteId}', ${!newStatus})`);

            } catch (error) {
                console.error("Error al actualizar estado:", error);
                alert("No se pudo actualizar el estado. Revise la conexión.");
            }
        };

        // Initial load
        cargarPacientes();
    </script>
</body>
</html>
