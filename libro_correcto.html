<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Maestro RA22 - Camino</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #fdf6f0; margin: 0; padding: 20px; color: #333; }
        .header { background-color: #2c3e50; padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; color: white; }
        .header button { background-color: #3498db; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-size: 16px; }
        .header button:hover { background-color: #2980b9; }
        .main-title { text-align: center; margin: 20px 0; color: #d35400; }
        .main-title h2 { font-size: 24px; font-weight: bold; }
        .main-title .fa-pills { margin-right: 10px; }
        .paciente-card { background-color: #fff; border: 2px solid #f39c12; border-radius: 10px; margin-bottom: 20px; padding: 20px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .paciente-info { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; }
        .paciente-details h3 { margin: 0 0 5px 0; font-size: 22px; color: #2c3e50; }
        .paciente-status { font-size: 14px; font-weight: bold; color: #27ae60; }
        .paciente-status .dot { height: 10px; width: 10px; background-color: #27ae60; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .paciente-actions { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
        .paciente-actions button { border: none; padding: 8px 12px; border-radius: 5px; color: white; cursor: pointer; font-size: 12px; font-weight: bold; display: flex; align-items: center; gap: 5px; }
        .btn-por-medicar { background-color: #e74c3c; } 
        .btn-medicado { background-color: #95a5a6; } 
        .btn-5correctos { background-color: #2ecc71; } 
        .btn-historial { background-color: #3498db; } 
        .btn-registro-med { background-color: #34495e; } /* BOTON MODIFICADO */

        .historial-container { display: none; margin-top: 20px; padding: 15px; background-color: #eaf5ff; border: 1px solid #3498db; border-radius: 8px; }
        .historial-container.visible { display: block; }
        .historial-header { font-weight: bold; font-size: 18px; margin-bottom: 10px; color: #2980b9; }
        .historial-content ul { list-style-type: none; padding: 0; }
        .historial-content li { background: #fff; padding: 8px; border-radius: 4px; margin-bottom: 5px; }
        .btn-cerrar-historial { display: block; margin: 10px auto 0; background: none; border: none; color: #3498db; cursor: pointer; }
        
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.7); z-index: 1000; display: none; justify-content: center; align-items: center; overflow-y: auto; padding: 20px 0; }
        .modal-content { background-color: #fff; padding: 25px; border-radius: 10px; width: 90%; max-width: 500px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); position: relative; }
        .modal-close { position: absolute; top: 10px; right: 15px; font-size: 28px; font-weight: bold; cursor: pointer; color: #888; }
        .modal-content h3 { color: #d35400; margin-top: 0; border-bottom: 2px solid #f39c12; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; color: #555; }
        input, textarea, select { width: 100%; padding: 9px; border: 1px solid #ccc; border-radius: 5px; font-size: 14px; box-sizing: border-box; }
    </style>
</head>
<body>
    <div class="header"><button onclick="window.location.href='libros.html'">&larr; Volver a Gestión de Libros</button></div>
    <div class="main-title"><h2><i class="fas fa-pills"></i> LIBRO CORRECTO: GESTIÓN INTEGRAL Y RA22</h2></div>
    <div id="pacientes-lista"></div>

    <!-- Modal para Verificación de 5 Correctos -->
    <div id="5correctos-modal" class="modal-overlay">
        <div class="modal-content">
            <span class="modal-close" onclick="cerrarModal5Correctos()">&times;</span>
            <h3><i class="fas fa-check-double"></i> Verificación de 5 Correctos</h3>
            <p><strong>1. Paciente Correcto:</strong> <span id="5correctos-paciente-nombre" style="font-size: 1.1em; color: #000;"></span></p>
            <p><strong>2. Hora Correcta:</strong> <span id="5correctos-hora" style="font-size: 1.1em; color: #000;"></span></p>
            <div class="form-group"><label for="5correctos-medicamento">3. Medicamento Correcto</label><input type="text" id="5correctos-medicamento" required></div>
            <div class="form-group"><label for="5correctos-dosis">4. Dosis Correcta</label><input type="text" id="5correctos-dosis" placeholder="Ej: 1 comprimido, 50mg" required></div>
            <div class="form-group"><label for="5correctos-via">5. Vía Correcta</label><input type="text" id="5correctos-via" value="Oral" required></div>
            <div class="form-group"><label for="5correctos-firma">Firma (Quien administra)</label><input type="text" id="5correctos-firma" required></div>
            <button id="5correctos-confirmar-btn" class="btn-5correctos" style="width:100%; padding:12px; font-size:16px;"><i class="fas fa-check"></i> Confirmar y Medcar</button>
        </div>
    </div>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, getDocs, doc, query, where, updateDoc, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const pacientesLista = document.getElementById('pacientes-lista');

        function createPatientCard(paciente, pacienteId) {
            const isMedicated = paciente.medicadoHoy || false;
            const medicadoBtnClass = isMedicated ? 'btn-medicado' : 'btn-por-medicar';
            const medicadoBtnIcon = isMedicated ? 'fa-check-circle' : 'fa-pills';
            const medicadoBtnText = isMedicated ? 'MEDICADO' : 'POR MEDICAR';
            const medicadoOnClick = isMedicated ? `alert('Este paciente ya fue medicado hoy.')` : `abrirModal5Correctos('${pacienteId}', '${paciente.nombre}')`;

            return `
                <div class="paciente-card" id="paciente-${pacienteId}">
                    <div class="paciente-info">
                        <div class="paciente-details"><h3>${paciente.nombre}</h3><div class="paciente-status"><span class="dot"></span>PACIENTE ACTIVO</div></div>
                        <div class="paciente-actions">
                            <button id="med-btn-${pacienteId}" class="${medicadoBtnClass}" onclick="${medicadoOnClick}"><i class="fas ${medicadoBtnIcon}"></i> ${medicadoBtnText}</button>
                            <button class="btn-historial" onclick="toggleHistorial('${pacienteId}')"><i class="fas fa-book-medical"></i> HISTORIAL</button>
                            <button class="btn-registro-med" onclick="location.href='registro_medicamentos.html?id=${pacienteId}'"><i class="fas fa-file-alt"></i> REGISTRO DE MEDICAMENTOS</button>
                        </div>
                    </div>
                    <div class="historial-container" id="historial-${pacienteId}">
                        <div class="historial-header"><i class="fas fa-history"></i> Historial Rápido: ${paciente.nombre}</div>
                        <div class="historial-content">Cargando...</div>
                        <button class="btn-cerrar-historial" onclick="toggleHistorial('${pacienteId}')">Cerrar</button>
                    </div>
                </div>
            `;
        }

        window.abrirModal5Correctos = (pacienteId, pacienteNombre) => {
            document.getElementById('5correctos-paciente-nombre').innerText = pacienteNombre;
            document.getElementById('5correctos-hora').innerText = new Date().toLocaleString('es-CO');
            document.getElementById('5correctos-medicamento').value = '';
            document.getElementById('5correctos-dosis').value = '';
            document.getElementById('5correctos-firma').value = '';
            document.getElementById('5correctos-modal').style.display = 'flex';
            document.getElementById('5correctos-confirmar-btn').onclick = () => guardarVerificacion5Correctos(pacienteId);
        }

        window.cerrarModal5Correctos = () => { document.getElementById('5correctos-modal').style.display = 'none'; }

        async function guardarVerificacion5Correctos(pacienteId) {
            const firma = document.getElementById('5correctos-firma').value, med = document.getElementById('5correctos-medicamento').value, dosis = document.getElementById('5correctos-dosis').value;
            if (!firma || !med || !dosis) { alert('Por favor, complete Medicamento, Dosis y Firma.'); return; }
            try {
               await addDoc(collection(db, "medicamentos"), { pacienteId: pacienteId, fecha: new Date().toISOString(), nombreProducto: med, salidas: dosis, via: document.getElementById('5correctos-via').value, firma: firma });
               await updateMedicationStatus(pacienteId, true);
               alert("Paciente medicado y registrado correctamente.");
               cerrarModal5Correctos();
            } catch (error) { console.error("Error al guardar: ", error); alert("Error al guardar."); }
        }

        async function cargarPacientes() {
            pacientesLista.innerHTML = '<p>Cargando pacientes...</p>';
            try {
                const q = query(collection(db, "pacientes"), where("estado", "==", "activos"));
                const querySnapshot = await getDocs(q);
                pacientesLista.innerHTML = querySnapshot.empty ? '<p>No hay pacientes activos.</p>' : '';
                for (const doc of querySnapshot.docs) {
                    const paciente = doc.data();
                    const medicadoHoy = await verificarMedicadoHoy(doc.id);
                    paciente.medicadoHoy = medicadoHoy;
                    pacientesLista.innerHTML += createPatientCard(paciente, doc.id);
                }
            } catch (error) { console.error("Error cargando pacientes: ", error); pacientesLista.innerHTML = '<p style="color: red;">Error al cargar pacientes.</p>'; }
        }

        async function verificarMedicadoHoy(pacienteId) {
            const hoy = new Date();
            const inicioHoy = new Date(hoy.setHours(0, 0, 0, 0)).toISOString();
            const finHoy = new Date(hoy.setHours(23, 59, 59, 999)).toISOString();
            const q = query(collection(db, "medicamentos"), where("pacienteId", "==", pacienteId), where("fecha", ">=", inicioHoy), where("fecha", "<=", finHoy));
            const snap = await getDocs(q);
            return !snap.empty;
        }

        window.toggleHistorial = async (pacienteId) => {
            const histDiv = document.getElementById(`historial-${pacienteId}`);
            const histContent = histDiv.querySelector('.historial-content');
            const isVisible = histDiv.classList.toggle('visible');
            if (isVisible && histContent.innerHTML.includes('Cargando')) {
                try {
                    const q = query(collection(db, "medicamentos"), where('pacienteId', '==', pacienteId), orderBy("fecha", "desc"), limit(5));
                    const snap = await getDocs(q);
                    if (snap.empty) { histContent.innerHTML = 'No hay registros.'; return; }
                    histContent.innerHTML = '<ul>' + snap.docs.map(d => `<li><strong>${new Date(d.data().fecha).toLocaleTimeString('es-CO')}</strong>: ${d.data().nombreProducto} - ${d.data().salidas}</li>`).join('') + '</ul>';
                } catch (e) { histContent.innerHTML = 'Error al cargar historial.'; }
            }
        };
        
        async function updateMedicationStatus(pacienteId, newStatus) {
             const medBtn = document.getElementById(`med-btn-${pacienteId}`);
             if (medBtn) {
                medBtn.classList.toggle('btn-por-medicar', !newStatus);
                medBtn.classList.toggle('btn-medicado', newStatus);
                medBtn.innerHTML = newStatus ? `<i class="fas fa-check-circle"></i> MEDICADO` : `<i class="fas fa-pills"></i> POR MEDICAR`;
                if(newStatus) medBtn.onclick = () => alert('Este paciente ya fue medicado hoy.');
            }
        }

        cargarPacientes();
    </script>
</body>
</html>
