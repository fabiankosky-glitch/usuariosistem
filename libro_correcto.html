<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Libro Correcto - Sistema RA22 Integral</title>
    
    <!-- LIBRERÍAS DE PDF (VERSIONES ESTABLES) -->
    <script src="https://cloudflare.com"></script>
    <script src="https://cloudflare.com"></script>
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #fdf2e9; padding: 15px; margin: 0; }
        .container { max-width: 850px; margin: auto; }
        h2 { text-align: center; color: #d35400; text-transform: uppercase; font-size: 18px; }
        
        .usuario-item { background: white; padding: 15px; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-left: 8px solid #e67e22; }
        .header-user { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        
        .btn-group { display: flex; gap: 5px; }
        .btn-accion { padding: 8px 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; font-size: 11px; color: white; transition: 0.3s; }
        
        .estado-si { background: #e74c3c; box-shadow: 0 0 10px rgba(231,76,60,0.3); }
        .estado-no { background: #95a5a6; }
        .btn-agregar { background: #27ae60; }
        .btn-reporte { background: #2c3e50; }

        .carpeta-registro { display: none; background: #fff; padding: 20px; border-radius: 15px; border: 2px solid #27ae60; margin-top: 15px; }
        .bloque-med { background: #fef9f5; border: 1px solid #f39c12; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .visible { display: block; }
        
        .subtitulo { background: #d35400; color: white; padding: 5px 10px; border-radius: 4px; font-size: 12px; font-weight: bold; margin-bottom: 10px; display: inline-block; }
        .grid-campos { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; }
        label { font-size: 9px; font-weight: bold; color: #555; display: block; margin-bottom: 2px; text-transform: uppercase; }
        input { width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box; font-size: 12px; }

        /* MODAL VISTA PRELIMINAR */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); }
        .modal-content { background: white; margin: 5% auto; padding: 20px; width: 90%; max-width: 1000px; border-radius: 15px; max-height: 85vh; overflow-y: auto; }
        .tabla-previa { width: 100%; border-collapse: collapse; font-size: 10px; margin-top: 10px; }
        .tabla-previa th, .tabla-previa td { border: 1px solid #ddd; padding: 6px; text-align: center; }
        .tabla-previa th { background: #d35400; color: white; }
    </style>
</head>
<body>

<div class="container">
    <button style="width:100%; padding:12px; margin-bottom:15px; background:#2c3e50; color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer;" onclick="location.href='libros.html'">⬅ Volver al Menú de Libros</button>
    <h2>💊 Libro Correcto: Sistema Integral RA22</h2>
    <div id="listaPacientes">Sincronizando con la nube...</div>
</div>

<!-- VENTANA DE VISTA PRELIMINAR -->
<div id="modalVista" class="modal">
    <div class="modal-content">
        <h3 style="color:#d35400; margin:0;">👁️ Vista Preliminar: Proyección RA22</h3>
        <p id="infoP" style="font-size:12px; margin-top:5px;"></p>
        <div style="overflow-x: auto;">
            <table class="tabla-previa" id="tablaP"></table>
        </div>
        <button class="btn-accion" id="btnDescargar" style="background:#e74c3c; width:100%; padding:15px; margin-top:15px; font-size:16px;">🖨️ CONFIRMAR E IMPRIMIR REPORTE RA22</button>
        <button onclick="document.getElementById('modalVista').style.display='none'" style="width:100%; background:none; border:none; color:grey; padding:10px; cursor:pointer;">Cerrar Vista</button>
    </div>
</div>

   <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import {getFirestore, collection, onSnapshot, addDoc, updateDoc, doc, query, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        const firebaseConfig = {
            apiKey: "AIzaSyC78y2m79f9764f-YTuPYfP",
            authDomain: "caminosnuevosdatabase.firebaseapp.com",
            projectId: "caminosnuevosdatabase",
            storageBucket: "caminosnuevosdatabase.firebasestorage.app",
            appId: "1:907500835423:web:f56b459ab4d57d92a81ea"
        };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    onSnapshot(collection(db, "pacientes"), (snap) => {
        const contenedor = document.getElementById('listaPacientes');
        contenedor.innerHTML = "";
        snap.forEach(d => {
            const p = d.data();
            if ((p.estado || "").toLowerCase().includes("activo")) {
                const esM = p.medicado === "si";
                const item = document.createElement('div');
                item.className = "usuario-item";
                item.innerHTML = `
                    <div class="header-user">
                        <div><b>${p.nombre}</b><br><small style="color:#27ae60;">● PACIENTE ACTIVO</small></div>
                        <div class="btn-group">
                            <button class="btn-accion ${esM ? 'estado-si' : 'estado-no'}" style="cursor:default">${esM ? '💊 MEDICADO' : '⚪ POR MEDICAR'}</button>
                            <button class="btn-accion btn-agregar" onclick="abrirC('${d.id}')">➕ AGREGAR</button>
                            <button class="btn-accion btn-reporte" onclick="previsualizar('${p.nombre}')">📄 REPORTE RA22</button>
                        </div>
                    </div>
                    <div id="f_${d.id}" class="carpeta-registro">
                        <div id="c_meds_${d.id}">${generarBloque(d.id)}</div>
                        <button style="width:100%; background:#e67e22; color:white; border:none; padding:10px; border-radius:8px; margin-bottom:10px; font-weight:bold; cursor:pointer;" onclick="masMed('${d.id}')">➕ AÑADIR OTRO MEDICAMENTO AL MISMO PACIENTE</button>
                        <button class="btn-accion" style="background:#27ae60; width:100%; padding:15px; font-size:16px;" onclick="guardarTodo('${d.id}', '${p.nombre}')">💾 GUARDAR REGISTRO COMPLETO</button>
                    </div>
                `;
                contenedor.appendChild(item);
            }
        });
    });

    function generarBloque(id) {
        return `
        <div class="bloque-med">
            <div class="subtitulo">I. PROTOCOLO DE SUMINISTRO (8 CORRECTOS)</div>
            <div class="grid-campos">
                <div><label>Fecha Dosis:</label><input type="date" class="f_i"></div>
                <div><label>Medicamento:</label><input type="text" class="m_n"></div>
                <div><label>Cantidad:</label><input type="text" class="m_c"></div>
                <div><label>Dosis:</label><input type="text" class="m_d"></div>
                <div><label>Hora:</label><input type="time" class="m_h"></div>
                <div><label>Vía:</label><input type="text" class="m_v"></div>
                <div><label>Proveedor:</label><input type="text" class="m_p"></div>
            </div>
            <div class="subtitulo" style="margin-top:10px; background:#2980b9;">II. TRAZABILIDAD TÉCNICA E INVENTARIO</div>
            <div class="grid-campos">
                <div><label>Nombre Producto:</label><input type="text" class="t_n"></div>
                <div><label>Presentación:</label><input type="text" class="t_p"></div>
                <div><label>Comp. Activo:</label><input type="text" class="t_a"></div>
                <div><label>Reg. INVIMA:</label><input type="text" class="t_i"></div>
                <div><label>Lote:</label><input type="text" class="t_l"></div>
                <div><label>Vencimiento:</label><input type="date" class="t_v"></div>
                <div><label>Casa Matriz:</label><input type="text" class="t_cas"></div>
                <div><label>Estado Pres.:</label><input type="text" class="t_e"></div>
                <div><label>Cant. Inicial:</label><input type="number" class="t_ci"></div>
                <div><label>Salida (Día):</label><input type="number" class="t_s"></div>
                <div><label>Cant. Final:</label><input type="number" class="t_cf"></div>
            </div>
        </div>`;
    }

    window.abrirC = (id) => document.getElementById(`f_${id}`).classList.toggle('visible');
    window.masMed = (id) => {
        const div = document.createElement('div');
        div.innerHTML = generarBloque(id);
        document.getElementById(`c_meds_${id}`).appendChild(div);
    };

    window.guardarTodo = async (id, nombre) => {
        const bloques = document.querySelectorAll(`#c_meds_${id} .bloque-med`);
        for (let b of bloques) {
            const medNom = b.querySelector('.m_n').value;
            if(!medNom) continue;

            const data = {
                paciente: nombre,
                f_inicio: b.querySelector('.f_i').value,
                producto: b.querySelector('.t_n').value,
                presentacion: b.querySelector('.t_p').value,
                lote: b.querySelector('.t_l').value,
                invima: b.querySelector('.t_i').value,
                vence: b.querySelector('.t_v').value,
                casa: b.querySelector('.t_cas').value,
                proveedor: b.querySelector('.m_p').value,
                cant_ini: parseInt(b.querySelector('.t_ci').value) || 0,
                salida: parseInt(b.querySelector('.t_s').value) || 0,
                componente: b.querySelector('.t_a').value,
                estado: b.querySelector('.t_e').value,
                creado: Date.now()
            };
            await addDoc(collection(db, "libro_correcto"), data);
        }
        await updateDoc(doc(db, "pacientes", id), { medicado: "si" });
        alert("✅ Medicamentos registrados. Paciente marcado como MEDICADO.");
        location.reload();
    };

    window.previsualizar = async (nombre) => {
        const q = query(collection(db, "libro_correcto"), where("paciente", "==", nombre), orderBy("creado", "desc"));
        const snap = await getDocs(q);
        if(snap.empty) return alert("No existen registros para este paciente.");

        const modal = document.getElementById('modalVista');
        const tabla = document.getElementById('tablaP');
        const r = snap.docs[0].data(); // Último registro
        
        document.getElementById('infoP').innerText = `Paciente: ${nombre} | Producto: ${r.producto} | Lote: ${r.lote}`;
        
        let html = `<tr><th>Fecha</th><th>Producto</th><th>C.Ini</th><th>Sal</th><th>C.Fin</th><th>Firma</th></tr>`;
        let c = r.cant_ini;
        let f = new Date(r.f_inicio);
        const filasPDF = [];

        while(c > 0) {
            let s = Math.min(c, r.salida || 1);
            let fin = c - s;
            html += `<tr><td>${f.toLocaleDateString()}</td><td>${r.producto}</td><td>${c}</td><td>${s}</td><td>${fin}</td><td>_______</td></tr>`;
            filasPDF.push([f.toLocaleDateString(), r.producto, r.lote, r.invima, r.vence, c, s, fin, "________________"]);
            c = fin;
            f.setDate(f.getDate() + 1);
        }

        tabla.innerHTML = html;
        modal.style.display = 'block';

        document.getElementById('btnDescargar').onclick = () => {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('l', 'mm', 'a4');
            doc.text(`REPORTE DE TRAZABILIDAD RA22 - ${nombre}`, 14, 15);
            doc.autoTable({ 
                startY: 25, 
                head: [['Fecha', 'Producto', 'Lote', 'INVIMA', 'Vence', 'C.Ini', 'Sal', 'C.Fin', 'Firma']], 
                body: filasPDF, 
                theme: 'grid', 
                styles: {fontSize: 7} 
            });
            doc.save(`RA22_${nombre}.pdf`);
        };
    };
</script>
</body>
</html>
