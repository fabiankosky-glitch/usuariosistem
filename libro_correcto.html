<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Libro Correcto Pro - Reporte RA22</title>
    
    <!-- LIBRERÍAS CORREGIDAS PARA EVITAR EL ERROR DE CONSOLA -->
    <script src="https://unpkg.com"></script>
    <script src="https://unpkg.com"></script>
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #fdf2e9; padding: 15px; margin: 0; }
        .container { max-width: 850px; margin: auto; }
        h2 { text-align: center; color: #d35400; text-transform: uppercase; font-size: 18px; }
        .usuario-item { background: white; padding: 15px; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-left: 8px solid #e67e22; }
        .header-user { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .btn-group { display: flex; gap: 5px; }
        .btn-accion { padding: 8px 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; font-size: 11px; color: white; transition: 0.3s; }
        .estado-si { background: #e74c3c; box-shadow: 0 0 10px rgba(231,76,60,0.3); }
        .estado-no { background: #95a5a6; }
        .btn-agregar { background: #27ae60; }
        .btn-reporte { background: #2c3e50; }
        .carpeta-registro { display: none; background: #fff; padding: 20px; border-radius: 15px; border: 2px solid #27ae60; margin-top: 15px; }
        .visible { display: block; }
        .seccion-titulo { background: #e67e22; color: white; padding: 8px; border-radius: 5px; font-size: 12px; margin: 15px 0 10px 0; font-weight: bold; text-align: center; }
        .grid-campos { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; }
        label { font-size: 9px; font-weight: bold; color: #555; display: block; margin-bottom: 2px; text-transform: uppercase; }
        input { width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box; font-size: 12px; }
        .btn-guardar-final { background: #27ae60; color: white; width: 100%; padding: 15px; margin-top: 20px; border-radius: 10px; font-size: 15px; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <button style="width:100%; padding:10px; margin-bottom:15px; background:#2c3e50; color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer;" onclick="location.href='libros.html'">⬅ Volver al Menú</button>
    <h2>💊 Libro Correcto: Protocolo RA22 Proyectado</h2>
    <div id="listaPacientes">Iniciando sistema...</div>
</div>

   <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, updateDoc, doc, query, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        const firebaseConfig = {
            apiKey: "AIzaSyC78y2m79f9764f-YTuPYfP",
            authDomain: "caminosnuevosdatabase.firebaseapp.com",
            projectId: "caminosnuevosdatabase",
            storageBucket: "caminosnuevosdatabase.firebasestorage.app",
            appId: "1:907500835423:web:f56b459ab4d57d92a81ea"
        };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    onSnapshot(collection(db, "pacientes"), (snap) => {
        const contenedor = document.getElementById('listaPacientes');
        contenedor.innerHTML = "";
        snap.forEach(d => {
            const p = d.data();
            if ((p.estado || "").toLowerCase().includes("activo")) {
                const esMedicado = p.medicado === "si";
                const item = document.createElement('div');
                item.className = "usuario-item";
                item.innerHTML = `
                    <div class="header-user">
                        <div><b>${p.nombre}</b><br><small style="color:#27ae60;">● PACIENTE ACTIVO</small></div>
                        <div class="btn-group">
                            <button class="btn-accion ${esMedicado ? 'estado-si' : 'estado-no'}" style="cursor:default">
                                ${esMedicado ? '💊 MEDICADO' : '⚪ POR MEDICAR'}
                            </button>
                            <button class="btn-accion btn-agregar" onclick="abrirCarpeta('${d.id}')">➕ AGREGAR</button>
                            <button class="btn-accion btn-reporte" onclick="generarRA22('${p.nombre}')">📄 REPORTE RA22</button>
                        </div>
                    </div>

                    <div id="form_${d.id}" class="carpeta-registro">
                        <div class="seccion-titulo">ESTRUCTURA DE SUMINISTRO Y TRAZABILIDAD RA22</div>
                        <div class="grid-campos">
                            <div><label>Fecha Primer Dosis:</label><input type="date" id="fec_${d.id}"></div>
                            <div><label>Nombre Producto:</label><input type="text" id="prod_${d.id}"></div>
                            <div><label>Presentación:</label><input type="text" id="pres_${d.id}"></div>
                            <div><label>Componente Activo:</label><input type="text" id="comp_${d.id}"></div>
                            <div><label>Registro INVIMA:</label><input type="text" id="inv_${d.id}"></div>
                            <div><label>Número de Lote:</label><input type="text" id="lot_${d.id}"></div>
                            <div><label>Fecha Vencimiento:</label><input type="date" id="ven_${d.id}"></div>
                            <div><label>Casa Matriz:</label><input type="text" id="casa_${d.id}"></div>
                            <div><label>Proveedor:</label><input type="text" id="pro_${d.id}"></div>
                            <div><label>Estado Pres.:</label><input type="text" id="estp_${d.id}"></div>
                            <div><label>Cantidad Inicial:</label><input type="number" id="canti_${d.id}"></div>
                            <div><label>Salida (Dosis Diaria):</label><input type="number" id="sal_${d.id}"></div>
                            <div><label>Cantidad Final:</label><input type="number" id="cantf_${d.id}"></div>
                        </div>
                        <button class="btn-guardar-final" onclick="guardarRegistroRA22('${d.id}', '${p.nombre}')">💾 GUARDAR Y ACTIVAR MEDICACIÓN</button>
                    </div>
                `;
                contenedor.appendChild(item);
            }
        });
    });

    window.abrirCarpeta = (id) => document.getElementById(`form_${id}`).classList.toggle('visible');

    window.guardarRegistroRA22 = async (id, nombre) => {
        const prod = document.getElementById(`prod_${id}`).value;
        if(!prod) return alert("Debe ingresar el nombre del producto.");

        const data = {
            paciente: nombre,
            fecha_inicio: document.getElementById(`fec_${id}`).value,
            producto: prod,
            presentacion: document.getElementById(`pres_${id}`).value,
            componente: document.getElementById(`comp_${id}`).value,
            invima: document.getElementById(`inv_${id}`).value,
            lote: document.getElementById(`lot_${id}`).value,
            vencimiento: document.getElementById(`ven_${id}`).value,
            casa: document.getElementById(`casa_${id}`).value,
            proveedor: document.getElementById(`pro_${id}`).value,
            estado: document.getElementById(`estp_${id}`).value,
            cant_inicial: parseInt(document.getElementById(`canti_${id}`).value),
            salida: parseInt(document.getElementById(`sal_${id}`).value),
            cant_final: parseInt(document.getElementById(`cantf_${id}`).value),
            creado: Date.now()
        };

        try {
            await addDoc(collection(db, "libro_correcto"), data);
            await updateDoc(doc(db, "pacientes", id), { medicado: "si" });
            alert("✅ Registro RA22 guardado. Paciente marcado como MEDICADO.");
            abrirCarpeta(id);
        } catch(e) { alert("Error de conexión."); }
    };

    window.generarRA22 = async (nombre) => {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('l', 'mm', 'a4');
        
        const q = query(collection(db, "libro_correcto"), where("paciente", "==", nombre), orderBy("creado", "desc"));
        const snap = await getDocs(q);
        
        if(snap.empty) return alert("No hay registros para este paciente.");
        
        const rBase = snap.docs[0].data();
        const filas = [];
        let cantActual = rBase.cant_inicial;
        let fechaActual = new Date(rBase.fecha_inicio);

        while (cantActual > 0) {
            let salida = Math.min(cantActual, rBase.salida);
            let final = cantActual - salida;
            
            filas.push([
                fechaActual.toLocaleDateString(),
                rBase.producto,
                rBase.presentacion,
                rBase.componente,
                rBase.invima,
                rBase.lote,
                rBase.vencimiento,
                rBase.casa,
                rBase.proveedor,
                rBase.estado,
                cantActual,
                salida,
                final,
                "________________"
            ]);
            
            cantActual = final;
            fechaActual.setDate(fechaActual.getDate() + 1);
        }

        doc.setFontSize(14);
        doc.text("REPORTE DE TRAZABILIDAD RA22 - CAMINOS NUEVOS", 14, 15);
        doc.setFontSize(10);
        doc.text(`Paciente: ${nombre}`, 14, 22);

        doc.autoTable({
            startY: 28,
            head: [['Fecha', 'Producto', 'Pres.', 'Comp.', 'INVIMA', 'Lote', 'Vence', 'Casa', 'Prov.', 'Est.', 'C.Ini', 'Sal', 'C.Fin', 'Firma']],
            body: filas,
            theme: 'grid',
            styles: { fontSize: 6, cellPadding: 1 },
            headStyles: { fillColor: [211, 84, 0] }
        });

        doc.save(`RA22_${nombre}.pdf`);
    };
</script>
</body>
</html>
