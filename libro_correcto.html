<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Maestro RA22 - Camino</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- jsPDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fdf6f0; /* Un tono crema claro como en la imagen */
            margin: 0;
            padding: 20px;
            color: #333;
        }
        header {
            background-color: #2c3e50; /* Azul oscuro para la barra superior */
            padding: 10px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            justify-content: flex-start;
        }
        .back-button {
            background-color: #3498db; /* Azul para el botón */
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        .back-button:hover {
            background-color: #2980b9;
        }
        main {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #d35400; /* Naranja/marrón para el título */
            margin-bottom: 30px;
            font-size: 24px;
            font-weight: bold;
        }
        h1 i {
            margin-right: 10px;
        }
        .patient-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .patient-card {
            background-color: white;
            border: 1px solid #ddd;
            border-radius: 12px; /* Bordes más redondeados */
            margin-bottom: 15px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-left: 5px solid #f39c12; /* Borde izquierdo naranja */
        }
        .patient-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 10px;
        }
        .patient-info h2 {
            margin: 0;
            font-size: 22px;
            color: #2c3e50; /* Nombre del paciente */
        }
        .patient-info .status {
            margin-top: 5px;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
            display: inline-block;
        }
        .patient-info .status.active {
            background-color: #e8f5e9;
            color: #2e7d32; /* Verde para PACIENTE ACTIVO */
        }
        .patient-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .btn {
            border: none;
            padding: 8px 15px;
            border-radius: 20px; /* Botones más redondeados */
            cursor: pointer;
            font-weight: bold;
            color: white;
            font-size: 12px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            transition: transform 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
        }
        .btn-secondary { background-color: #95a5a6; } /* POR MEDICAR */
        .btn-danger { background-color: #e74c3c; } /* MEDICADO */
        .btn-success { background-color: #27ae60; } /* AGREGAR */
        .btn-info { background-color: #3498db; } /* HISTORIAL */
        .btn-dark { background-color: #34495e; } /* ULTIMO RA22 */

        .history-details {
            background-color: #eaf6ff; /* Fondo azul claro para el historial */
            border: 1px solid #bbdefb;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
        }
        .history-details h3 {
            margin: 0 0 10px 0;
            color: #1e88e5; /* Azul más oscuro para el título del historial */
            font-size: 18px;
        }
        .btn-close-history {
            background: none;
            border: none;
            color: #3498db;
            cursor: pointer;
            text-decoration: underline;
            display: block;
            margin-top: 10px;
            text-align: center;
            width: 100%;
        }
    </style>
</head>
<body>
    <header>
        <button class="back-button" onclick="window.location.href='index.html'">← Volver al Menú</button>
    </header>
    <main>
        <h1><i class="fa-solid fa-pills"></i> LIBRO CORRECTO: GESTIÓN INTEGRAL Y RA22</h1>
        <div class="patient-list">
            <!-- Patient Card: Carlos -->
            <div class="patient-card">
                <div class="patient-header">
                    <div class="patient-info">
                        <h2>Carlos</h2>
                        <span class="status active">● PACIENTE ACTIVO</span>
                    </div>
                    <div class="patient-actions">
                        <button class="btn btn-secondary">POR MEDICAR</button>
                        <button class="btn btn-success">+ AGREGAR</button>
                        <button class="btn btn-info">HISTORIAL</button>
                        <button class="btn btn-dark" data-patient="Carlos">ULTIMO RA22</button>
                    </div>
                </div>
                <div class="history-details" style="display: block;">
                    <h3><i class="fa-solid fa-book-medical"></i> Historial de Tratamientos: Carlos</h3>
                    <p>Cargando historial...</p>
                    <button class="btn-close-history">Cerrar Historial</button>
                </div>
            </div>
            <!-- Patient Card: sertralina -->
            <div class="patient-card">
                <div class="patient-header">
                    <div class="patient-info">
                        <h2>sertralina</h2>
                        <span class="status active">● PACIENTE ACTIVO</span>
                    </div>
                    <div class="patient-actions">
                        <button class="btn btn-danger">MEDICADO</button>
                        <button class="btn btn-success">+ AGREGAR</button>
                        <button class="btn btn-info">HISTORIAL</button>
                        <button class="btn btn-dark" data-patient="sertralina">ULTIMO RA22</button>
                    </div>
                </div>
            </div>
            <!-- Patient Card: Andres -->
            <div class="patient-card">
                <div class="patient-header">
                    <div class="patient-info">
                        <h2>Andres</h2>
                        <span class="status active">● PACIENTE ACTIVO</span>
                    </div>
                    <div class="patient-actions">
                        <button class="btn btn-danger">MEDICADO</button>
                        <button class="btn btn-success">+ AGREGAR</button>
                        <button class="btn btn-info">HISTORIAL</button>
                        <button class="btn btn-dark" data-patient="Andres">ULTIMO RA22</button>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script>
        document.querySelectorAll('.btn-dark').forEach(button => {
            button.addEventListener('click', function() {
                generatePDF(this.dataset.patient);
            });
        });

        function generatePDF(patientName) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({
                orientation: 'landscape',
                unit: 'pt',
                format: 'letter'
            });

            doc.setFontSize(10);
            doc.text("REGISTRO CONTROL DE ENTRADA Y SALIDA DE MEDICAMENTOS", doc.internal.pageSize.getWidth() / 2, 30, { align: 'center' });
            doc.text(`Paciente: ${patientName}`, 40, 50);

            const head = [
                [
                    { content: 'Fecha', rowSpan: 3, styles: { halign: 'center', valign: 'middle' } },
                    { content: 'Nombre del\nProducto', rowSpan: 3, styles: { halign: 'center', valign: 'middle' } },
                    { content: 'Unidad,\nPresentación,\nConcentración', rowSpan: 3, styles: { halign: 'center', valign: 'middle' } },
                    { content: 'Componente\nActivo', rowSpan: 3, styles: { halign: 'center', valign: 'middle' } },
                    { content: 'Registro\nInvima', rowSpan: 3, styles: { halign: 'center', valign: 'middle' } },
                    { content: 'No. de Lote', rowSpan: 3, styles: { halign: 'center', valign: 'middle' } },
                    { content: 'Fecha de\nVencimiento', rowSpan: 3, styles: { halign: 'center', valign: 'middle' } },
                    { content: 'Casa Matriz o\nFabricante', rowSpan: 3, styles: { halign: 'center', valign: 'middle' } },
                    { content: 'Proveedor', rowSpan: 3, styles: { halign: 'center', valign: 'middle' } },
                    { content: 'Entradas', colSpan: 3, styles: { halign: 'center' } },
                    { content: 'Salidas', rowSpan: 3, styles: { halign: 'center', valign: 'middle' } },
                    { content: 'Saldo', rowSpan: 3, styles: { halign: 'center', valign: 'middle' } },
                    { content: 'Firma', rowSpan: 3, styles: { halign: 'center', valign: 'middle' } }
                ],
                [
                    { content: 'Cantidad', rowSpan: 2, styles: { halign: 'center', valign: 'middle' } },
                    { content: 'Presentación, Empaque,\nEtiquetas EN BUEN ESTADO', colSpan: 2, styles: { halign: 'center' } }
                ],
                [
                    { content: 'SI', styles: { halign: 'center' } },
                    { content: 'NO', styles: { halign: 'center' } }
                ]
            ];

            const body = [
                // Aquí irían los datos de la tabla, por ahora está vacío
                ['2023-01-05', 'Medicamento X', 'Caja 100mg', 'Componente A', 'INV-123', 'LOTE-001', '2025-12-31', 'Fabricante Z', 'Proveedor Y', '10', 'X', '', '5', '5', ''],
                // ... más filas de datos
            ];

            doc.autoTable({
                head: head,
                body: body,
                startY: 60,
                theme: 'grid',
                styles: {
                    fontSize: 7,
                    cellPadding: 2,
                    overflow: 'linebreak'
                },
                headStyles: {
                    fillColor: [220, 220, 220],
                    textColor: 0,
                    fontStyle: 'bold'
                }
            });

            // Footer
            const pageCount = doc.internal.getNumberOfPages();
            for (let i = 1; i <= pageCount; i++) {
                doc.setPage(i);
                doc.setFontSize(8);
                doc.text(`Página ${i} de ${pageCount}`, doc.internal.pageSize.getWidth() - 60, doc.internal.pageSize.getHeight() - 20);
                doc.text('RA-22 Versión: 1', 40, doc.internal.pageSize.getHeight() - 20);
            }


            doc.save(`RA22_${patientName.replace(/ /g, '_')}_${new Date().toISOString().slice(0,10)}.pdf`);
        }
    </script>
</body>
</html>
