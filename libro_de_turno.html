<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Libro de Turno Digital</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 15px; }
        .container { max-width: 700px; margin: auto; }
        .card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2, h3 { text-align: center; color: #2c3e50; }
        
        /* Censo Automático */
        .censo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .censo-item { padding: 12px; border-radius: 10px; color: white; text-align: center; font-weight: bold; }
        
        label { display: block; font-weight: bold; margin-top: 15px; font-size: 13px; color: #34495e; }
        input, select, textarea { width: 100%; padding: 10px; margin-top: 5px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; font-size: 15px; }
        textarea { height: 100px; resize: none; }
        
        /* Secciones Desplegables */
        .seccion-especial { background: #f8f9fa; padding: 15px; border-radius: 10px; border: 1px solid #dee2e6; margin-top: 15px; display: none; }
        
        /* Delegaciones Grid */
        .delegaciones-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .delegaciones-grid div { background: #fff; }

        .btn-guardar { background: #2c3e50; color: white; padding: 18px; width: 100%; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 25px; font-size: 16px; }
        .historial-item { background: white; padding: 15px; border-radius: 12px; margin-bottom: 12px; border-left: 6px solid #2c3e50; text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <button onclick="location.href='index.html'" style="margin-bottom:15px; padding:8px 15px; cursor:pointer; border-radius:8px; border:none; background:#95a5a6; color:white;">🏠 Menú Principal</button>
    
    <div class="card">
        <h2>📒 Libro de Turno</h2>
        <p id="fechaHoy" style="font-weight: bold; color: #7f8c8d;"></p>

        <!-- CENSO AUTOMÁTICO -->
        <div class="censo-grid">
            <div class="censo-item" style="background: #27ae60;">🏠 Activos: <span id="cntActivos">0</span></div>
            <div class="censo-item" style="background: #e74c3c;">🚶 Fuera: <span id="cntFuera">0</span></div>
        </div>

        <!-- OPERADORES -->
        <h3>👥 Personal</h3>
        <input type="text" id="opTurno" placeholder="Operador de Turno">
        <input type="text" id="opApoyo" placeholder="Operador de Apoyo">
        <input type="text" id="opOficina" placeholder="Enfermería / Oficina">

        <!-- ACTIVIDAD / TERAPIA -->
        <!-- SECCIÓN DINÁMICA DE ACTIVIDADES Y TERAPIAS -->
        <div class="card">
            <h3>🎭 Registro de Actividades y Terapias</h3>
            <select id="tipoEvento" onchange="window.prepararFormularioEvento()">
                <option value="ninguno">-- Seleccionar para agregar --</option>
                <option value="actividad">⚽ Actividad</option>
                <option value="terapia">🧠 Terapia</option>
            </select>

            <!-- Bloque para Actividad -->
            <div id="secActividad" class="seccion-especial" style="display:none; background:#e8f4fd;">
                <p>⏰ Hora: <b id="horaActividad">--:--</b></p>
                <label>Nombre de la Actividad:</label>
                <input type="text" id="nombreActividad" placeholder="Ej: Deporte, Aseo, Cine">
                <label>Observaciones:</label>
                <textarea id="obsActividad"></textarea>
            </div>

            <!-- Bloque para Terapia -->
            <div id="secTerapia" class="seccion-especial" style="display:none; background:#f5eef8;">
                <p>⏰ Hora: <b id="horaTerapia">--:--</b></p>
                <label>Nombre de la Terapia:</label>
                <input type="text" id="nombreTerapia" placeholder="Ej: Prevención de recaídas">
                <label>Asistencia:</label>
                <textarea id="asistenciaTerapia" placeholder="Lista de usuarios..."></textarea>
                <label>Observaciones de la Terapia:</label>
                <textarea id="obsTerapia"></textarea>
            </div>

            <!-- Área de Cámara (Se activa para ambos) -->
            <div id="areaCamaraEvento" style="display:none; margin-top:10px;">
                <div style="background: #000; height: 180px; border-radius: 10px; overflow:hidden;">
                    <video id="videoEvidencia" autoplay playsinline style="width:100%; height:100%; object-fit:cover;"></video>
                </div>
                <button type="button" onclick="window.tomarFotoEvento()" style="background:#3498db; color:white; width:100%; padding:10px; border:none; border-radius:8px; margin-top:5px; cursor:pointer;">📸 Tomar Foto de Evidencia</button>
            </div>

            <!-- EL BOTÓN CLAVE PARA SEGUIR AGREGANDO -->
            <button type="button" onclick="window.agregarEventoALista()" style="background:#27ae60; color:white; width:100%; padding:15px; border:none; border-radius:10px; margin-top:15px; font-weight:bold; cursor:pointer;">➕ Añadir y Seguir Agregando</button>
            
            <!-- Resumen de lo que vas añadiendo -->
            <div id="listaTemporalEventos" style="margin-top:10px; text-align:left;"></div>
        </div>

        <!-- DELEGACIONES -->
        <h3>🔑 Delegaciones</h3>
        <div class="delegaciones-grid">
            <input type="number" id="dTimbre" placeholder="Timbre">
            <input type="number" id="dChivos" placeholder="Chivos">
            <input type="number" id="dSombras" placeholder="Sombras">
            <input type="number" id="dGrilletes" placeholder="Grilletes">
            <input type="number" id="dLlavero" placeholder="Llavero">
            <input type="number" id="dAnillos" placeholder="Anillos">
        </div>
        <input type="text" id="dOtras" placeholder="Otras delegaciones..." style="margin-top:8px;">

        <!-- NOVEDADES RELEVANTES -->
        <h3>🚨 Novedades Relevantes</h3>
        <textarea id="novedadesTxt" placeholder="Fugas, ingresos, permisos, novedades..."></textarea>

        <button id="btnGuardar" class="btn-guardar">🚀 GUARDAR ENTREGA DE TURNO</button>
        <button id="btnImprimir" style="background: #34495e; color: white; padding: 15px; width: 100%; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px;">
    🖨️ VISTA PREVIA E IMPRIMIR TURNO
</button>

    <div id="historial">
        <h3>📋 Registros Anteriores</h3>
    </div>
</div>

<script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, onSnapshot, collection, addDoc, query, where, getDocs, orderBy, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        const firebaseConfig = {
            apiKey: "AIzaSyC78y2m79f9764f-YTuPYfP",
            authDomain: "caminosnuevosdatabase.firebaseapp.com",
            projectId: "caminosnuevosdatabase",
            storageBucket: "caminosnuevosdatabase.firebasestorage.app",
            appId: "1:907500835423:web:f56b459ab4d57d92a81ea"
        };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let cActivos = 0, cFuera = 0;

    // Fecha Automática
    document.getElementById("fechaHoy").innerText = new Date().toLocaleDateString('es-CO', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

    // Toggle Secciones
    // --- LÓGICA DINÁMICA DE ACTIVIDADES Y TERAPIAS ---
    let listaEventosTurno = []; 
    let fotoTemporal = null;

   window.prepararFormularioEvento = () => {
        const tipo = document.getElementById("tipoEvento").value;
        if (!tipo || tipo === "ninguno") {
            document.getElementById("secActividad").style.display = "none";
            document.getElementById("secTerapia").style.display = "none";
            document.getElementById("areaCamaraEvento").style.display = "none"; // Ocultar si no hay nada
            return;
        }
        
        // MOSTRAR EL ÁREA DE LA CÁMARA
        document.getElementById("areaCamaraEvento").style.display = "block"
        
        // Poner la hora automática del sistema
        const horaActual = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        
        if (tipo === "actividad") {
            document.getElementById("secActividad").style.display = "block";
            document.getElementById("secTerapia").style.display = "none";
            document.getElementById("horaActividad").innerText = horaActual;
        } else {
            document.getElementById("secTerapia").style.display = "block";
            document.getElementById("secActividad").style.display = "none";
            document.getElementById("horaTerapia").innerText = horaActual;
        }

        // Encender cámara trasera para la evidencia
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .then(s => { document.getElementById("videoEvidencia").srcObject = s; });
    };

    window.tomarFotoEvento = () => {
        const video = document.getElementById("videoEvidencia");
        const canvas = document.createElement("canvas");
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        canvas.getContext("2d").drawImage(video, 0, 0);
        fotoTemporal = canvas.toDataURL("image/jpeg", 0.5);
        alert("📸 Evidencia capturada");
    };

    window.agregarEventoALista = () => {
        const tipo = document.getElementById("tipoEvento").value;
        const hora = tipo === "actividad" ? document.getElementById("horaActividad").innerText : document.getElementById("horaTerapia").innerText;
        const nombre = tipo === "actividad" ? document.getElementById("nombreActividad").value : document.getElementById("nombreTerapia").value;
        const obs = tipo === "actividad" ? document.getElementById("obsActividad").value : document.getElementById("obsTerapia").value;
        const asistencia = tipo === "terapia" ? document.getElementById("asistenciaTerapia").value : "N/A";

        if (!nombre || !obs) return alert("Por favor completa el nombre y las observaciones.");

        // Guardamos en la lista global
        listaEventosTurno.push({ tipo, hora, nombre, obs, asistencia, foto: fotoTemporal });

        // Resumen visual para el usuario
        document.getElementById("listaTemporalEventos").innerHTML += `
            <div style="background:#e8f4fd; padding:8px; margin-top:5px; border-radius:5px; font-size:12px;">
                ✅ <b>${tipo}:</b> ${nombre} (${hora})
            </div>`;

        // Limpiar campos para el siguiente
        document.getElementById("tipoEvento").value = "ninguno";
        document.getElementById("secActividad").style.display = "none";
        document.getElementById("secTerapia").style.display = "none";
        fotoTemporal = null;
    };

    // Censo Automático en tiempo real
    onSnapshot(collection(db, "pacientes"), (snap) => {
        cActivos = 0; cFuera = 0;
        snap.forEach(doc => {
            const p = doc.data();
            if(p.estado === 'activos') cActivos++;
            else if(['fugas', 'abandonos', 'movilizaciones'].includes(p.estado)) cFuera++;
        });
        document.getElementById("cntActivos").innerText = cActivos;
        document.getElementById("cntFuera").innerText = cFuera;
    });

// --- LÓGICA ÚNICA: REGISTRO INDEPENDIENTE ---
document.getElementById('btnGuardar').onclick = async () => {
    
    // 1. Recolectamos novedades (único campo obligatorio)
    const novedades = document.getElementById("novedadesTxt") ? document.getElementById("novedadesTxt").value : "";

    if (!novedades) {
        return alert("⚠️ Por favor, escribe las novedades del turno antes de guardar.");
    }

    try {
        // 2. Preparamos el paquete de datos para la carpeta general
        const data = {
            fecha: new Date().toLocaleString(),
            timestamp: Date.now(),
            censo: { 
                activos: typeof cActivos !== 'undefined' ? cActivos : 0, 
                fuera: typeof cFuera !== 'undefined' ? cFuera : 0 
            },
            operadores: {
                turno: document.getElementById("opTurno")?.value || "No asignado",
                apoyo: document.getElementById("opApoyo")?.value || "",
                oficina: document.getElementById("opOficina")?.value || ""
            },
            // Guardamos la lista de actividades/terapias que sumaste con el botón verde
            eventos: typeof listaEventosTurno !== 'undefined' ? listaEventosTurno : [],
            novedades: novedades,
            estaBloqueado: true // Candado de seguridad
        };

        // 3. Guardamos en la colección GENERAL (Libro de Turnos)
        await addDoc(collection(db, "libro_de_turnos_pro"), data);

        alert("✅ Libro de turno guardado con éxito en la nube.");
        location.reload(); // Limpiar todo para el próximo turno

    } catch (e) {
        console.error("Error al guardar:", e);
        alert("❌ Error: No se pudo conectar con Firebase. " + e.message);
    }
    // --- LÓGICA DE IMPRESIÓN PROFESIONAL ---
document.getElementById('btnImprimir').onclick = () => {
    const opTurno = document.getElementById("opTurno")?.value || "---";
    const fecha = document.getElementById("fechaHoy").innerText;
    const novedades = document.getElementById("novedadesTxt").value;
    
    const ventana = window.open('', '_blank');
    ventana.document.write(`
        <html>
        <head>
            <title>Reporte de Turno - ${fecha}</title>
            <style>
                body { font-family: 'Segoe UI', sans-serif; padding: 40px; color: #333; }
                .header { text-align: center; border-bottom: 2px solid #2c3e50; margin-bottom: 20px; }
                .section { margin-bottom: 20px; border: 1px solid #eee; padding: 10px; border-radius: 5px; }
                .title { font-weight: bold; background: #f8f9fa; padding: 5px; display: block; border-bottom: 1px solid #ddd; }
                .foto { max-width: 300px; margin-top: 10px; border-radius: 5px; border: 1px solid #ccc; }
                .item { border-left: 4px solid #3498db; padding-left: 10px; margin-bottom: 15px; }
                @media print { .no-print { display: none; } }
            </style>
        </head>
        <body>
            <div class="header">
                <h2>INFORME TÉCNICO DE TURNO</h2>
                <p><b>Fecha:</b> ${fecha} | <b>Responsable:</b> ${opTurno}</p>
            </div>
            <div class="section">
                <span class="title">I. ESTADO DEL CENSO</span>
                <p>Activos: ${cActivos} | Fuera: ${cFuera}</p>
            </div>
            <div class="section">
                <span class="title">II. ACTIVIDADES Y TERAPIAS</span>
${listaEventosTurno.length === 0 ? '<p>No se registraron eventos.</p>' : 
    listaEventosTurno.map(ev => `
        <div class="item">
            <b>${ev.tipo.toUpperCase()}:</b> ${ev.nombre} (${ev.hora})<br>
            <b>Nota:</b> ${ev.obs}<br>
            ${ev.foto ? `<img src="${ev.foto}" class="foto">` : ''}
        </div>
    `).join('') // <-- ESTE .join('') es fundamental para que no salgan comas raras
}
            </div>
            <div class="section">
                <span class="title">III. NOVEDADES RELEVANTES</span>
                <p style="white-space: pre-wrap;">${novedades || "Sin novedades."}</p>
            </div>
            <div style="margin-top: 60px; text-align: center;">
                <p>__________________________<br>Firma y Sello</p>
            </div>
            <button class="no-print" onclick="window.print()" style="padding: 10px 20px; background: #27ae60; color: white; border: none; border-radius: 5px; cursor: pointer;">
                🖨️ CONFIRMAR IMPRESIÓN
            </button>
        </body>
        </html>
        `);
        ventana.document.close();
    }; // Fin de imprimir

    // --- HISTORIAL EN TIEMPO REAL ---
    const q = query(collection(db, "libro_de_turnos_pro"), orderBy("timestamp", "desc"));
    onSnapshot(q, (snap) => {
        const hist = document.getElementById("historial");
        hist.innerHTML = "<h3>📋 Registros Anteriores</h3>";
        snap.forEach(doc => {
            const d = doc.data();
            hist.innerHTML += `
                <div class="historial-item">
                    <small>${d.fecha}</small><br>
                    <b>👤 Op:</b> ${d.operadores?.turno || '---'}<br>
                    <b>🏠 Censo:</b> ${d.censo?.activos || 0} Activos / ${d.censo?.fuera || 0} Fuera<br>
                    <p>${d.novedades}</p>
                </div>`;
        });
    });
</script>
</body>
</html>
