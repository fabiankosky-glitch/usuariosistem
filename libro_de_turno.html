<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Libro de Turno Digital - Caminos Nuevos</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 15px; margin: 0; }
        .container { max-width: 700px; margin: auto; }
        .card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2, h3 { text-align: center; color: #2c3e50; margin-top: 0; }
        
        .censo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .censo-item { padding: 12px; border-radius: 10px; color: white; text-align: center; font-weight: bold; }
        .resultado-casa { background: #2c3e50; color: white; padding: 12px; border-radius: 10px; text-align: center; margin-bottom: 15px; font-weight: bold; }
        
        .seguridad-box { background: #fff5f5; padding: 15px; border-radius: 12px; border: 1px solid #feb2b2; margin-top: 10px; }
        label { display: block; font-weight: bold; margin-top: 12px; font-size: 13px; color: #c53030; }
        textarea, input, select { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; font-size: 14px; }
        textarea { height: 100px; resize: vertical; }

        .btn-actualizar { background: #3498db; color: white; padding: 15px; width: 100%; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .btn-guardar { background: #27ae60; color: white; padding: 18px; width: 100%; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 16px; }
        
        .historial-item { background: white; padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #ddd; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .foto-evidencia { width: 100%; border-radius: 10px; margin-top: 10px; border: 1px solid #ddd; }
        summary { cursor: pointer; font-weight: bold; padding: 5px; color: #2c3e50; }
    </style>
</head>
<body>
<div class="container">
    <button onclick="location.href='index.html'" style="margin-bottom:15px; padding:10px; width:100%; border-radius:8px; border:none; background:#95a5a6; color:white; font-weight:bold; cursor:pointer;">🏠 Menú Principal</button>
    
    <div class="card">
        <h2>📒 Libro de Turno Digital</h2>
        <p id="fechaHoy" style="font-weight:bold; text-align:center; color:#7f8c8d;"></p>
        
        <div class="censo-grid">
            <div class="censo-item" style="background:#27ae60;">🏠 Activos: <span id="cntActivos">0</span></div>
            <div class="censo-item" style="background:#e67e22;">🚶 Fuera: <input type="number" id="inpFuera" value="0" oninput="calcularPresencia()" style="width:50px;"></div>
        </div>
        <div class="resultado-casa">📍 Total en Casa Actual: <span id="cntEnCasa">0</span></div>

        <div class="seguridad-box">
            <h3>🔐 Control de Seguridad e Inventario</h3>
            <label>👥 Listado Grupos Altos:</label><textarea id="gruposAltos"></textarea>
            <label>🔔 Timbres:</label><textarea id="timbres"></textarea>
            <label>👣 Sombras:</label><textarea id="sombras"></textarea>
            <label>🐐 Chivos:</label><textarea id="chivos"></textarea>
            <label>🔗 Grilletes:</label><textarea id="grilletes"></textarea>
            <label>🔑 Llavero:</label><textarea id="llavero"></textarea>
        </div>

        <label style="margin-top:20px;">👤 Operador Responsable:</label><input type="text" id="opTurno" placeholder="Su nombre">
        <label>🚨 Novedades Finales:</label><textarea id="novedadesTxt" style="height:120px;" placeholder="Resumen general del turno..."></textarea>
        
        <button id="btnActualizar" type="button" class="btn-actualizar">💾 GUARDAR PROGRESO (SIN CERRAR)</button>
        <button id="btnGuardar" type="button" class="btn-guardar">🚀 GUARDAR TURNO COMPLETO</button>

        <button id="btnVerHistorial" type="button" style="background: #7f8c8d; color: white; padding: 12px; width: 100%; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 20px;">📂 VER ARCHIVO DE TURNOS</button>

        <div id="historial" style="display: none; margin-top: 20px;">
            <h3>📋 Historial de Turnos y Progresos</h3>
            <div id="listaHistorial">Cargando registros...</div>
        </div>
    </div>
</div>

   <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import {  getFirestore, collection, addDoc, onSnapshot, query, orderBy, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        const firebaseConfig = {
            apiKey: "AIzaSyC78y2m79f9764f-YTuPYfP",
            authDomain: "caminosnuevosdatabase.firebaseapp.com",
            projectId: "caminosnuevosdatabase",
            storageBucket: "caminosnuevosdatabase.firebasestorage.app",
            appId: "1:907500835423:web:f56b459ab4d57d92a81ea"
        };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let totalActivos = 0;
    const ID_RELACION = "turno_" + Date.now();
    document.getElementById("fechaHoy").innerText = new Date().toLocaleDateString();

    // 1. Censo Automático
    onSnapshot(collection(db, "pacientes"), (snap) => {
        let cuenta = 0;
        snap.forEach(doc => {
            const p = doc.data();
            const est = (p.estado || "").toLowerCase().trim();
            if (est.includes("activo") || est.includes("activos")) cuenta++;
        });
        totalActivos = cuenta;
        document.getElementById("cntActivos").innerText = totalActivos;
        window.calcularPresencia();
    });

    window.calcularPresencia = () => {
        const f = parseInt(document.getElementById("inpFuera").value) || 0;
        document.getElementById("cntEnCasa").innerText = totalActivos - f;
    };

    // 2. Guardar Progreso (Azul)
    document.getElementById('btnActualizar').onclick = async () => {
        try {
            await addDoc(collection(db, "libro_de_turnos_pro"), {
                idRelacion: ID_RELACION, tipo: "progreso", fecha: new Date().toLocaleString(), creado: Date.now(),
                operador: document.getElementById("opTurno").value || "Operador",
                censo: { activos: totalActivos, fuera: document.getElementById("inpFuera").value, enCasa: document.getElementById("cntEnCasa").innerText },
                seguridad: { grupos: document.getElementById("gruposAltos").value, llavero: document.getElementById("llavero").value },
                novedades: document.getElementById("novedadesTxt").value
            });
            alert("💾 Progreso guardado correctamente.");
        } catch (e) { alert("Error al guardar progreso"); }
    };

    // 3. Guardar Turno Final (Verde)
    document.getElementById('btnGuardar').onclick = async () => {
        try {
            await addDoc(collection(db, "libro_de_turnos_pro"), {
                idRelacion: ID_RELACION, tipo: "final", fecha: new Date().toLocaleString(), creado: Date.now(),
                operador: document.getElementById("opTurno").value || "No especificado",
                censo: { activos: totalActivos, fuera: document.getElementById("inpFuera").value, enCasa: document.getElementById("cntEnCasa").innerText },
                seguridad: { grupos: document.getElementById("gruposAltos").value, timbres: document.getElementById("timbres").value, sombras: document.getElementById("sombras").value, chivos: document.getElementById("chivos").value, grilletes: document.getElementById("grilletes").value, llavero: document.getElementById("llavero").value },
                novedades: document.getElementById("novedadesTxt").value
            });
            alert("✅ Turno Cerrado con éxito");
            location.reload();
        } catch (e) { alert("Error al cerrar turno"); }
    };

    // 4. Historial Formateado
    onSnapshot(query(collection(db, "libro_de_turnos_pro"), orderBy("creado", "desc")), (snap) => {
        const list = document.getElementById("listaHistorial");
        list.innerHTML = "";
        snap.forEach(docT => {
            const d = docT.data();
            const esProg = d.tipo === "progreso";
            const color = esProg ? "#3498db" : "#27ae60";
            const titulo = esProg ? "🕒 ACTUALIZACIÓN" : "✅ TURNO CERRADO";
            
            const div = document.createElement("div");
            div.className = "historial-item";
            div.style.borderLeft = `8px solid ${color}`;
            div.innerHTML = `
                <details>
                    <summary>${titulo} | ${d.fecha}</summary>
                    <div style="margin-top:10px; font-size:14px; border-top:1px solid #eee; padding-top:10px;">
                        <p><b>👤 Operador:</b> ${d.operador}</p>
                        <p><b>🏠 Casa:</b> ${d.censo ? d.censo.enCasa : '--'} (Activos: ${d.censo ? d.censo.activos : '--'})</p>
                        <p><b>🚨 Novedades:</b></p>
                        <p style="white-space:pre-wrap; background:#f9f9f9; padding:10px; border-radius:5px;">${d.novedades || 'Sin novedades'}</p>
                    </div>
                </details>`;
            list.appendChild(div);
        });
    });

    // 5. Lógica del Botón Gris
    document.getElementById('btnVerHistorial').onclick = () => {
        const h = document.getElementById('historial');
        const b = document.getElementById('btnVerHistorial');
        h.style.display = h.style.display === "none" ? "block" : "none";
        b.innerText = h.style.display === "none" ? "📂 VER ARCHIVO DE TURNOS" : "❌ CERRAR ARCHIVO";
        b.style.background = h.style.display === "none" ? "#7f8c8d" : "#e74c3c";
    };
</script>
</body>
</html>
