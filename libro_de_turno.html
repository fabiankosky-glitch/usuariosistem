<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Libro de Turno Digital - Caminos Nuevos</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 15px; margin: 0; }
        .container { max-width: 700px; margin: auto; }
        .card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2, h3 { text-align: center; color: #2c3e50; margin-top: 0; }
        
        /* Estructura del Censo */
        .censo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .censo-item { padding: 12px; border-radius: 10px; color: white; text-align: center; font-weight: bold; font-size: 14px; }
        .resultado-casa { background: #2c3e50; color: white; padding: 12px; border-radius: 10px; text-align: center; margin-bottom: 15px; font-weight: bold; }
        
        /* Estructura de Seguridad */
        .seguridad-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; background: #fff5f5; padding: 12px; border-radius: 10px; border: 1px solid #feb2b2; }
        .seg-box { font-size: 13px; color: #c53030; }
        
        label { display: block; font-weight: bold; margin-top: 10px; font-size: 12px; color: #34495e; }
        input, textarea { width: 100%; padding: 10px; margin-top: 4px; border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box; }
        
        .alert-auto { background: #ebf8ff; border-left: 4px solid #3182ce; padding: 8px; margin-top: 5px; font-size: 12px; color: #2a4365; border-radius: 4px; }
        .btn-guardar { background: #27ae60; color: white; padding: 15px; width: 100%; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        
        /* Estilo del Historial (Copia fiel del original) */
        .historial-item { background: #ffffff; padding: 15px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #ddd; }
        .detalle-turno { background: #f8f9fa; padding: 15px; border-radius: 10px; margin-top: 10px; border: 1px solid #eee; }
        summary { font-weight: bold; color: #2c3e50; cursor: pointer; padding: 5px; }
    </style>
</head>
<body>

<div class="container">
    <button onclick="location.href='index.html'" style="margin-bottom:15px; padding:10px; width:100%; border-radius:8px; border:none; background:#95a5a6; color:white; font-weight:bold; cursor:pointer;">🏠 Menú Principal</button>
    
    <!-- FORMULARIO DE CAPTURA -->
    <div class="card">
        <h2>📒 Nuevo Registro de Turno</h2>
        <p id="fechaHoy" style="font-weight: bold; text-align:center; color: #7f8c8d;"></p>

        <div class="censo-grid">
            <div class="censo-item" style="background: #27ae60;">🏠 Activos: <span id="cntActivos">0</span></div>
            <div class="censo-item" style="background: #e67e22;">🚶 Fuera: <input type="number" id="inpFuera" value="0" oninput="calcularPresencia()" style="width:45px;"></div>
        </div>
        <div class="resultado-casa">📍 Total en Casa: <span id="cntEnCasa">0</span></div>

        <div class="card" style="padding:15px; border: 1px solid #feb2b2;">
            <h3 style="font-size:16px;">🔐 Seguridad e Inventario</h3>
            <label>👥 Grupos Altos:</label><input type="text" id="gruposAltos">
            <div class="seguridad-grid">
                <div><label>🔔 Timbres:</label><input type="text" id="timbres"></div>
                <div><label>👣 Sombras:</label><input type="text" id="sombras"></div>
                <div><label>🐐 Chivos:</label><input type="text" id="chivos"></div>
                <div><label>🔗 Grilletes:</label><input type="text" id="grilletes"></div>
                <div style="grid-column: span 2;"><label>🔑 Llavero:</label><input type="text" id="llavero"></div>
            </div>
        </div>

        <div class="card" style="padding:15px; border: 1px solid #3182ce; margin-top:10px;">
            <h3 style="font-size:16px;">🤖 Movimientos del Día</h3>
            <div id="contenedorAlertas"></div>
        </div>

        <label>👤 Operador de Turno:</label><input type="text" id="opTurno">
        <label>🚨 Novedades Generales:</label><textarea id="novedadesTxt" rows="3"></textarea>

        <button id="btnGuardar" class="btn-guardar">🚀 GUARDAR TURNO</button>
    </div>

    <!-- SECCIÓN DE HISTORIAL -->
    <div id="historial">
        <h2 style="margin-top:40px;">📋 Turnos Anteriores</h2>
        <div id="listaHistorial">Cargando registros...</div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://gstatic.com";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://gstatic.com";

    const firebaseConfig = {
        apiKey: "AIzaSyC78y2m79f9764f-YTuPYfP",
        authDomain: "://firebaseapp.com",
        projectId: "caminosnuevosdatabase",
        appId: "1:907500835423:web:f56b459ab4d57d92a81ea"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let totalActivosDB = 0;
    let cambiosDeteccion = [];

    document.getElementById("fechaHoy").innerText = new Date().toLocaleDateString();

    onSnapshot(collection(db, "pacientes"), (snap) => {
        totalActivosDB = 0; cambiosDeteccion = [];
        const hoy = new Date().toLocaleDateString();
        const alertCont = document.getElementById("contenedorAlertas");
        alertCont.innerHTML = "";
        
        snap.forEach(doc => {
            const p = doc.data();
            if((p.estado || "").toLowerCase().includes("activo")) totalActivosDB++;
            if(p.fechaRegistro === hoy || p.fecha === hoy) {
                const msg = `• ${p.nombre}: ${p.estado}`;
                cambiosDeteccion.push(msg);
                alertCont.innerHTML += `<div class="alert-auto">${msg}</div>`;
            }
        });
        document.getElementById("cntActivos").innerText = totalActivosDB;
        window.calcularPresencia();
    });

    window.calcularPresencia = () => {
        const f = parseInt(document.getElementById("inpFuera").value) || 0;
        document.getElementById("cntEnCasa").innerText = totalActivosDB - f;
    };

    document.getElementById('btnGuardar').onclick = async () => {
        try {
            await addDoc(collection(db, "libro_de_turnos_pro"), {
                fecha: new Date().toLocaleString(),
                timestamp: Date.now(),
                operador: document.getElementById("opTurno").value,
                censo: { activos: totalActivosDB, fuera: document.getElementById("inpFuera").value, enCasa: document.getElementById("cntEnCasa").innerText },
                seguridad: { 
                    grupos: document.getElementById("gruposAltos").value,
                    timbres: document.getElementById("timbres").value,
                    sombras: document.getElementById("sombras").value,
                    chivos: document.getElementById("chivos").value,
                    grilletes: document.getElementById("grilletes").value,
                    llavero: document.getElementById("llavero").value
                },
                movimientos: cambiosDeteccion,
                novedades: document.getElementById("novedadesTxt").value
            });
            alert("✅ Turno Guardado");
            location.reload();
        } catch (e) { alert("Error al guardar"); }
    };

    onSnapshot(query(collection(db, "libro_de_turnos_pro"), orderBy("timestamp", "desc")), (snap) => {
        const list = document.getElementById("listaHistorial");
        list.innerHTML = "";
        snap.forEach(doc => {
            const d = doc.data();
            list.innerHTML += `
                <div class="historial-item">
                    <details>
                        <summary>📅 Turno: ${d.fecha} (Op: ${d.operador})</summary>
                        <div class="detalle-turno">
                            <!-- ESTRUCTURA IDENTICA AL ORIGINAL -->
                            <div class="censo-grid">
                                <div class="censo-item" style="background:#27ae60">Activos: ${d.censo.activos}</div>
                                <div class="censo-item" style="background:#e67e22">Fuera: ${d.censo.fuera}</div>
                            </div>
                            <div class="resultado-casa">📍 En Casa: ${d.censo.enCasa}</div>

                            <div style="background:#fff5f5; padding:10px; border-radius:8px; border:1px solid #feb2b2; margin-bottom:10px;">
                                <p style="margin:2px"><b>👥 Grupos:</b> ${d.seguridad.grupos}</p>
                                <div style="display:grid; grid-template-columns:1fr 1fr; font-size:12px;">
                                    <span>🔔 Timbres: ${d.seguridad.timbres}</span>
                                    <span>👣 Sombras: ${d.seguridad.sombras}</span>
                                    <span>🐐 Chivos: ${d.seguridad.chivos}</span>
                                    <span>🔗 Grilletes: ${d.seguridad.grilletes}</span>
                                    <span style="grid-column:span 2">🔑 Llavero: ${d.seguridad.llavero}</span>
                                </div>
                            </div>

                            <div style="background:#ebf8ff; padding:10px; border-radius:8px; border:1px solid #3182ce; font-size:12px;">
                                <b>🤖 Movimientos Detectados:</b><br>
                                ${d.movimientos.join("<br>") || "Sin movimientos"}
                            </div>

                            <p style="background:white; padding:10px; border-radius:8px; margin-top:10px; border:1px solid #ccc;">
                                <b>🚨 Novedades Generales:</b><br>${d.novedades}
                            </p>
                        </div>
                    </details>
                </div>`;
        });
    });
</script>
</body>
</html>
