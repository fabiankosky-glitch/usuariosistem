<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Libro de Turno Digital - Caminos Nuevos</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 15px; margin: 0; }
        .container { max-width: 700px; margin: auto; }
        .card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2, h3 { text-align: center; color: #2c3e50; margin-top: 0; }
        
        /* Censo */
        .censo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .censo-item { padding: 12px; border-radius: 10px; color: white; text-align: center; font-weight: bold; }
        .resultado-casa { background: #2c3e50; color: white; padding: 12px; border-radius: 10px; text-align: center; margin-bottom: 15px; font-weight: bold; }
        
        /* Seguridad - ESPACIOS GRANDES */
        .seguridad-box { background: #fff5f5; padding: 15px; border-radius: 12px; border: 1px solid #feb2b2; margin-top: 10px; }
        label { display: block; font-weight: bold; margin-top: 12px; font-size: 13px; color: #c53030; }
        textarea, input { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; font-size: 14px; }
        textarea { height: 80px; resize: vertical; } /* Altura aumentada para descripciones largas */
        
        .seccion-especial { background: #eef2f7; padding: 15px; border-radius: 12px; border: 1px solid #d1d9e6; margin-top: 15px; display: none; }
        .btn-guardar { background: #27ae60; color: white; padding: 18px; width: 100%; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 25px; font-size: 16px; }
        
        /* Historial */
        .historial-item { background: white; padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #ddd; }
        .historial-detail { background: #fdfdfd; padding: 10px; border-radius: 10px; margin-top: 10px; font-size: 14px; line-height: 1.5; }
        .foto-historial { width: 100%; border-radius: 10px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <button onclick="location.href='index.html'" style="margin-bottom:15px; padding:10px; width:100%; border-radius:8px; border:none; background:#95a5a6; color:white; font-weight:bold; cursor:pointer;">🏠 Menú Principal</button>
    
    <div class="card">
        <h2>📒 Libro de Turno</h2>
        <p id="fechaHoy" style="font-weight: bold; text-align:center; color: #7f8c8d;"></p>

        <!-- CENSO -->
        <div class="censo-grid">
            <div class="censo-item" style="background: #27ae60;">🏠 Activos: <span id="cntActivos">0</span></div>
            <div class="censo-item" style="background: #e67e22;">🚶 Fuera: <input type="number" id="inpFuera" value="0" oninput="calcularPresencia()" style="width:50px;"></div>
        </div>
        <div class="resultado-casa">📍 Total en Casa: <span id="cntEnCasa">0</span></div>

        <!-- SEGURIDAD CON ESPACIOS AMPLIOS -->
        <div class="seguridad-box">
            <h3>🔐 Control de Seguridad e Inventario</h3>
            
            <label>👥 Listado Grupos Altos:</label>
            <textarea id="gruposAltos" placeholder="Detalle completo de los grupos..."></textarea>
            
            <label>🔔 Timbres:</label>
            <textarea id="timbres" placeholder="Estado o novedades de timbres..."></textarea>
            
            <label>👣 Sombras:</label>
            <textarea id="sombras" placeholder="Registro detallado de sombras..."></textarea>
            
            <label>🐐 Chivos:</label>
            <textarea id="chivos" placeholder="Detalle de chivos..."></textarea>
            
            <label>🔗 Grilletes:</label>
            <textarea id="grilletes" placeholder="Estado de grilletes..."></textarea>
            
            <label>🔑 Llavero:</label>
            <textarea id="llavero" placeholder="Control del llavero..."></textarea>
        </div>

        <!-- ACTIVIDADES -->
        <div class="card" style="margin-top:20px; border: 1px dashed #ccc;">
            <h3>🎭 Registro Actividad / Terapia</h3>
            <select id="tipoEvento" onchange="prepararEvento()">
                <option value="ninguno">-- Seleccionar para agregar --</option>
                <option value="actividad">⚽ Actividad</option>
                <option value="terapia">🧠 Terapia</option>
            </select>

            <div id="secDinamica" class="seccion-especial">
                <p>⏰ Hora: <b id="horaEvento">--:--</b></p>
                <input type="text" id="nomEvento" placeholder="Nombre del evento">
                <textarea id="asistEvento" placeholder="Listado de asistencia..."></textarea>
                <textarea id="obsEvento" placeholder="Observaciones detalladas..."></textarea>
                <video id="videoEvidencia" autoplay playsinline style="width:100%; height:200px; background:black; border-radius:10px; margin-top:10px; object-fit:cover;"></video>
                <button type="button" onclick="tomarFoto()" style="background:#3498db; color:white; width:100%; padding:10px; border:none; border-radius:8px; margin-top:5px; font-weight:bold;">📸 Tomar Evidencia</button>
                <button type="button" onclick="subirALista()" style="background:#2ecc71; color:white; width:100%; padding:12px; border:none; border-radius:8px; margin-top:10px; font-weight:bold;">➕ Añadir al Turno</button>
            </div>
            <div id="listaTemporal" style="margin-top:10px;"></div>
        </div>

        <!-- MOVIMIENTOS AUTO -->
        <div class="card" style="border: 1px solid #3182ce;">
            <h3 style="font-size:16px;">🤖 Movimientos Detectados</h3>
            <div id="contAlertas"></div>
        </div>

        <label style="color:#2c3e50">👤 Operador Responsable:</label>
        <input type="text" id="opTurno" placeholder="Nombre del operador">
        
        <label style="color:#2c3e50">🚨 Novedades Generales:</label>
        <textarea id="novedadesTxt" style="height:120px;" placeholder="Resumen final del turno..."></textarea>

        <button id="btnGuardar" class="btn-guardar">🚀 GUARDAR TURNO COMPLETO</button>
    </div>

    <div id="historial">
        <h3>📋 Historial Detallado</h3>
        <div id="listaHistorial">Cargando...</div>
    </div>
</div>

   <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import {  getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        const firebaseConfig = {
            apiKey: "AIzaSyC78y2m79f9764f-YTuPYfP",
            authDomain: "caminosnuevosdatabase.firebaseapp.com",
            projectId: "caminosnuevosdatabase",
            storageBucket: "caminosnuevosdatabase.firebasestorage.app",
            appId: "1:907500835423:web:f56b459ab4d57d92a81ea"
        };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let totalActivos = 0; let listaEvs = []; let fotoTemp = null; let movsAuto = [];

    document.getElementById("fechaHoy").innerText = new Date().toLocaleDateString();

    onSnapshot(collection(db, "pacientes"), (snap) => {
        totalActivos = 0; movsAuto = [];
        const hoy = new Date().toLocaleDateString();
        const alertCont = document.getElementById("contAlertas");
        alertCont.innerHTML = "";
        
        snap.forEach(doc => {
            const p = doc.data();
            if((p.estado || "").toLowerCase().includes("activo")) totalActivos++;
            if(p.fechaRegistro === hoy || p.fecha === hoy) {
                const m = `• ${p.nombre}: ${p.estado}`;
                movsAuto.push(m);
                alertCont.innerHTML += `<div style="background:#ebf8ff; padding:5px; margin-top:3px; font-size:12px; border-left:3px solid #3182ce;">${m}</div>`;
            }
        });
        document.getElementById("cntActivos").innerText = totalActivos;
        window.calcularPresencia();
    });

    window.calcularPresencia = () => {
        const f = parseInt(document.getElementById("inpFuera").value) || 0;
        document.getElementById("cntEnCasa").innerText = totalActivos - f;
    };

    window.prepararEvento = () => {
        const t = document.getElementById("tipoEvento").value;
        const s = document.getElementById("secDinamica");
        if(t === "ninguno") { s.style.display="none"; return; }
        s.style.display="block";
        document.getElementById("horaEvento").innerText = new Date().toLocaleTimeString([],{hour:'2-digit', minute:'2-digit'});
        navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}})
        .then(stream => { document.getElementById("videoEvidencia").srcObject = stream; });
    };

    window.tomarFoto = () => {
        const v = document.getElementById("videoEvidencia");
        const c = document.createElement("canvas");
        c.width = v.videoWidth; c.height = v.videoHeight;
        c.getContext("2d").drawImage(v,0,0);
        fotoTemp = c.toDataURL("image/jpeg", 0.5);
        alert("📸 Evidencia capturada");
    };

    window.subirALista = () => {
        listaEvs.push({
            tipo: document.getElementById("tipoEvento").value,
            nom: document.getElementById("nomEvento").value,
            obs: document.getElementById("obsEvento").value,
            foto: fotoTemp
        });
        document.getElementById("listaTemporal").innerHTML += `<div style="font-size:12px; color:green;">✔️ ${document.getElementById("nomEvento").value} añadida</div>`;
        document.getElementById("secDinamica").style.display="none";
        fotoTemp = null;
    };

    document.getElementById('btnGuardar').onclick = async () => {
        try {
            await addDoc(collection(db, "libro_de_turnos_pro"), {
                fecha: new Date().toLocaleString(),
                timestamp: Date.now(),
                operador: document.getElementById("opTurno").value,
                censo: { activos: totalActivos, fuera: document.getElementById("inpFuera").value, enCasa: document.getElementById("cntEnCasa").innerText },
                seguridad: {
                    grupos: document.getElementById("gruposAltos").value,
                    timbres: document.getElementById("timbres").value,
                    sombras: document.getElementById("sombras").value,
                    chivos: document.getElementById("chivos").value,
                    grilletes: document.getElementById("grilletes").value,
                    llavero: document.getElementById("llavero").value
                },
                eventos: listaEvs,
                movimientos: movsAuto,
                novedades: document.getElementById("novedadesTxt").value
            });
            alert("✅ Turno Guardado con éxito");
            location.reload();
        } catch (e) { alert("Error al guardar"); }
    };

    onSnapshot(query(collection(db, "libro_de_turnos_pro"), orderBy("timestamp", "desc")), (snap) => {
        const list = document.getElementById("listaHistorial");
        list.innerHTML = "";
        snap.forEach(doc => {
            const d = doc.data();
            let evsHtml = (d.eventos || []).map(e => `
                <div style="border-top:1px solid #ddd; padding:10px; margin-top:5px;">
                    <b>${e.tipo.toUpperCase()}:</b> ${e.nom}<br>
                    <small>${e.obs}</small><br>
                    ${e.foto ? `<img src="${e.foto}" class="foto-historial">` : ''}
                </div>`).join('');

            list.innerHTML += `
                <div class="historial-item">
                    <details>
                        <summary>📅 ${d.fecha} - Op: ${d.operador}</summary>
                        <div class="historial-detail">
                            <p><b>🏠 En Casa:</b> ${d.censo.enCasa} (Activos: ${d.censo.activos} | Fuera: ${d.censo.fuera})</p>
                            <div style="background:#fff5f5; padding:10px; border-radius:8px; border:1px solid #feb2b2;">
                                <b>🔐 Seguridad:</b><br>
                                • Grupos: ${d.seguridad.grupos}<br>
                                • Timbres: ${d.seguridad.timbres}<br>
                                • Sombras: ${d.seguridad.sombras}<br>
                                • Chivos: ${d.seguridad.chivos}<br>
                                • Grilletes: ${d.seguridad.grilletes}<br>
                                • Llavero: ${d.seguridad.llavero}
                            </div>
                            <div style="margin-top:10px;"><b>🎭 Actividades:</b> ${evsHtml || 'Ninguna'}</div>
                            <div style="margin-top:10px; border-top:2px solid #2c3e50; padding-top:5px;">
                                <b>🚨 Novedades Finales:</b><br>${d.novedades}
                            </div>
                        </div>
                    </details>
                </div>`;
        });
    });
</script>
</body>
</html>
