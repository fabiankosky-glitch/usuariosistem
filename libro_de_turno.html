<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Libro de Turno Digital - Caminos Nuevos</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 15px; margin: 0; }
        .container { max-width: 700px; margin: auto; }
        .card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2, h3 { text-align: center; color: #2c3e50; margin-top: 0; }
        .censo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .censo-item { padding: 12px; border-radius: 10px; color: white; text-align: center; font-weight: bold; }
        .resultado-casa { background: #2c3e50; color: white; padding: 12px; border-radius: 10px; text-align: center; margin-bottom: 15px; font-weight: bold; }
        .seguridad-box { background: #fff5f5; padding: 15px; border-radius: 12px; border: 1px solid #feb2b2; margin-top: 10px; }
        label { display: block; font-weight: bold; margin-top: 12px; font-size: 13px; color: #c53030; }
        textarea, input, select { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; font-size: 14px; }
        .btn-actualizar { background: #3498db; color: white; padding: 15px; width: 100%; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .btn-guardar { background: #27ae60; color: white; padding: 18px; width: 100%; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 16px; }
        .historial-item { background: white; padding: 15px; border-radius: 15px; margin-bottom: 15px; border-left: 8px solid #27ae60; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .soporte-jefe { background: #ebf5fb; padding: 10px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid #2980b9; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <button onclick="location.href='index.html'" style="margin-bottom:15px; padding:10px; width:100%; border-radius:8px; border:none; background:#95a5a6; color:white; font-weight:bold; cursor:pointer;">🏠 Menú Principal</button>
    
    <div class="card">
        <h2>📒 Libro de Turno Digital</h2>
        <p id="fechaHoy" style="font-weight:bold; text-align:center; color:#7f8c8d;"></p>
        
        <div class="censo-grid">
            <div class="censo-item" style="background:#27ae60;">🏠 Activos: <span id="cntActivos">0</span></div>
            <div class="censo-item" style="background:#e67e22;">🚶 Fuera: <input type="number" id="inpFuera" value="0" oninput="window.calcularPresencia()" style="width:50px; padding:5px;"></div>
        </div>
        <div class="resultado-casa">📍 Total en Casa: <span id="cntEnCasa">0</span></div>

        <div class="seguridad-box">
            <h3>🔐 Control de Seguridad e Inventario</h3>
            <label>👥 Listado Grupos Altos:</label><textarea id="gruposAltos"></textarea>
            <label>🔔 Timbres:</label><textarea id="timbres"></textarea>
            <label>🔑 Llavero y Grilletes:</label><textarea id="llavero"></textarea>
        </div>

        <div class="card" style="margin-top:20px; border: 2px dashed #3498db; background: #f0f7ff;">
            <h3>📸 Registro Actividad / Terapia</h3>
            <select id="tipoEvento" onchange="window.prepararEvento()">
                <option value="ninguno">-- Seleccionar --</option>
                <option value="actividad">⚽ Actividad</option>
                <option value="terapia">🧠 Terapia</option>
            </select>
            <div id="secDinamica" style="display:none; margin-top:15px;">
                <video id="videoEvidencia" autoplay playsinline style="width:100%; border-radius:10px; background:black;"></video>
                <button type="button" class="btn-actualizar" onclick="window.tomarYSubir()">📸 Capturar Foto de Evidencia</button>
                <p id="statusCarga" style="text-align:center; font-size:11px;"></p>
            </div>
        </div>

        <label>👤 Operador Responsable:</label><input type="text" id="opTurno" placeholder="Su nombre">
        <label>🚨 Novedades del Turno:</label><textarea id="novedadesTxt" style="height:150px;"></textarea>
        
        <button id="btnActualizar" type="button" class="btn-actualizar">💾 GUARDAR PROGRESO (Soporte para Jefe)</button>
        <button id="btnGuardar" type="button" class="btn-guardar">🚀 CERRAR TURNO Y ARCHIVAR</button>

        <!-- SECCIÓN DE SEGUIMIENTO EN TIEMPO REAL PARA LA JEFE -->
        <div style="margin-top:30px; border-top: 2px solid #eee; padding-top:20px;">
            <h3>👩‍⚕️ Monitoreo de Avances (Jefe)</h3>
            <div id="lineaDeTiempoJefe" style="max-height:200px; overflow-y:auto;"></div>
        </div>

        <button id="btnVerHistorial" type="button" style="margin-top:20px; width:100%; padding:10px; border-radius:10px; border:none; background:#7f8c8d; color:white; font-weight:bold;">📂 VER ARCHIVO HISTÓRICO</button>
        <div id="historial" style="display:none; margin-top:20px;">
            <h3>📋 Turnos Cerrados</h3>
            <div id="listaHistorial"></div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://gstatic.com";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, where, getDocs, deleteDoc, doc } from "https://gstatic.com";

    const firebaseConfig = {
        apiKey: "AIzaSyC78y2m79f9764f-YTuPYfP", 
        authDomain: "://firebaseapp.com",
        projectId: "caminosnuevosdatabase",
        storageBucket: "caminosnuevosdatabase.firebasestorage.app",
        appId: "1:907500835423:web:f56b459ab4d57d92a81ea"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let totalActivos = 0;
    const ID_RELACION = "turno_" + Date.now();

    document.getElementById("fechaHoy").innerText = new Date().toLocaleDateString();

    // 1. CENSO EN TIEMPO REAL
    onSnapshot(collection(db, "pacientes"), (snap) => {
        let cuenta = 0;
        snap.forEach(d => { if((d.data().estado || "").toLowerCase().includes("activo")) cuenta++; });
        totalActivos = cuenta;
        document.getElementById("cntActivos").innerText = totalActivos;
        window.calcularPresencia();
    });

    window.calcularPresencia = () => {
        const f = parseInt(document.getElementById("inpFuera").value) || 0;
        document.getElementById("cntEnCasa").innerText = totalActivos - f;
    };

    // 2. CÁMARA
    window.prepararEvento = () => {
        const t = document.getElementById("tipoEvento").value;
        const s = document.getElementById("secDinamica");
        s.style.display = (t === "ninguno") ? "none" : "block";
        if(t !== "ninguno") {
            navigator.mediaDevices.getUserMedia({video: {facingMode: "environment"}})
            .then(stream => { document.getElementById("videoEvidencia").srcObject = stream; });
        }
    };

    window.tomarYSubir = async () => {
        const status = document.getElementById("statusCarga");
        status.innerText = "⏳ Procesando foto...";
        const v = document.getElementById("videoEvidencia");
        const c = document.createElement("canvas");
        c.width = 600; c.height = v.videoHeight * (600 / v.videoWidth);
        c.getContext("2d").drawImage(v, 0, 0, c.width, c.height);
        const fotoFinal = c.toDataURL("image/jpeg", 0.3);

        try {
            await addDoc(collection(db, "evidencias_fotos"), {
                idTurno: ID_RELACION,
                tipo: document.getElementById("tipoEvento").value,
                foto: fotoFinal,
                creado: Date.now()
            });
            status.innerText = "✅ Foto enviada al servidor";
        } catch (e) { alert("Error al subir foto"); }
    };

    // 3. GUARDAR PROGRESO (SOPORTE PARA JEFE)
    document.getElementById('btnActualizar').onclick = async () => {
        const op = document.getElementById("opTurno").value;
        if(!op) return alert("⚠️ Escriba su nombre");
        try {
            const data = {
                idTurno: ID_RELACION,
                operador: op,
                fecha: new Date().toLocaleString(),
                censo: document.getElementById("cntEnCasa").innerText,
                novedades: document.getElementById("novedadesTxt").value,
                timestamp: Date.now()
            };
            await addDoc(collection(db, "soporte_jefe"), data);
            alert("💾 Progreso guardado. La jefe ya puede verlo.");
        } catch (e) { alert("Error"); }
    };

    // 4. MONITOREO JEFE (Timeline)
    onSnapshot(query(collection(db, "soporte_jefe"), where("idTurno", "==", ID_RELACION), orderBy("timestamp", "desc")), (snap) => {
        const cont = document.getElementById("lineaDeTiempoJefe");
        cont.innerHTML = "";
        snap.forEach(doc => {
            const d = doc.data();
            cont.innerHTML += `<div class="soporte-jefe"><b>🕒 ${d.fecha.split(',')[1]}</b>: ${d.novedades.substring(0, 50)}...</div>`;
        });
    });

    // 5. CERRAR TURNO (Limpia y Archiva)
    document.getElementById('btnGuardar').onclick = async () => {
        if(!confirm("¿Cerrar turno definitivamente?")) return;
        try {
            await addDoc(collection(db, "libro_de_turnos_pro"), {
                idRelacion: ID_RELACION, tipo: "final", creado: Date.now(),
                fecha: new Date().toLocaleString(), operador: document.getElementById("opTurno").value,
                novedades: document.getElementById("novedadesTxt").value,
                censo: document.getElementById("cntEnCasa").innerText
            });
            alert("✅ Turno Cerrado y Archivado.");
            location.reload();
        } catch (e) { alert("Error al cerrar"); }
    };

    // 6. HISTORIAL
    document.getElementById('btnVerHistorial').onclick = () => {
        const h = document.getElementById('historial');
        h.style.display = h.style.display === "none" ? "block" : "none";
    };

    onSnapshot(query(collection(db, "libro_de_turnos_pro"), where("tipo", "==", "final"), orderBy("creado", "desc")), (snap) => {
        const list = document.getElementById("listaHistorial");
        list.innerHTML = "";
        snap.forEach(docT => {
            const d = docT.data();
            list.innerHTML += `<div class="historial-item"><b>📅 ${d.fecha}</b><br><small>Op: ${d.operador}</small><p>${d.novedades}</p></div>`;
        });
    });
</script>
</body>
</html>
