<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acceso Seguro - Nuevos Caminos</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #2c3e50; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); text-align: center; width: 100%; max-width: 400px; }
        select, input { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        .btn-entrar { width: 100%; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>Nuevos Caminos</h2>
    <p>Inicie sesión para acceder al sistema</p>
    <select id="rolUsuario">
        <option value="psicologia">Psicología</option>
        <option value="terapeuta">Terapeuta</option>
        <option value="director_terapeutico">Director Terapéutico</option>
        <option value="directora_general">Directora General</option>
        <option value="admin">Administrador</option>
    </select>
    <input type="password" id="passUsuario" placeholder="Contraseña">
    <button class="btn-entrar" id="btnLogin">Ingresar al Sistema</button>
</div>

<script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        const firebaseConfig = {
  apiKey: "AIzaSyC78y2K4T9rMFMVsG_UQxTmPANzV7Yapf8",
  authDomain: "caminosnuevosdatabase.firebaseapp.com",
  projectId: "caminosnuevosdatabase",
  storageBucket: "caminosnuevosdatabase.firebasestorage.app",
  messagingSenderId: "907500835423",
  appId: "1:907500835423:web:f50b459a84f5d7d92a81ea",
  measurementId: "G-3N6B4PV2NC"
};

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    document.getElementById('btnLogin').addEventListener('click', async () => {
        const rol = document.getElementById('rolUsuario').value;
        const pass = document.getElementById('passUsuario').value;
        
        // Simulamos el correo según el rol para usar Firebase Auth real
        // Lo ideal es que cada profesional tenga su propio correo real.
        const email = `${rol}@caminosnuevos.com`;

        try {
            // 1. Autenticación Real con Firebase
            const userCredential = await signInWithEmailAndPassword(auth, email, pass);
            const user = userCredential.user;

            // 2. Registro de Trazabilidad Seguro
            try {
                await addDoc(collection(db, "auditoria"), {
                    uid: user.uid,
                    usuario: rol,
                    accion: "Inicio de Sesión Exitoso",
                    fecha: serverTimestamp(),
                    dispositivo: navigator.userAgent
                });
            } catch (auditError) {
                console.warn("Aviso: No se pudo registrar la auditoría, pero el acceso continúa.", auditError);
            }

            // 3. Manejo de Sesión
            sessionStorage.setItem('rolActivo', rol);
            sessionStorage.setItem('autenticado', 'true');
            
            window.location.href = "index.html";

        } catch (error) {
            console.error("Error de acceso:", error.code);
            let mensaje = "❌ Error al iniciar sesión.";
            if (error.code === 'auth/wrong-password' || error.code === 'auth/user-not-found') {
                mensaje = "❌ Credenciales inválidas para el rol seleccionado.";
            } else if (error.code === 'auth/invalid-credential') {
                mensaje = "❌ Contraseña o usuario incorrectos.";
            } else if (error.code === 'auth/operation-not-allowed') {
                mensaje = "❌ El inicio de sesión con contraseña está deshabilitado en Firebase. Actívalo en la Consola (Authentication > Sign-in method).";
            }
            alert(mensaje);
        }
    });
</script>
</body>
</html>
