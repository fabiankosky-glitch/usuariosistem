<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Seguro - Nuevos Caminos</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #2c3e50; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); text-align: center; width: 100%; max-width: 400px; }
        img { width: 100px; margin-bottom: 20px; }
        h2 { color: #2c3e50; margin-bottom: 5px; }
        p { color: #7f8c8d; font-size: 14px; margin-bottom: 30px; }
        select, input { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; box-sizing: border-box; outline: none; }
        .btn-entrar { width: 100%; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-entrar:hover { background: #219150; }
    </style>
</head>
<body>

<div class="login-card">
    <img src="logo_fundacion.png" alt="Logo"> <!-- Pon tu logo aquí -->
    <h2>Nuevos Caminos</h2>
    <p>Sistema de Gestión de Historias Clínicas</p>

    <label style="display:block; text-align:left; font-weight:bold; margin-bottom:5px;">Seleccione su Rol:</label>
    <select id="rolUsuario">
        <option value="psicologia">Psicología</option>
        <option value="terapeuta">Terapeuta</option>
        <option value="director_terapeutico">Director Terapéutico</option>
        <option value="directora_general">Directora General</option>
        <option value="admin">Administrador del Sistema (TI)</option>
    </select>

    <label style="display:block; text-align:left; font-weight:bold; margin-bottom:5px;">Contraseña de Acceso:</label>
    <input type="password" id="passUsuario" placeholder="••••••••">

    <button class="btn-entrar" onclick="validarAcceso()">Ingresar al Sistema</button>
</div>

<script>
    function validarAcceso() {
        const rol = document.getElementById('rolUsuario').value;
        const pass = document.getElementById('passUsuario').value;

        // DEFINICIÓN DE CLAVES (En el futuro esto vendrá de Firebase Auth)
        // Por ahora, para tus 12 horas de récord:
        const llaves = {
            "psicologia": "psico2024",
            "terapeuta": "tera2024",
            "director_terapeutico": "dirtera2024",
            "directora_general": "dirgen2024",
            "admin": "admin2024"
        };

        if (pass === llaves[rol]) {
            // Guardamos el rol en la sesión para que los botones sepan quién entró
            sessionStorage.setItem('rolActivo', rol);
            sessionStorage.setItem('autenticado', 'true');
            
            alert("✅ Acceso concedido como: " + rol.replace('_', ' ').toUpperCase());
            window.location.href = "index.html"; 
        } else {
            alert("❌ Contraseña incorrecta para el perfil seleccionado.");
        }
    }
</script>

</body>
</html>
