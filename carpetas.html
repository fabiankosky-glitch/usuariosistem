<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Historias Clínicas</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; text-align: center; padding: 20px; }
        .btn-volver { background: #95a5a6; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; text-decoration: none; display: inline-block; margin-bottom: 20px; font-weight: bold; }
        .paciente-card { background: white; border-radius: 12px; margin: 10px auto; padding: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); max-width: 450px; border-left: 5px solid #3498db; }
        .folders { display: none; margin-top: 15px; padding-top: 10px; border-top: 1px solid #eee; justify-content: center; gap: 5px; }
        .btn-f { padding: 10px; border: none; border-radius: 5px; color: white; cursor: pointer; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>

    <a href="index.html" class="btn-volver">⬅ Volver al Menú</a>
    <h2>📋 Historias Clínicas</h2>
    <div id="listaPacientes">Cargando pacientes...</div>

    <script type="module">
// LÍNEA 1 (Únela toda)
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

// LÍNEA 2 (Únela toda)
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Configuración de tu base de datos
        const firebaseConfig = {
            apiKey: "AIzaSyC78y2m79f9764f-YTuPYfP",
            authDomain: "caminosnuevosdatabase.firebaseapp.com",
            projectId: "caminosnuevosdatabase",
            storageBucket: "caminosnuevosdatabase.firebasestorage.app",
            appId: "1:907500835423:web:f56b459ab4d57d92a81ea"
        };

  const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function cargarPacientes() {
            const lista = document.getElementById("listaPacientes");
            try {
                const querySnapshot = await getDocs(collection(db, "pacientes"));
                lista.innerHTML = ""; 
                
                if (querySnapshot.empty) {
                    lista.innerHTML = "<p>No hay pacientes registrados aún.</p>";
                    return;
                }

                querySnapshot.forEach((doc) => {
                    const p = doc.data();
                    const id = doc.id;
                    lista.innerHTML += `
                        <div class="paciente-card">
                            <div onclick="window.toggleF('${id}')" style="cursor:pointer; display:flex; align-items:center;">
                                <img src="${p.foto || ''}" width="50" height="50" style="border-radius:50%; margin-right:15px; object-fit:cover; background:#eee;">
                                <div style="text-align:left;">
                                    <strong style="font-size:18px;">${p.nombre}</strong><br>
                                    <small style="color:#3498db;">Ver Carpetas ▼</small>
                                </div>
                            </div>
                            <div id="f-${id}" class="folders">
                                <button class="btn-f" style="background:#3498db" onclick="window.location.href='detalle_clinico.html?id=${id}'">📁 Clínico</button>
                                <button class="btn-f" style="background:#27ae60" onclick="window.location.href='detalle_terapeutico.html?id=${id}'">📁 Terapéutico</button>
                                <button class="btn-f" style="background:#8e44ad" onclick="window.location.href='detalle_psicologico.html?id=${id}'">📁 Psicológico</button>
                            </div>
                        </div>`;
                });
            } catch (e) { 
                lista.innerHTML = "Error de conexión: " + e.message; 
                console.error(e);
            }
        }

        window.toggleF = (id) => {
            const d = document.getElementById('f-' + id);
            if (d.style.display === "flex") {
                d.style.display = "none";
            } else {
                d.style.display = "flex";
            }
        };

        cargarPacientes();
    </script>
</body>
</html>
