<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Historias Clínicas - Pacientes</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 800px; margin: auto; }
        .btn-volver { background: #95a5a6; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-bottom: 20px; font-weight: bold; }
        
        /* Tarjeta del Paciente */
        .paciente-item { background: white; border-radius: 12px; margin-bottom: 15px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: 0.3s; }
        .paciente-header { padding: 15px; display: flex; align-items: center; cursor: pointer; background: #fff; }
        .paciente-header:hover { background: #f9f9f9; }
        .paciente-header img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; margin-right: 15px; border: 2px solid #3498db; }
        .paciente-info { text-align: left; flex-grow: 1; }
        .paciente-info h3 { margin: 0; color: #2c3e50; font-size: 18px; }
        
        /* Contenedor de las 3 Carpetas (Oculto por defecto) */
        .folders-container { 
            display: none; /* Se activa con JS */
            padding: 15px; background: #f8f9fa; border-top: 1px solid #eee;
            grid-template-columns: repeat(3, 1fr); gap: 10px;
        }
        .btn-folder { 
            padding: 12px; border: none; border-radius: 8px; color: white; 
            font-weight: bold; cursor: pointer; font-size: 13px; transition: 0.2s;
        }
        .clinico { background: #3498db; }
        .terapeutico { background: #27ae60; }
        .psicologico { background: #8e44ad; }
        .btn-folder:hover { opacity: 0.8; transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="container">
    <button class="btn-volver" onclick="window.location.href='menu.html'">⬅ Volver al Menú</button>
    <h2>📋 Historias Clínicas</h2>
    <div id="listaPacientes">Cargando pacientes...</div>
</div>

<script type="module">
    import { initializeApp } from "https://gstatic.com";
    import { getFirestore, collection, getDocs } from "https://gstatic.com";

    const firebaseConfig = {
        apiKey: "TU_API_KEY",
        authDomain: "://firebaseapp.com",
        projectId: "caminosnuevosdatabase",
        storageBucket: "caminosnuevosdatabase.firebasestorage.app",
        appId: "TU_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function cargarPacientes() {
        const lista = document.getElementById("listaPacientes");
        try {
            const querySnapshot = await getDocs(collection(db, "pacientes"));
            lista.innerHTML = "";

            querySnapshot.forEach((doc) => {
                const p = doc.data();
                const id = doc.id;

                lista.innerHTML += `
                    <div class="paciente-item">
                        <div class="paciente-header" onclick="toggleFolders('${id}')">
                            <img src="${p.foto || 'https://placeholder.com'}" alt="Foto">
                            <div class="paciente-info">
                                <h3>${p.nombre}</h3>
                                <small>Documento: ${p.cedula || 'N/A'}</small>
                            </div>
                            <span>▼</span>
                        </div>
                        <div id="folders-${id}" class="folders-container">
                            <button class="btn-folder clinico" onclick="irA('clinico', '${id}')">📁 Clínico</button>
                            <button class="btn-folder terapeutico" onclick="irA('terapeutico', '${id}')">📁 Terapéutico</button>
                            <button class="btn-folder psicologico" onclick="irA('psicologico', '${id}')">📁 Psicológico</button>
                        </div>
                    </div>
                `;
            });
        } catch (e) { lista.innerHTML = "Error al cargar."; }
    }

    // Función para mostrar/ocultar carpetas
    window.toggleFolders = (id) => {
        const div = document.getElementById(`folders-${id}`);
        div.style.display = (div.style.display === 'grid') ? 'none' : 'grid';
    };

    // Función para navegar a la carpeta específica
    window.irA = (tipo, id) => {
        window.location.href = `detalle_${tipo}.html?id=${id}`;
    };

    cargarPacientes();
</script>
</body>
</html>
