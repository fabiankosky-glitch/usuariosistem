<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expediente del Paciente</title>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; }
        nav { background: #2c3e50; padding: 15px; display: flex; justify-content: center; gap: 20px; }
        nav a { color: white; text-decoration: none; font-weight: bold; }
        .container { padding: 20px; max-width: 600px; margin: auto; text-align: center; }
        .perfil { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .perfil img { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 4px solid #2980b9; }
        .folder-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        .folder-card { background: #fff; padding: 20px; border-radius: 12px; display: flex; align-items: center; gap: 20px; cursor: pointer; transition: 0.3s; border-left: 8px solid #f1c40f; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .folder-card:hover { transform: scale(1.02); background: #fef9e7; }
        .folder-card h3 { margin: 0; color: #2c3e50; }
    </style>
</head>
<body>

<nav>
    <a href="index.html">📝 Registro</a>
    <a href="menu.html">📋 Ver Pacientes</a>
</nav>

<div class="container">
    <div class="perfil" id="perfilPaciente">Cargando datos...</div>

    <div class="folder-grid">
    <div class="folder-card" onclick="window.location.href='detalle_clinico.html'">
        <h3>Sección Clínica</h3>
    </div>
    <span style="font-size: 40px;">📁</span>
    <h3>Sección Clínica</h3>
    </div>
    <div class="folder-card" onclick="window.location.href='detalle_terapeutico.html'">
    <h3>Sección Terapéutica</h3>
    </div>
    <span style="font-size: 40px;">📁</span>
    <h3>Sección Terapéutica</h3>
    </div>
    <div class="folder-card" onclick="window.location.href='detalle_psicologico.html'">
    <h3>Sección Psicológica</h3>
    </div>
    <span style="font-size: 40px;">📁</span>
    <h3>Sección Psicológica</h3>
     </div>
   </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyC78y2K4T9rMFMVsG_UQxTmPANzV7Yapf8",
        authDomain: "://firebaseapp.com",
        projectId: "caminosnuevosdatabase",
        storageBucket: "caminosnuevosdatabase.firebasestorage.app",
        appId: "1:907500835423:web:f50b459a84f5d7d92a81ea"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Obtener el ID del paciente desde la URL
    const urlParams = new URLSearchParams(window.location.search);
    const pacienteId = urlParams.get('id');

    if (pacienteId) {
        db.collection("pacientes").doc(pacienteId).get().then((doc) => {
            if (doc.exists) {
                const p = doc.data();
                document.getElementById("perfilPaciente").innerHTML = `
                    <img src="${p.foto}" alt="Foto">
                    <h2>${p.nombre}</h2>
                    <p style="color: #7f8c8d;">ID: ${doc.id}</p>
                `;
            }
        });
    }
</script>
</body>
</html>
