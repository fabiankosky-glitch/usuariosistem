<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Libros</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; text-align: center; padding: 20px; }
        .grid-libros { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; max-width: 900px; margin: 40px auto; }
        .btn-libro { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); cursor: pointer; transition: 0.3s; border: none; font-size: 18px; font-weight: bold; color: #2c3e50; }
        .btn-libro:hover { transform: translateY(-5px); box-shadow: 0 8px 20px rgba(0,0,0,0.15); }
        .icon { font-size: 40px; display: block; margin-bottom: 10px; }
        /* Colores de borde para identificar cada uno */
        .b-turno { border-bottom: 6px solid #2980b9; }
        .b-correcto { border-bottom: 6px solid #e67e22; }
        .b-minuta { border-bottom: 6px solid #27ae60; }
        .b-otros { border-bottom: 6px solid #8e44ad; }
    </style>
</head>
<body>

    <h2 style="color: #2c3e50;">📚 Seleccione el Libro a Gestionar</h2>

    <div class="grid-libros">
        <!-- 1. LIBRO DE TURNO -->
        <button type="button" class="btn-libro b-turno" onclick="location.href='libro_de_turno.html'">
            <span class="icon">📝</span> LIBRO DE TURNO
        </button>

        <!-- 2. LIBRO CORRECTO -->
        <button type="button" class="btn-libro b-correcto" onclick="location.href='libro_correcto.html'">
            <span class="icon">💊</span> LIBRO CORRECTO
        </button>

        <!-- 3. MINUTA DE ENFERMERÍA -->
        <button type="button" class="btn-libro b-minuta" onclick="location.href='minuta_enfermeria.html'">
            <span class="icon">📋</span> MINUTA DE ENFERMERÍA
        </button>

        <!-- 4. OTROS LIBROS -->
        <button type="button" class="btn-libro b-otros" onclick="location.href='otros_libros.html'">
            <span class="icon">📚</span> OTROS LIBROS
        </button>
    </div>

    <button onclick="window.location.href='index.html'" style="background: none; border: 1px solid #999; padding: 10px 20px; border-radius: 8px; cursor: pointer;">⬅️ Volver al Menú Principal</button>

</body>
</html>
