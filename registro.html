<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro de Paciente</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #f4f7f6; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        video { width: 100%; border-radius: 10px; background: #000; margin-bottom: 10px; transform: scaleX(-1); }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ccc; font-weight: bold; font-size: 16px; box-sizing: border-box; }
        button { cursor: pointer; transition: 0.3s; color: white; border: none; }
        .btn-foto { background: #27ae60; }
        .btn-guardar { background: #2ecc71; }
        .btn-volver { background: #95a5a6; }
        button:hover { opacity: 0.8; transform: scale(1.02); }
    </style>
</head>
<body>

    <div class="card" style="max-width: 450px; margin: auto; padding: 20px; background: white; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
        <h2 style="color: #2c3e50;">📝 Registro de Ingreso</h2>
        
        <label style="display:block; text-align:left; font-weight:bold; margin-top:10px;">Nombre Completo:</label>
        <input type="text" id="nombreInput" placeholder="Nombre completo del paciente" style="width:100%; padding:10px; margin-bottom:10px; border-radius:8px; border:1px solid #ccc; box-sizing: border-box;">

        <label style="display:block; text-align:left; font-weight:bold;">Cédula de Ciudadanía:</label>
        <input type="number" id="cedulaInput" placeholder="Número de documento" style="width:100%; padding:10px; margin-bottom:10px; border-radius:8px; border:1px solid #ccc; box-sizing: border-box;">

        <div style="display: flex; gap: 10px; margin-bottom: 10px;">
            <div style="flex: 1;">
                <label style="display:block; text-align:left; font-weight:bold;">Edad:</label>
                <input type="number" id="edadInput" placeholder="Años" style="width:100%; padding:10px; border-radius:8px; border:1px solid #ccc; box-sizing: border-box;">
            </div>
            <div style="flex: 1;">
                <label style="display:block; text-align:left; font-weight:bold;">Sexo:</label>
                <select id="sexoInput" style="width:100%; padding:10px; border-radius:8px; border:1px solid #ccc; height: 38px;">
                    <option value="Masculino">Masculino</option>
                    <option value="Femenino">Femenino</option>
                    <option value="Otro">Otro</option>
                </select>
            </div>
        </div>

        <label style="display:block; text-align:left; font-weight:bold;">Categoría de Ingreso:</label>
        <select id="estadoInicial" style="width:100%; padding:10px; margin-bottom:15px; border-radius:8px; border:1px solid #ccc;">
            <option value="activos">🟢 Usuario Activo</option>
            <option value="desprendimiento">🤝 Desprendimiento</option>
            <option value="abandonos">🟠 Abandono</option>
            <option value="fugas">🔴 Fuga</option>
            <option value="movilizaciones">🔵 Movilización</option>
        </select>

        <div class="preview-camera" style="background: #000; height: 200px; border-radius: 10px; margin: 10px 0; overflow:hidden;">
            <video id="video" autoplay playsinline style="width:100%; height:100%; object-fit:cover;"></video>
            <canvas id="canvas" style="display:none;"></canvas>
        </div>

        <button style="background:#3498db; color:white; padding:10px; width:100%; border:none; border-radius:8px; cursor:pointer; font-weight:bold;" onclick="window.tomarFoto()">📸 Tomar Foto de Identidad</button>
        
        <button style="background:#27ae60; color:white; padding:15px; width:100%; border:none; border-radius:8px; cursor:pointer; margin-top:15px; font-weight:bold;" onclick="window.guardarPaciente()">🚀 Registrar e Iniciar Historia</button>
        
        <button onclick="window.location.href='index.html'" style="background:none; border:none; color:#95a5a6; cursor:pointer; margin-top:10px;">Volver al Menú</button>
    </div>

    <script type="module">
// LÍNEA 1 (Únela toda)
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

// LÍNEA 2 (Únela toda)
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Configuración de tu base de datos
        const firebaseConfig = {
            apiKey: "AIzaSyC78y2m79f9764f-YTuPYfP",
            authDomain: "caminosnuevosdatabase.firebaseapp.com",
            projectId: "caminosnuevosdatabase",
            storageBucket: "caminosnuevosdatabase.firebasestorage.app",
            appId: "1:907500835423:web:f56b459ab4d57d92a81ea"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        let fotoData = null;

        // Iniciar cámara al cargar la página
        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => { video.srcObject = stream; })
            .catch(err => { 
                console.error("Error cámara:", err);
                alert("Por favor, permite el acceso a la cámara.");
            });

        // Capturar la imagen
        document.getElementById('btnCapturar').onclick = () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            // Efecto espejo para que la foto quede igual que la vista previa
            ctx.translate(canvas.width, 0);
            ctx.scale(-1, 1);
            ctx.drawImage(video, 0, 0);
            fotoData = canvas.toDataURL('image/jpeg', 0.7);
            alert("Foto capturada con éxito ✅");
        };

        // Guardar en Firebase
     window.guardarPaciente = async () => {
    // 1. Capturamos todos los nuevos datos
    const nombre = document.getElementById("nombreInput").value;
    const cedula = document.getElementById("cedulaInput").value;
    const edad = document.getElementById("edadInput").value;
    const sexo = document.getElementById("sexoInput").value;
    const estado = document.getElementById("estadoInicial").value;

    // 2. Validación de seguridad
    if (!nombre || !cedula || !fotoData) { // Usamos fotoData que es el nombre de tu variable
        return alert("⚠️ Error: El nombre, la cédula y la foto son obligatorios.");
    }

    try {
        // 3. Generar fecha automática legible
        const fechaHoy = new Date().toLocaleDateString('es-CO', {
            year: 'numeric', month: 'long', day: 'numeric'
        });

        // 4. Guardar en Firebase (Ajustado a tus nombres de campos)
        await addDoc(collection(db, "pacientes"), {
            nombre: nombre,
            cedula: cedula,
            edad: edad,
            sexo: sexo,
            estado: estado,
            fotoID: fotoData, // Guardamos la foto capturada
            fechaIngreso: fechaHoy,
            timestamp: Date.now()
        });

        alert("✅ Paciente registrado con éxito.");
        window.location.href = "historias.html"; 

    } catch (error) {
        alert("Error al guardar: " + error.message);
    }
};
    </script>
</body>
</html>
