<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HCE Bóveda Cifrada - Nuevos Caminos</title>
    <!-- Librerías de Ley -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #2c3e50; text-align: center; padding: 20px; margin: 0; }
        .container { max-width: 650px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 25px rgba(0,0,0,0.5); }
        .btn-abrir { background: #2c3e50; color: white; padding: 15px; width: 100%; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; margin-bottom: 20px; }
        #areaRegistro { display: none; background: #f9f9f9; padding: 20px; border-radius: 15px; border: 1px solid #ddd; margin-bottom: 30px; animation: fadeIn 0.3s; }
        textarea, input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; margin-bottom: 10px; font-family: inherit; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; color: white; font-size: 16px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .evolucion-item { text-align: left; background: #fff; border-left: 5px solid #9b59b6; padding: 0; margin-bottom: 15px; position: relative; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-radius: 8px; overflow: hidden; }
        .btn-ley { font-size: 10px; padding: 5px 8px; border: none; border-radius: 4px; color: white; cursor: pointer; }
        .aclaratoria-box { background: #fffcf5; border: 1px solid #ffe0b2; border-left: 3px solid #ff9800; padding: 10px; margin-top: 10px; border-radius: 5px; }
        .badge-cifrado { font-size: 9px; color: #27ae60; font-weight: bold; position: absolute; top: 5px; right: 10px; }
        .modal-aclaracion { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 25px; border-radius: 15px; width: 90%; max-width: 500px; text-align: left; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body onmousemove="resetTimer()" onclick="resetTimer()" onkeypress="resetTimer()">

<div class="container">
    <h2 id="nombrePaciente">Cargando...</h2>
    <div style="background:#e8f5e9; color:#2e7d32; padding:5px; border-radius:5px; font-size:10px; margin-bottom:10px; font-weight:bold;">🛡️ BÓVEDA DIGITAL: CIFRADO AES-256 ACTIVO</div>

    <button class="btn-abrir" onclick="solicitarClaveAcceso('registro')">➕ NUEVA EVOLUCIÓN (Requiere Clave Clínica)</button>

    <div id="areaRegistro">
        <video id="video" style="width:100%; border-radius:10px; background:#000;" autoplay playsinline></video>
        <canvas id="canvas" style="display:none;"></canvas>
        <img id="imgPreview" style="display:none; width:100%; border-radius:10px; margin-bottom:10px;">
        
        <button class="btn" style="background:#34495e" onclick="tomarFoto()">📸 Capturar Evidencia</button>
        
        <input type="text" id="cie10" placeholder="Código CIE-10 (Obligatorio)">
        <select id="tipoRegistro">
            <option value="evolucion">Evolución Clínica Psicológica</option>
            <option value="anexo">Anexo Externo (Laboratorio / Remisión)</option>
        </select>
        <textarea id="textoPsicologico" rows="4" placeholder="Evolución (Será cifrada de extremo a extremo)..."></textarea>
        
        <button class="btn" style="background:#9b59b6" onclick="guardarRegistroCifrado()">💾 Guardar, Firmar y Cifrar</button>
        <button class="btn" style="background:#95a5a6" onclick="toggleFormulario()">❌ Cancelar</button>
    </div>

    <hr>
    <h3>📋 Historial Clínico Desbloqueable</h3>
    <button id="btnVerHistorial" class="btn" style="background:#2980b9" onclick="solicitarClaveAcceso('historial')">🔓 Descifrar Historial con Clave</button>
    <div id="listaEvoluciones"></div>
    
    <button onclick="window.location.href='perfil_paciente.html?id=' + idPaciente" style="background:none; border:none; color:#3498db; cursor:pointer; font-weight:bold; margin-top:20px;">⬅ Volver al Perfil</button>
</div>

<div id="modalAclaracion" class="modal-aclaracion">
    <div class="modal-content">
        <h3>📝 Nota Aclaratoria Profesional</h3>
        <textarea id="textoAclaratoriaNueva" placeholder="Escriba aquí la aclaración (Inalterable)..." style="height:150px; resize:none;"></textarea>
        <div style="display:flex; gap:10px;">
            <button class="btn" style="background:#27ae60; margin:0;" onclick="confirmarAclaratoria()">💾 Guardar Aclaración</button>
            <button class="btn" style="background:#95a5a6; margin:0;" onclick="cerrarModal()">❌ Cerrar</button>
        </div>
    </div>
</div>

<script type="module">
           import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, addDoc, query, where, getDocs, serverTimestamp, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        const firebaseConfig = {
            apiKey: "AIzaSyC78y2m79f9764f-YTuPYfP",
            authDomain: "caminosnuevosdatabase.firebaseapp.com",
            projectId: "caminosnuevosdatabase",
            storageBucket: "caminosnuevosdatabase.firebasestorage.app",
            appId: "1:907500835423:web:f56b459ab4d57d92a81ea"
        };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const params = new URLSearchParams(window.location.search);
    const idPaciente = params.get("id");
    const rolAutor = sessionStorage.getItem('rolActivo');

    // --- MANO DURA: LÓGICA DE CIFRADO ---
    const LLAVE_MAESTRA = "FundacionNuevosCaminos2024*USC"; 
    const CLAVE_CLINICA = "1234"; 

    const cifrar = (txt) => CryptoJS.AES.encrypt(txt, LLAVE_MAESTRA).toString();
    const descifrar = (hash) => {
        try {
            const bytes = CryptoJS.AES.decrypt(hash, LLAVE_MAESTRA);
            return bytes.toString(CryptoJS.enc.Utf8) || "Error al descifrar";
        } catch(e) { return "Dato no cifrado o error de llave"; }
    };

    window.solicitarClaveAcceso = (tipo) => {
        const pass = prompt("🔐 INGRESE CLAVE DE SEGURIDAD CLÍNICA:");
        if (pass === CLAVE_CLINICA) {
            if (tipo === 'registro') toggleFormulario();
            if (tipo === 'historial') cargarHistorialCifrado();
        } else { alert("❌ Clave Incorrecta"); }
    };

    let fotoBase64 = "", streamActivo = null, idNotaActual = "";

    // --- SEGURIDAD POR INACTIVIDAD ---
    let timer; window.resetTimer = () => { clearTimeout(timer); timer = setTimeout(() => { sessionStorage.clear(); window.location.href = 'login.html'; }, 300000); };

    window.toggleFormulario = async () => {
        const div = document.getElementById('areaRegistro'), video = document.getElementById('video');
        if (div.style.display === 'none' || div.style.display === '') {
            div.style.display = 'block';
            streamActivo = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            video.srcObject = streamActivo;
        } else {
            div.style.display = 'none';
            if (streamActivo) streamActivo.getTracks().forEach(t => t.stop());
        }
    };

    window.tomarFoto = () => {
        const v = document.getElementById('video'), c = document.getElementById('canvas');
        c.width = v.videoWidth; c.height = v.videoHeight;
        c.getContext('2d').drawImage(v, 0, 0);
        fotoBase64 = c.toDataURL('image/jpeg', 0.7);
        document.getElementById('imgPreview').src = fotoBase64;
        document.getElementById('imgPreview').style.display = 'block';
        v.style.display = 'none';
    };

    window.guardarRegistroCifrado = async () => {
        const texto = document.getElementById("textoPsicologico").value;
        const cie = document.getElementById("cie10").value;
        if (!texto || !cie) return alert("Faltan datos.");
        const motivo = prompt("Motivo de consulta:"); if(!motivo) return;

        try {
            await addDoc(collection(db, "evoluciones_psicologicas"), {
                idPaciente, 
                texto: cifrar(texto), 
                cie10: cifrar(cie.toUpperCase()), 
                motivoConsulta: cifrar(motivo),
                aspectos: cifrar(document.getElementById("aspectos").value),
                fotoBase64,
                tipo: document.getElementById("tipoRegistro").value, 
                autorRol: rolAutor,
                fechaHora: new Date().toLocaleString(),
                timestamp: serverTimestamp(),
                hash: btoa(texto + Date.now()).substring(0,12),
                aclaratorias: []
            });
            alert("✅ Registro cifrado y guardado.");
            location.reload();
        } catch (e) { alert(e.message); }
    };

    window.cargarHistorialCifrado = async () => {
        const snap = await getDocs(query(collection(db, "evoluciones_psicologicas"), where("idPaciente", "==", idPaciente)));
        let html = "";
        snap.forEach(d => {
            const ev = d.data();
            const tieneAclaratorias = ev.aclaratorias && ev.aclaratorias.length > 0;
            html += `
            <div class="evolucion-item">
                <span class="badge-cifrado">🔐 AES-256 ENCRYPTED</span>
                <div style="padding:15px;">
                    ${ev.tipo === 'anexo' ? '<span class="badge-anexo">📁 ANEXO EXTERNO</span>' : ''}
                    <strong>📅 ${ev.fechaHora} | CIE-10: ${descifrar(ev.cie10)}</strong>
                    <p>${descifrar(ev.texto)}</p>
                    ${ev.fotoBase64 ? `<img src="${ev.fotoBase64}" style="width:100px; border-radius:5px; margin-bottom:10px; cursor:pointer;" onclick="window.open('${ev.fotoBase64}')">` : ''}
                    
                    <div style="display:flex; gap:5px; margin-bottom:10px;">
                        <button class="btn-ley" style="background:#2980b9" onclick="descargarJSON('${d.id}')">📤 JSON</button>
                        <button class="btn-ley" style="background:#e67e22" onclick="imprimirNota('${d.id}')">🖨️ PDF/A</button>
                        <button class="btn-ley" style="background:#95a5a6" onclick="abrirModalAclaracion('${d.id}')">📝 ACLARAR</button>
                        ${tieneAclaratorias ? `<button class="btn-ley" style="background:#34495e" onclick="toggleAclaratorias('${d.id}')">🔔 VER ACLARACIONES (${ev.aclaratorias.length})</button>` : ''}
                    </div>

                    <div id="acordeon-${d.id}" style="display:none; margin-top:10px; border-top: 2px solid #ff9800; background: #fffcf5; padding: 10px; border-radius: 5px;">
                        <p style="font-size:10px; color:#e67e22; font-weight:bold; margin:0 0 10px 0;">⚠️ TRAZABILIDAD DE MODIFICACIONES:</p>
                        ${(ev.aclaratorias || []).map(a => `<div style="margin-bottom:8px; border-left:2px solid #ff9800; padding-left:10px;"><small>${a.fecha} - Por: ${a.autor}</small><br><p style="margin:2px 0; font-size:13px;">${descifrar(a.texto)}</p></div>`).join('')}
                    </div>
                    <div style="font-size:10px; color:gray; border-top:1px solid #eee; padding-top:5px; margin-top:10px;">Firmado: ${ev.autorRol.toUpperCase()} | HASH: ${ev.hash || 'FIDEDIGNO'}</div>
                </div>
            </div>`;
        });
        document.getElementById("listaEvoluciones").innerHTML = html || "Sin registros.";
        document.getElementById("btnVerHistorial").style.display = 'none';
    };

    window.abrirModalAclaracion = (id) => { idNotaActual = id; document.getElementById('modalAclaracion').style.display = 'flex'; };
    window.cerrarModal = () => { document.getElementById('modalAclaracion').style.display = 'none'; };
    window.confirmarAclaratoria = async () => {
        const nota = document.getElementById('textoAclaratoriaNueva').value;
        if(!nota.trim()) return;
        await updateDoc(doc(db, "evoluciones_psicologicas", idNotaActual), { aclaratorias: arrayUnion({ texto: cifrar(nota), fecha: new Date().toLocaleString(), autor: rolAutor }) });
        location.reload();
    };

    window.toggleAclaratorias = (id) => { const el = document.getElementById(`acordeon-${id}`); el.style.display = el.style.display === 'none' ? 'block' : 'none'; };
    
    window.descargarJSON = async (id) => { 
        const d = await getDoc(doc(db, "evoluciones_psicologicas", id)); 
        const blob = new Blob([JSON.stringify(d.data())], {type: "application/json"}); 
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `HCE_Interop_${id}.json`; a.click(); 
    };

    window.imprimirNota = async (id) => {
        const d = await getDoc(doc(db, "evoluciones_psicologicas", id));
        const ev = d.data();
        const win = window.open('', '_blank');
        win.document.write(`<html><body style="font-family:Arial; padding:40px;"><h2>INFORME DESCIFRADO</h2><p><strong>CIE-10:</strong> ${descifrar(ev.cie10)}</p><p>${descifrar(ev.texto)}</p><br>Firma: ${ev.autorRol.toUpperCase()}<script>window.print();<\/script></body></html>`);
    };

    const snapP = await getDoc(doc(db, "pacientes", idPaciente));
    if (snapP.exists()) document.getElementById("nombrePaciente").innerText = snapP.data().nombre;
    window.idPaciente = idPaciente;
</script>
</body>
</html>
