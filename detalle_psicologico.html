<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HCE Blindada - Nuevos Caminos</title>
    <script src="https://cloudflare.com"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; text-align: center; padding: 20px; margin: 0; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .btn-abrir { background: #2c3e50; color: white; padding: 15px; width: 100%; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; margin-bottom: 20px; }
        #areaRegistro { display: none; background: #f9f9f9; padding: 20px; border-radius: 15px; border: 1px solid #ddd; margin-bottom: 30px; }
        textarea, input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; margin-bottom: 10px; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; color: white; font-size: 16px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .evolucion-item { text-align: left; background: #fff; border-left: 5px solid #9b59b6; padding: 15px; margin-bottom: 15px; position: relative; }
        .aclaratoria-box { background: #fff3e0; border-left: 3px solid #ff9800; padding: 10px; margin-top: 10px; font-size: 13px; }
        .badge-anexo { background: #2980b9; color: white; font-size: 10px; padding: 3px 7px; border-radius: 5px; }
    </style>
</head>
<body onmousemove="resetTimer()" onclick="resetTimer()" onkeypress="resetTimer()">

<div class="container">
    <h2 id="nombrePaciente">Cargando...</h2>
    <p style="color: #27ae60; font-size: 12px;">🛡️ SISTEMA DE SEGURIDAD ACTIVO: CIERRE POR INACTIVIDAD</p>

    <button class="btn-abrir" onclick="toggleFormulario()">➕ NUEVA EVOLUCIÓN O ANEXO</button>

    <div id="areaRegistro">
        <div id="videoContainer"><video id="video" style="width:100%; border-radius:10px;" autoplay playsinline></video></div>
        <canvas id="canvas" style="display:none;"></canvas>
        <img id="imgPreview" style="display:none; width:100%; border-radius:10px; margin-bottom:10px;">
        
        <button class="btn" style="background:#34495e" onclick="tomarFoto()">📸 Capturar Evidencia / Anexo</button>
        
        <input type="text" id="cie10" placeholder="CIE-10 (Obligatorio)">
        <select id="tipoRegistro" style="width:100%; padding:10px; margin-bottom:10px; border-radius:8px;">
            <option value="evolucion">Evolución Clínica</option>
            <option value="anexo">Anexo Externo (Laboratorios, Remisiones)</option>
        </select>
        <textarea id="textoPsicologico" rows="4" placeholder="Escriba aquí..."></textarea>
        
        <button class="btn" style="background:#9b59b6" onclick="guardarRegistro()">💾 Guardar Registro Fidedigno</button>
        <button class="btn" style="background:#95a5a6" onclick="toggleFormulario()">❌ Cancelar</button>
    </div>

    <hr>
    <div id="listaEvoluciones">Cargando...</div>
</div>

<script type="module">
            import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, addDoc, query, where, getDocs, serverTimestamp, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        const firebaseConfig = {
            apiKey: "AIzaSyC78y2m79f9764f-YTuPYfP",
            authDomain: "caminosnuevosdatabase.firebaseapp.com",
            projectId: "caminosnuevosdatabase",
            storageBucket: "caminosnuevosdatabase.firebasestorage.app",
            appId: "1:907500835423:web:f56b459ab4d57d92a81ea"
        };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const params = new URLSearchParams(window.location.search);
    const idPaciente = params.get("id");
    const rolAutor = sessionStorage.getItem('rolActivo');
    let fotoBase64 = "", streamActivo = null;

    // --- CANDADO 2: CIERRE POR INACTIVIDAD (5 MINUTOS) ---
    let timer;
    window.resetTimer = () => {
        clearTimeout(timer);
        timer = setTimeout(() => {
            alert("Sesión cerrada por inactividad.");
            sessionStorage.clear();
            window.location.href = 'login.html';
        }, 300000); // 5 minutos
    };

    window.toggleFormulario = async () => {
        const div = document.getElementById('areaRegistro');
        if (div.style.display === 'none' || div.style.display === '') {
            div.style.display = 'block';
            streamActivo = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            document.getElementById('video').srcObject = streamActivo;
        } else {
            div.style.display = 'none';
            if (streamActivo) streamActivo.getTracks().forEach(t => t.stop());
        }
    };

    window.tomarFoto = () => {
        const v = document.getElementById('video'), c = document.getElementById('canvas');
        c.width = v.videoWidth; c.height = v.videoHeight;
        c.getContext('2d').drawImage(v, 0, 0);
        fotoBase64 = c.toDataURL('image/jpeg', 0.7);
        document.getElementById('imgPreview').src = fotoBase64;
        document.getElementById('imgPreview').style.display = 'block';
        v.style.display = 'none';
    };

    window.guardarRegistro = async () => {
        const texto = document.getElementById("textoPsicologico").value;
        const cie = document.getElementById("cie10").value;
        const tipo = document.getElementById("tipoRegistro").value;
        if (!texto || !cie) return alert("Faltan datos obligatorios.");

        await addDoc(collection(db, "evoluciones_psicologicas"), {
            idPaciente, texto, cie10: cie.toUpperCase(), fotoBase64,
            tipo, autorRol: rolAutor, fechaHora: new Date().toLocaleString(),
            timestamp: serverTimestamp(), hash: btoa(texto + Date.now()).substring(0,10),
            aclaratorias: []
        });
        location.reload();
    };

    // --- CANDADO 1: NOTA ACLARATORIA (MANO DURA CONTRA EL ERROR) ---
    window.añadirAclaratoria = async (idDoc) => {
        const nota = prompt("Escriba la NOTA ACLARATORIA (No se puede borrar el error original):");
        if (!nota) return;
        const ref = doc(db, "evoluciones_psicologicas", idDoc);
        await updateDoc(ref, {
            aclaratorias: arrayUnion({
                texto: nota,
                fecha: new Date().toLocaleString(),
                autor: rolAutor
            })
        });
        location.reload();
    };

    window.cargarHistorial = async () => {
        const snapP = await getDoc(doc(db, "pacientes", idPaciente));
        if (snapP.exists()) document.getElementById("nombrePaciente").innerText = snapP.data().nombre;

        const snap = await getDocs(query(collection(db, "evoluciones_psicologicas"), where("idPaciente", "==", idPaciente)));
        let html = "";
        snap.forEach(d => {
            const ev = d.data();
            html += `
            <div class="evolucion-item">
                ${ev.tipo === 'anexo' ? '<span class="badge-anexo">📁 ANEXO EXTERNO</span>' : ''}
                <strong>📅 ${ev.fechaHora} | CIE-10: ${ev.cie10}</strong><br>
                <p>${ev.texto}</p>
                ${ev.fotoBase64 ? `<img src="${ev.fotoBase64}" style="width:100px; cursor:pointer;" onclick="window.open('${ev.fotoBase64}')">` : ''}
                ${(ev.aclaratorias || []).map(a => `<div class="aclaratoria-box"><strong>⚠️ ACLARACIÓN (${a.fecha}):</strong> ${a.texto} <br><small>Por: ${a.autor}</small></div>`).join('')}
                <br><button onclick="añadirAclaratoria('${d.id}')" style="font-size:10px; color:#e67e22; border:none; background:none; cursor:pointer;">📝 Añadir Nota Aclaratoria</button>
            </div>`;
        });
        document.getElementById("listaEvoluciones").innerHTML = html || "Sin registros.";
    };

    window.idPaciente = idPaciente;
    cargarHistorial();
</script>
</body>
</html>
