<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HCE Bóveda Cifrada - Nuevos Caminos</title>
    <!-- LIBRERÍAS DE LEY (SEGURIDAD Y PRESERVACIÓN) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/cryptojs.min.js"></script>
<script
src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
 <style>
        :root { --primary: #0f3460; --secondary: #16213e; --accent: #27ae60; --danger: #e74c3c; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #1a1a2e; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 40px; border-radius: 25px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
        
        /* BOTONES Y UI */
        .btn-main { background: var(--primary); color: white; padding: 20px; width: 100%; border: none; border-radius: 15px; font-size: 18px; font-weight: bold; cursor: pointer; margin-bottom: 25px; transition: 0.3s; }
        .btn-main:hover { background: var(--secondary); transform: translateY(-2px); }
        
        #areaRegistro { display: none; background: #f8f9fa; padding: 30px; border-radius: 20px; border: 1px solid #dee2e6; margin-bottom: 40px; animation: fadeIn 0.5s; }
        textarea, input, select { width: 100%; padding: 15px; border-radius: 10px; border: 1px solid #ced4da; margin-bottom: 15px; font-size: 15px; }
        
        /* SISTEMA MULTI-DIAGNÓSTICO */
        .cie-display { background: #fff; border: 2px solid var(--primary); border-radius: 12px; padding: 15px; margin-bottom: 20px; text-align: left; }
        .cie-item { background: #e9ecef; border-left: 5px solid var(--primary); padding: 10px; margin: 5px 0; border-radius: 5px; font-size: 13px; display: flex; justify-content: space-between; align-items: center; }
        .cie-item span.remove { color: var(--danger); cursor: pointer; font-weight: bold; padding: 5px; }

        /* HISTORIAL Y BOTONES DE ACCIÓN */
        .evolucion-item { text-align: left; background: #fff; border-left: 8px solid #9b59b6; padding: 25px; margin-bottom: 25px; border-radius: 12px; position: relative; box-shadow: 0 5px 15px rgba(0,0,0,0.08); }
        .grid-botones { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 15px; }
        .btn-action { padding: 8px 15px; border: none; border-radius: 6px; color: white; cursor: pointer; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        
        .badge-hash { position: absolute; top: 10px; right: 15px; font-size: 10px; color: var(--accent); font-family: monospace; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <h2 id="nombrePaciente">CARGANDO EXPEDIENTE...</h2>
    <div style="background:#d1e7dd; color:#0f5132; padding:15px; border-radius:12px; font-size:12px; margin-bottom:25px; font-weight:bold; border: 1px solid #badbcc; text-align: center;">
        🔒 ENCRIPTACIÓN PUNTA A PUNTA (E2EE) - AES-256 | TRAZABILIDAD DE AUDITORÍA ACTIVA
    </div>

    <button class="btn-main" onclick="solicitarAcceso('registro')">📂 NUEVA EVOLUCIÓN CLÍNICA</button>

    <div id="areaRegistro">
        <video id="video" style="width:100%; border-radius:15px; background:#000;" autoplay playsinline></video>
        <canvas id="canvas" style="display:none;"></canvas>
        <img id="imgPreview" style="display:none; width:100%; border-radius:15px; margin-bottom:20px; border: 3px solid #dee2e6;">
        <button class="btn-main" style="background:#34495e" onclick="tomarFoto()">📸 CAPTURAR EVIDENCIA (ANEXO)</button>

        <label style="font-weight: bold; font-size: 14px; text-align: left; display: block; margin-bottom: 10px;">DIAGNÓSTICOS (CIE-10):</label>
        <div id="listaDiagnosticos" class="cie-display">
            <span style="color:#999; font-style:italic;">No hay diagnósticos agregados...</span>
        </div>

        <select id="cie10" onchange="agregarDiagnostico()">
            <option value="">-- BUSCAR EN VADEMÉCUM CIE-10 --</option>
            <optgroup label="F00-F09: Orgánicos">
                <option value="F00.0|Demencia en la enfermedad de Alzheimer de inicio temprano">F00.0 Alzheimer Inicio Temprano</option>
                <option value="F03.X|Demencia no especificada">F03.X Demencia No Especificada</option>
                <option value="F06.0|Alucinosis orgánica">F06.0 Alucinosis Orgánica</option>
            </optgroup>
            <optgroup label="F10-F19: Consumo de Sustancias">
                <option value="F10.2|Trastorno de dependencia al alcohol">F10.2 Dependencia Alcohol</option>
                <option value="F12.2|Trastorno de dependencia a cannabinoides">F12.2 Dependencia Cannabis</option>
                <option value="F14.2|Trastorno de dependencia a la cocaína">F14.2 Dependencia Cocaína/Bazuco</option>
                <option value="F19.2|Trastorno de dependencia por policonsumo">F19.2 Policonsumo</option>
            </optgroup>
            <optgroup label="F20-F29: Psicóticos">
                <option value="F20.0|Esquizofrenia paranoide">F20.0 Esquizofrenia Paranoide</option>
                <option value="F22.0|Trastorno delirante">F22.0 Paranoia</option>
            </optgroup>
            <optgroup label="F30-F39: Afectivos">
                <option value="F31.1|Trastorno afectivo bipolar, episodio maníaco sin síntomas psicóticos">F31.1 Bipolar Maníaco</option>
                <option value="F32.2|Episodio depresivo grave sin síntomas psicóticos">F32.2 Depresión Grave</option>
                <option value="F34.1|Distimia">F34.1 Distimia</option>
            </optgroup>
            <optgroup label="F60-F69: Personalidad">
                <option value="F60.31|Trastorno de la personalidad límite (Borderline)">F60.31 Límite (Borderline)</option>
                <option value="F60.2|Trastorno de la personalidad antisocial">F60.2 Antisocial</option>
            </optgroup>
            <optgroup label="Otros">
                <option value="X70|Lesión autoinfligida intencionalmente (Riesgo Suicida)">X70 Riesgo Suicida</option>
            </optgroup>
        </select>

        <input type="text" id="motivo" placeholder="Motivo de consulta (Cifrado)...">
        <textarea id="aspectos" rows="2" placeholder="Aspectos de examen mental (Porte, actitud, conducta)..."></textarea>
        <textarea id="textoClinico" rows="6" placeholder="Evolución terapéutica detallada..."></textarea>

        <button class="btn-main" style="background:var(--accent)" onclick="guardarTodo()">💾 GUARDAR Y SELLAR EXPEDIENTE</button>
        <button class="btn-main" style="background:#95a5a6" onclick="cerrarFormulario()">CANCELAR</button>
    </div>

    <hr style="border: 0.5px solid #eee; margin: 40px 0;">
    <h3>HISTORIAL DE ATENCIONES DIGITALIZADO</h3>
    <button id="btnCargar" class="btn-main" style="background:#2980b9" onclick="solicitarAcceso('historial')">🔓 DESCIFRAR HISTORIAL COMPLETO</button>
    <div id="listaEvoluciones"></div>
</div>

<script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, addDoc, query, where, getDocs, serverTimestamp, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        const firebaseConfig = {
            apiKey: "AIzaSyC78y2m79f9764f-YTuPYfP",
            authDomain: "caminosnuevosdatabase.firebaseapp.com",
            projectId: "caminosnuevosdatabase",
            storageBucket: "caminosnuevosdatabase.firebasestorage.app",
            appId: "1:907500835423:web:f56b459ab4d57d92a81ea"
        };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const params = new URLSearchParams(window.location.search);
    const idPaciente = params.get("id");
    const LLAVE_MAESTRA = "FundacionNuevosCaminos2024*USC";
    const CLAVE_CLINICA = "1234";

    let diagnosticosTemp = [];

    // --- LÓGICA DE CIFRADO ---
    window.cifrar = (t) => CryptoJS.AES.encrypt(t, LLAVE_MAESTRA).toString();
    window.descifrar = (h) => {
        try { return CryptoJS.AES.decrypt(h, LLAVE_MAESTRA).toString(CryptoJS.enc.Utf8) || "N/A"; }
        catch { return "N/A"; }
    };

    // --- MANEJO DE DIAGNÓSTICOS ---
    window.agregarDiagnostico = () => {
        const val = document.getElementById("cie10").value;
        if (!val) return;
        const [codigo, desc] = val.split("|");
        if (!diagnosticosTemp.find(d => d.codigo === codigo)) {
            diagnosticosTemp.push({ codigo, desc });
            renderCie();
        }
        document.getElementById("cie10").value = "";
    };

    window.quitarCie = (c) => {
        diagnosticosTemp = diagnosticosTemp.filter(d => d.codigo !== c);
        renderCie();
    };

    function renderCie() {
        const div = document.getElementById("listaDiagnosticos");
        if (diagnosticosTemp.length === 0) {
            div.innerHTML = '<span style="color:#999; font-style:italic;">No hay diagnósticos...</span>';
            return;
        }
        div.innerHTML = diagnosticosTemp.map(d => `
            <div class="cie-item">
                <span><strong>${d.codigo}</strong>: ${d.desc}</span>
                <span class="remove" onclick="quitarCie('${d.codigo}')">✖</span>
            </div>
        `).join('');
    }

    // --- ACCESO SEGURIDAD ---
    window.solicitarAcceso = (tipo, id = null) => {
        const p = prompt("🔑 AUTENTICACIÓN REQUERIDA (CLAVE CLÍNICA):");
        if (p === CLAVE_CLINICA) {
            if (tipo === 'registro') abrirFormulario();
            if (tipo === 'historial') cargarHistorial();
            if (tipo === 'pdf') generarPDF(id);
            if (tipo === 'json') descargarJSON(id);
            if (tipo === 'aclarar') agregarAclaratoria(id);
        } else { alert("ACCESO DENEGADO."); }
    };

    // --- CÁMARA ---
    let fotoBase64 = "", stream = null;
    window.abrirFormulario = async () => {
        document.getElementById('areaRegistro').style.display = 'block';
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        document.getElementById('video').srcObject = stream;
    };

    window.tomarFoto = () => {
        const v = document.getElementById('video'), c = document.getElementById('canvas');
        c.width = v.videoWidth; c.height = v.videoHeight;
        c.getContext('2d').drawImage(v, 0, 0);
        fotoBase64 = c.toDataURL('image/jpeg', 0.8);
        document.getElementById('imgPreview').src = fotoBase64;
        document.getElementById('imgPreview').style.display = 'block';
        v.style.display = 'none';
    };

    window.cerrarFormulario = () => {
        document.getElementById('areaRegistro').style.display = 'none';
        if (stream) stream.getTracks().forEach(t => t.stop());
    };

    // --- PERSISTENCIA Y TRAZABILIDAD ---
    window.guardarTodo = async () => {
        const texto = document.getElementById("textoClinico").value;
        if (!texto || diagnosticosTemp.length === 0) return alert("Faltan datos.");

        try {
            const data = {
                idPaciente,
                texto: cifrar(texto),
                motivo: cifrar(document.getElementById("motivo").value),
                aspectos: cifrar(document.getElementById("aspectos").value),
                diagnosticos: cifrar(JSON.stringify(diagnosticosTemp)),
                foto: fotoBase64,
                fecha: new Date().toLocaleString(),
                timestamp: serverTimestamp(),
                autor: "PSICOLOGÍA - FUNDACIÓN NC",
                hash: btoa(texto + Date.now()).substring(0,15),
                aclaratorias: []
            };
            await addDoc(collection(db, "evoluciones_psicologicas"), data);
            alert("REGISTRO SELLADO."); location.reload();
        } catch (e) { alert(e.message); }
    };

    window.cargarHistorial = async () => {
        const q = query(collection(db, "evoluciones_psicologicas"), where("idPaciente", "==", idPaciente));
        const snap = await getDocs(q);
        let h = "";
        snap.forEach(doc => {
            const d = doc.data();
            const diags = JSON.parse(descifrar(d.diagnosticos));
            const diagStr = diags.map(x => `<div style="font-size:11px;">• <strong>${x.codigo}</strong>: ${x.desc}</div>`).join('');
            
            h += `<div class="evolucion-item">
                <span class="badge-hash">INTEGRITY-HASH: ${d.hash}</span>
                <strong>📅 ${d.fecha}</strong>
                <div style="margin: 10px 0; background: #fcfcfc; padding: 10px; border: 1px solid #eee;">
                    <strong>DIAGNÓSTICOS:</strong> ${diagStr}
                </div>
                <p>${descifrar(d.texto)}</p>
                <div class="grid-botones">
                    <button class="btn-action" style="background:#2980b9" onclick="solicitarAcceso('json', '${doc.id}')">JSON</button>
                    <button class="btn-action" style="background:#e67e22" onclick="solicitarAcceso('pdf', '${doc.id}')">PDF/A</button>
                    <button class="btn-action" style="background:#9b59b6" onclick="solicitarAcceso('aclarar', '${doc.id}')">ACLARAR</button>
                    ${d.aclaratorias.length > 0 ? `<button class="btn-action" style="background:#34495e" onclick="toggleAcl('${doc.id}')">VER ACLARATORIA</button>` : ''}
                </div>
                <div id="acl-${doc.id}" style="display:none; margin-top:15px; padding:10px; background:#fff3cd; border: 1px solid #ffeeba; font-size:12px;">
                    ${d.aclaratorias.map(a => `<strong>${a.fecha}:</strong> ${descifrar(a.texto)}<hr>`).join('')}
                </div>
            </div>`;
        });
        document.getElementById("listaEvoluciones").innerHTML = h || "Sin datos.";
        document.getElementById("btnCargar").style.display = 'none';
    };

    window.toggleAcl = (id) => { const x = document.getElementById(`acl-${id}`); x.style.display = x.style.display === 'none' ? 'block' : 'none'; };

    window.agregarAclaratoria = async (id) => {
        const t = prompt("Escriba la nota aclaratoria (No modifica el original):");
        if (t) {
            await updateDoc(doc(db, "evoluciones_psicologicas", id), {
                aclaratorias: arrayUnion({ texto: cifrar(t), fecha: new Date().toLocaleString() })
            });
            alert("Aclaratoria agregada."); location.reload();
        }
    };

    // --- PDF/A LEGAL (REPORTE SECRETARÍA DE SALUD) ---
    window.generarPDF = async (idDoc) => {
        const d = (await getDoc(doc(db, "evoluciones_psicologicas", idDoc))).data();
        const p = (await getDoc(doc(db, "pacientes", idPaciente))).data();
        const diags = JSON.parse(descifrar(d.diagnosticos));

        const win = window.open('', '_blank');
        win.document.write(`
            <html>
            <head><title>REPORTE LEGAL HCE</title></head>
            <body style="font-family:Arial; padding:40px; line-height:1.4;">
                <div style="text-align:center; border-bottom: 2px solid #000; padding-bottom:10px;">
                    <h2>FUNDACIÓN NUEVOS CAMINOS</h2>
                    <p>NIT: 901.XXX.XXX | IPS REGISTRADA | GUACHINTE, VALLE DEL CAUCA</p>
                    <strong>REPORTE DE HISTORIA CLÍNICA ELECTRÓNICA (RES. 1995/1999)</strong>
                </div>
                <div style="margin-top:20px; border: 1px solid #000; padding:10px;">
                    <strong>PACIENTE:</strong> ${p.nombre.toUpperCase()} | <strong>ID:</strong> ${p.cedula || 'N/A'}<br>
                    <strong>FECHA ATENCIÓN:</strong> ${d.fecha} | <strong>MOTIVO:</strong> ${descifrar(d.motivo)}
                </div>
                <h3>DIAGNÓSTICOS ASOCIADOS (CIE-10):</h3>
                <ul>${diags.map(x => `<li><strong>${x.codigo}</strong>: ${x.desc}</li>`).join('')}</ul>
                <h3>EVOLUCIÓN CLÍNICA:</h3>
                <div style="text-align:justify; white-space:pre-wrap;">${descifrar(d.texto)}</div>
                <div style="margin-top:40px;">
                    <div style="border-top:1px solid #000; width:300px;">
                        <strong>FIRMA ELECTRÓNICA</strong><br>
                        ${d.autor}<br>
                        CÓDIGO DE INTEGRIDAD: ${d.hash}
                    </div>
                </div>
                <div style="margin-top:50px; font-size:10px; color:#666; border-top:1px solid #ccc; text-align:center;">
                    ESTE DOCUMENTO ES UNA COPIA FIEL DEL ORIGINAL ELECTRÓNICO CIFRADO. LEY 527 DE 1999.<br>
                    CONFIDENCIALIDAD SUJETA A LEY 1090 DE 2006.
                </div>
                <script>setTimeout(() => { window.print(); window.close(); }, 800);<\/script>
            </body>
            </html>
        `);
    };

    window.descargarJSON = async (id) => {
        const d = (await getDoc(doc(db, "evoluciones_psicologicas", id))).data();
        const blob = new Blob([JSON.stringify(d)], {type: "application/json"});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `EXPEDIENTE_${d.hash}.json`; a.click();
    };

    async function init() {
        if (!idPaciente) return;
        const s = await getDoc(doc(db, "pacientes", idPaciente));
        if (s.exists()) document.getElementById("nombrePaciente").innerText = "EXPEDIENTE: " + s.data().nombre.toUpperCase();
    }
    init();
</script>
</body>
</html>
