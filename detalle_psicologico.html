<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expediente Maestro - Fundación NC</title>
    
    <!-- LIBRERÍAS DE SEGURIDAD E2EE Y REPORTES -->
    <script src="https://cloudflare.com"></script>
    <script src="https://cloudflare.com"></script>

    <style>
        :root { --primary: #0f3460; --secondary: #16213e; --accent: #27ae60; --danger: #e74c3c; --bg: #1a1a2e; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: #333; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 35px; border-radius: 25px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); text-align: center; }
        
        .status-box { background: #d1e7dd; color: #0f5132; padding: 12px; border-radius: 12px; font-size: 11px; font-weight: bold; margin-bottom: 20px; border: 1px solid #badbcc; }
        
        .btn-principal { background: var(--primary); color: white; padding: 18px; width: 100%; border: none; border-radius: 15px; font-size: 16px; font-weight: bold; cursor: pointer; margin-bottom: 12px; transition: 0.3s; text-transform: uppercase; }
        .btn-principal:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.2); }

        #areaRegistro { display: none; background: #f8f9fa; padding: 25px; border-radius: 20px; border: 1px solid #ddd; margin-top: 20px; animation: fadeIn 0.5s ease; }
        
        textarea, input, select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ccc; margin-bottom: 10px; font-size: 14px; box-sizing: border-box; }
        
        /* ESTILO DE EVOLUCIONES GUARDADAS */
        .evolucion-card { text-align: left; background: white; border-left: 8px solid #9b59b6; padding: 20px; margin-bottom: 20px; border-radius: 15px; position: relative; box-shadow: 0 5px 15px rgba(0,0,0,0.05); border: 1px solid #eee; }
        .hash-id { position: absolute; top: 10px; right: 15px; font-size: 9px; color: var(--accent); font-family: monospace; font-weight: bold; }
        
        /* BLOQUE AMARILLO DE ACLARATORIA LEGAL */
        .bloque-aclaratoria { background: #fff9e6; padding: 15px; border-radius: 10px; margin-top: 15px; border-left: 5px solid #f1c40f; font-size: 12px; border: 1px solid #ffeeba; }

        /* MODAL DE SEGURIDAD */
        .modal-legal { display: none; position: fixed; z-index: 10000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); }
        .modal-content { background: white; margin: 10% auto; padding: 30px; border-radius: 20px; width: 90%; max-width: 450px; border: 3px solid var(--primary); text-align: center; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <h2 id="nombrePaciente" style="color: var(--primary); margin-bottom: 5px;">EXPEDIENTE MAESTRO</h2>
    <div class="status-box">🛡️ PROTECCIÓN USC | CIFRADO E2EE AES-256 | PROTOCOLO RES. 1995/99</div>

    <!-- BOTONES PRINCIPALES -->
    <button class="btn-principal" onclick="validarAcceso('registro')">➕ INICIAR NUEVA EVOLUCIÓN CLÍNICA</button>
    <button class="btn-principal" style="background:#2980b9" onclick="validarAcceso('historial')">🔓 DESCIFRAR EXPEDIENTE COMPLETO</button>

    <!-- ÁREA DE TRABAJO (NUEVA NOTA) -->
    <div id="areaRegistro">
        <video id="video" style="width:100%; border-radius:15px; background:#000; margin-bottom: 10px;" autoplay playsinline></video>
        <canvas id="canvas" style="display:none;"></canvas>
        <img id="imgPreview" style="display:none; width:100%; border-radius:15px; border: 3px solid white; margin-bottom:15px;">
        <button class="btn-principal" style="background:#34495e; padding: 10px; font-size: 12px;" onclick="tomarFoto()">📸 CAPTURAR EVIDENCIA FOTOGRÁFICA</button>

        <div id="displayCie" style="background:white; padding:10px; border-radius:8px; margin-bottom:10px; border:1px solid #eee; text-align:left; font-size:12px;"></div>
        <select id="selectCie" onchange="agregarCie()">
            <option value="">-- VADEMÉCUM CIE-10 (F00-F99) --</option>
            <option value="F14.2|Dependencia a Cocaína">F14.2 Dependencia Cocaína</option>
            <option value="F10.2|Dependencia al Alcohol">F10.2 Dependencia Alcohol</option>
            <option value="F32.2|Depresión Grave">F32.2 Depresión Grave</option>
            <option value="X70|Riesgo Suicida Activo">X70 Riesgo Suicida</option>
        </select>

        <textarea id="txtEvolucion" rows="6" placeholder="Escriba la evolución clínica del paciente..."></textarea>
        
        <button class="btn-principal" style="background:var(--accent)" onclick="guardarRegistro()">💾 FIRMAR Y SELLAR EN BÓVEDA</button>
        <button class="btn-principal" style="background:#95a5a6" onclick="location.reload()">CANCELAR</button>
    </div>

    <!-- LISTADO DE HISTORIAL -->
    <div id="contenedorHistorial" style="margin-top: 30px;"></div>
</div>

<!-- VENTANA EMERGENTE DE FIRMA DIGITAL -->
<div id="modalSeguridad" class="modal-legal">
    <div class="modal-content">
        <h3 style="color:var(--primary); margin-top: 0;">Firma Digital Requerida</h3>
        <p style="font-size: 13px; color: #666;">Ingrese su PIN de profesional para autorizar esta acción.</p>
        <input type="password" id="pinAcceso" style="text-align:center; font-size:28px; letter-spacing:10px;" maxlength="4" autofocus>
        <button id="btnAutorizar" class="btn-principal" style="background:var(--accent); margin-top:15px;">AUTORIZAR ACCESO</button>
        <button onclick="cerrarModal()" style="background:none; border:none; color:var(--danger); font-weight:bold; cursor:pointer; margin-top:10px;">CANCELAR</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://gstatic.com";
    import { getFirestore, collection, addDoc, query, where, getDocs, orderBy, doc, getDoc, updateDoc, arrayUnion, serverTimestamp } from "https://gstatic.com";

    const firebaseConfig = {
        apiKey: "AIzaSyC78y2m79f9764f-YTuPYfP",
        authDomain: "://firebaseapp.com",
        projectId: "caminosnuevosdatabase",
        storageBucket: "caminosnuevosdatabase.firebasestorage.app",
        appId: "1:907500835423:web:f56b459ab4d57d92a81ea"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const idPaciente = new URLSearchParams(window.location.search).get("id");
    const LLAVE_MAESTRA = "FundacionNuevosCaminos2024*USC";

    let diagnosticos = [], fotoB64 = "", streamCam = null;

    const cifrar = (t) => CryptoJS.AES.encrypt(t, LLAVE_MAESTRA).toString();
    const descifrar = (h) => {
        try { return CryptoJS.AES.decrypt(h || "", LLAVE_MAESTRA).toString(CryptoJS.enc.Utf8) || "DATO PROTEGIDO"; }
        catch(e) { return "ERROR DE LLAVE"; }
    };

    // --- VALIDACIÓN DE PROFESIONALES (CRUCE CON ADMINISTRACIÓN) ---
    window.validarAcceso = (accion, docId = null) => {
        document.getElementById('modalSeguridad').style.display = 'block';
        document.getElementById('btnAutorizar',).onclick = async () => {
            const pin = document.getElementById('pinAcceso').value;
            const q = query(collection(db, "talento_humano_cifrado"));
            const snap = await getDocs(q);
            let profEncontrado = null;

            snap.forEach(d => {
                if(descifrar(d.data().identidad.pin_acceso) === pin) profEncontrado = d.data();
            });

            if(profEncontrado) {
                if(profEncontrado.estado === "INACTIVO") return alert("⛔ ACCESO DENEGADO: Su perfil ha sido desactivado.");
                
                // Si todo está bien, procedemos
                document.getElementById('modalSeguridad').style.display = 'none';
                sessionStorage.setItem("psicologoActivo", descifrar(profEncontrado.identidad.nombre_cifrado));
                sessionStorage.setItem("tpActivo", descifrar(profEncontrado.identidad.tp_cifrado));
                
                if(accion === 'registro') iniciarCamara();
                if(accion === 'historial') mostrarHistorial();
                if(accion === 'aclarar') ejecutarAclaratoria(docId);
            } else {
                alert("❌ PIN INCORRECTO O PROFESIONAL NO REGISTRADO.");
            }
        };
    };

    window.cerrarModal = () => document.getElementById('modalSeguridad').style.display = 'none';

    // --- FUNCIONES DE CÁMARA ---
    async function iniciarCamara() {
        document.getElementById('areaRegistro').style.display = 'block';
        streamCam = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        document.getElementById('video').srcObject = streamCam;
    }

    window.tomarFoto = () => {
        const v = document.getElementById('video'), c = document.getElementById('canvas');
        c.width = v.videoWidth; c.height = v.videoHeight;
        c.getContext('2d').drawImage(v, 0, 0);
        fotoB64 = c.toDataURL('image/jpeg', 0.6);
        document.getElementById('imgPreview').src = fotoB64;
        document.getElementById('imgPreview').style.display = 'block';
        v.style.display = 'none';
    };

    window.agregarCie = () => {
        const s = document.getElementById('selectCie');
        const [c, d] = s.value.split('|');
        diagnosticos.push({ cod: c, desc: d });
        document.getElementById('displayCie').innerHTML = diagnosticos.map(x => `• <strong>${x.cod}</strong>: ${x.desc}<br>`).join('');
        s.value = "";
    };

    // --- GUARDADO FINAL ---
    window.guardarRegistro = async () => {
        const texto = document.getElementById('txtEvolucion').value;
        if(!texto) return alert("Escriba la evolución clínica.");

        try {
            await addDoc(collection(db, "evoluciones_psicologicas"), {
                idPaciente: idPaciente,
                evolucion: cifrar(texto),
                cie10: cifrar(JSON.stringify(diagnosticos)),
                foto: fotoB64,
                autor: cifrar(sessionStorage.getItem("psicologoActivo")),
                tp: cifrar(sessionStorage.getItem("tpActivo")),
                fecha: new Date().toLocaleString(),
                timestamp: serverTimestamp(),
                hash: btoa(texto + Date.now()).substring(0,12),
                aclaratorias: []
            });
            alert("✅ REGISTRO SELLADO EN LA BÓVEDA.");
            location.reload();
        } catch(e) { alert("Error: " + e.message); }
    };

    // --- MOSTRAR HISTORIAL ---
    window.mostrarHistorial = async () => {
        const q = query(collection(db, "evoluciones_psicologicas"), where("idPaciente", "==", idPaciente), orderBy("timestamp", "desc"));
        const snap = await getDocs(q);
        let h = "";
        
        snap.forEach(docSnap => {
            const d = docSnap.data();
            let diags = []; try { diags = JSON.parse(descifrar(d.cie10)); } catch(e){}
            
            h += `<div class="evolucion-card">
                <span class="hash-id">HASH: ${d.hash}</span>
                <strong>📅 ${d.fecha}</strong><br>
                <div style="font-size:11px; color:#666; margin: 5px 0;">${diags.map(x=>x.cod).join(' | ')}</div>
                <p style="margin: 10px 0;">${descifrar(d.evolucion)}</p>
                <small style="color:var(--primary); font-weight:bold;">Firmado por: ${descifrar(d.autor)} - TP: ${descifrar(d.tp)}</small>
                
                <div style="margin-top:10px;">
                    <button class="btn-principal" style="width:auto; padding:5px 15px; font-size:10px; background:var(--accent)" onclick="validarAcceso('aclarar', '${docSnap.id}')">🖋️ NOTA ACLARATORIA</button>
                    ${d.aclaratorias.length > 0 ? `<div class="bloque-aclaratoria"><strong>NOTAS LEGALES:</strong><br>${d.aclaratorias.map(a=>`• [${a.fecha}] ${descifrar(a.texto)}`).join('<br>')}</div>` : ''}
                </div>
            </div>`;
        });
        document.getElementById('contenedorHistorial').innerHTML = h || "No hay registros descifrados.";
    };

    window.ejecutarAclaratoria = (docId) => {
        const txt = prompt("Ingrese la aclaratoria legal (Res. 1995/99):");
        if(!txt) return;
        updateDoc(doc(db, "evoluciones_psicologicas", docId), {
            aclaratorias: arrayUnion({ texto: cifrar(txt), fecha: new Date().toLocaleString(), autor: cifrar(sessionStorage.getItem("psicologoActivo")) })
        }).then(() => location.reload());
    };

    // Cargar nombre del paciente
    const pacSnap = await getDoc(doc(db, "pacientes", idPaciente));
    if(pacSnap.exists()) document.getElementById('nombrePaciente').innerText = "EXPEDIENTE: " + pacSnap.data().nombre.toUpperCase();
</script>
</body>
</html>
