<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HCE Elite - Nuevos Caminos</title>
    <script src="https://cloudflare.com"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; text-align: center; padding: 20px; margin: 0; }
        .container { max-width: 650px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn-abrir { background: #2c3e50; color: white; padding: 15px; width: 100%; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; margin-bottom: 20px; }
        
        #areaRegistro { display: none; background: #f9f9f9; padding: 20px; border-radius: 15px; border: 1px solid #ddd; margin-bottom: 30px; animation: fadeIn 0.3s; }
        textarea, input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; margin-bottom: 10px; font-family: inherit; }
        
        .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; color: white; font-size: 16px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .evolucion-item { text-align: left; background: #fff; border-left: 5px solid #9b59b6; padding: 15px; margin-bottom: 15px; position: relative; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-radius: 8px; }
        .btn-ley { font-size: 10px; padding: 5px 8px; border: none; border-radius: 4px; color: white; cursor: pointer; margin-right: 5px; }

        /* MODAL PROFESIONAL (Adiós a lo ordinario) */
        .modal-aclaracion { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 25px; border-radius: 15px; width: 90%; max-width: 500px; text-align: left; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .modal-content h3 { color: #e67e22; margin: 0 0 10px 0; border-bottom: 2px solid #ffe0b2; padding-bottom: 10px; }
        .modal-content textarea { height: 150px; resize: none; margin-top: 10px; }

        .aclaratoria-box { background: #fffcf5; border-left: 3px solid #ff9800; padding: 10px; margin-top: 10px; border-radius: 5px; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body onmousemove="resetTimer()" onclick="resetTimer()" onkeypress="resetTimer()">

<div class="container">
    <h2 id="nombrePaciente">Cargando...</h2>
    <p style="color: #27ae60; font-size: 11px; font-weight: bold;">🛡️ PROTECCIÓN DE DATOS: CIERRE POR INACTIVIDAD ACTIVO</p>

    <button class="btn-abrir" onclick="toggleFormulario()">➕ NUEVA EVOLUCIÓN O ANEXO</button>

    <div id="areaRegistro">
        <video id="video" style="width:100%; border-radius:10px; background:#000;" autoplay playsinline></video>
        <canvas id="canvas" style="display:none;"></canvas>
        <img id="imgPreview" style="display:none; width:100%; border-radius:10px; margin-bottom:10px;">
        
        <button class="btn" style="background:#34495e" onclick="tomarFoto()">📸 Capturar Evidencia (Cámara)</button>
        
        <input type="text" id="cie10" placeholder="Código CIE-10 (Obligatorio)">
        <select id="tipoRegistro">
            <option value="evolucion">Evolución Clínica Psicológica</option>
            <option value="anexo">Anexo Externo (Laboratorio / Remisión)</option>
        </select>
        <textarea id="textoPsicologico" rows="4" placeholder="Escriba la nota clínica aquí..."></textarea>
        
        <button class="btn" style="background:#9b59b6" onclick="guardarRegistro()">💾 Guardar y Firmar Registro</button>
        <button class="btn" style="background:#95a5a6" onclick="toggleFormulario()">❌ Cancelar</button>
    </div>

    <hr>
    <h3>📋 Historial de Registros Fidedignos</h3>
    <div id="listaEvoluciones">Cargando historial...</div>
    
    <button onclick="window.location.href='perfil_paciente.html?id=' + idPaciente" style="background:none; border:none; color:#3498db; cursor:pointer; font-weight:bold; margin-top:20px;">⬅ Volver al Perfil</button>
</div>

<!-- VENTANA MODAL PARA ACLARACIONES -->
<div id="modalAclaracion" class="modal-aclaracion">
    <div class="modal-content">
        <h3>📝 Nota Aclaratoria Legal</h3>
        <p style="font-size: 12px; color: #7f8c8d;">Esta nota se anexará al registro original sin modificarlo, cumpliendo la Resolución 1995.</p>
        <textarea id="textoAclaratoriaNueva" placeholder="Escriba aquí la aclaración detallada..."></textarea>
        <div style="display:flex; gap:10px;">
            <button class="btn" style="background:#27ae60; margin:0;" onclick="confirmarAclaratoria()">💾 Guardar</button>
            <button class="btn" style="background:#95a5a6; margin:0;" onclick="cerrarModal()">❌ Cerrar</button>
        </div>
    </div>
</div>

<script type="module">
          import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import {  getFirestore, doc, getDoc, collection, addDoc, query, where, getDocs, serverTimestamp, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        const firebaseConfig = {
            apiKey: "AIzaSyC78y2m79f9764f-YTuPYfP",
            authDomain: "caminosnuevosdatabase.firebaseapp.com",
            projectId: "caminosnuevosdatabase",
            storageBucket: "caminosnuevosdatabase.firebasestorage.app",
            appId: "1:907500835423:web:f56b459ab4d57d92a81ea"
        };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const params = new URLSearchParams(window.location.search);
    const idPaciente = params.get("id");
    const rolAutor = sessionStorage.getItem('rolActivo');
    let fotoBase64 = "", streamActivo = null, idNotaActual = "";

    // --- SEGURIDAD Y CÁMARA ---
    let timer; window.resetTimer = () => { clearTimeout(timer); timer = setTimeout(() => { sessionStorage.clear(); window.location.href = 'login.html'; }, 300000); };

    window.toggleFormulario = async () => {
        const div = document.getElementById('areaRegistro');
        const video = document.getElementById('video');
        if (div.style.display === 'none' || div.style.display === '') {
            div.style.display = 'block';
            streamActivo = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            video.srcObject = streamActivo;
        } else {
            div.style.display = 'none';
            if (streamActivo) streamActivo.getTracks().forEach(t => t.stop());
        }
    };

    window.tomarFoto = () => {
        const v = document.getElementById('video'), c = document.getElementById('canvas');
        c.width = v.videoWidth; c.height = v.videoHeight;
        c.getContext('2d').drawImage(v, 0, 0);
        fotoBase64 = c.toDataURL('image/jpeg', 0.7);
        document.getElementById('imgPreview').src = fotoBase64;
        document.getElementById('imgPreview').style.display = 'block';
        v.style.display = 'none';
    };

    // --- GUARDAR Y CARGAR ---
    window.guardarRegistro = async () => {
        const texto = document.getElementById("textoPsicologico").value;
        const cie = document.getElementById("cie10").value;
        if (!texto || !cie) return alert("Faltan datos.");
        try {
            await addDoc(collection(db, "evoluciones_psicologicas"), {
                idPaciente, texto, cie10: cie.toUpperCase(), fotoBase64,
                tipo: document.getElementById("tipoRegistro").value, autorRol: rolAutor,
                fechaHora: new Date().toLocaleString(), timestamp: serverTimestamp(), 
                hash: btoa(texto + Date.now()).substring(0,12), aclaratorias: []
            });
            location.reload();
        } catch (e) { alert(e.message); }
    };

    window.cargarHistorial = async () => {
        const snapP = await getDoc(doc(db, "pacientes", idPaciente));
        if (snapP.exists()) document.getElementById("nombrePaciente").innerText = snapP.data().nombre;

        const snap = await getDocs(query(collection(db, "evoluciones_psicologicas"), where("idPaciente", "==", idPaciente)));
        let html = "";
        snap.forEach(d => {
            const ev = d.data();
            const tieneAclaratorias = ev.aclaratorias && ev.aclaratorias.length > 0;
            html += `
            <div class="evolucion-item">
                <span style="position:absolute; top:5px; right:10px; font-size:9px; color:#27ae60;">HASH: ${ev.hash || 'FIDEDIGNO'}</span>
                <div style="padding:5px;">
                    ${ev.tipo === 'anexo' ? '<span class="badge-anexo">📁 ANEXO</span>' : ''}
                    <strong>📅 ${ev.fechaHora} | CIE-10: ${ev.cie10 || 'N/A'}</strong>
                    <p>${ev.texto}</p>
                    <button class="btn-ley" style="background:#2980b9" onclick="descargarJSON('${d.id}')">📤 JSON</button>
                    <button class="btn-ley" style="background:#e67e22" onclick="imprimirNota('${d.id}')">🖨️ PDF/A</button>
                    <button class="btn-ley" style="background:#95a5a6" onclick="abrirModalAclaracion('${d.id}')">📝 ACLARAR</button>
                    ${tieneAclaratorias ? `<button class="btn-ley" style="background:#34495e" onclick="toggleAclaratorias('${d.id}')">🔔 VER (${ev.aclaratorias.length})</button>` : ''}
                    
                    <div id="acordeon-${d.id}" style="display:none; margin-top:10px; border-top: 2px solid #ff9800; background: #fffcf5; padding: 10px; border-radius: 5px;">
                        ${(ev.aclaratorias || []).map(a => `<div class="aclaratoria-box"><small>${a.fecha} - ${a.autor}</small><br>${a.texto}</div>`).join('')}
                    </div>
                </div>
            </div>`;
        });
        document.getElementById("listaEvoluciones").innerHTML = html || "Sin registros.";
    };

    // --- FUNCIONES DEL MODAL (Adiós a lo ordinario) ---
    window.abrirModalAclaracion = (id) => { idNotaActual = id; document.getElementById('modalAclaracion').style.display = 'flex'; };
    window.cerrarModal = () => { document.getElementById('modalAclaracion').style.display = 'none'; document.getElementById('textoAclaratoriaNueva').value = ''; };
    window.confirmarAclaratoria = async () => {
        const nota = document.getElementById('textoAclaratoriaNueva').value;
        if (!nota.trim()) return;
        await updateDoc(doc(db, "evoluciones_psicologicas", idNotaActual), { aclaratorias: arrayUnion({ texto: nota, fecha: new Date().toLocaleString(), autor: rolAutor }) });
        location.reload();
    };

    window.toggleAclaratorias = (id) => { const el = document.getElementById(`acordeon-${id}`); el.style.display = el.style.display === 'none' ? 'block' : 'none'; };
    window.descargarJSON = async (id) => { const d = await getDoc(doc(db, "evoluciones_psicologicas", id)); const blob = new Blob([JSON.stringify(d.data())], {type: "application/json"}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `HCE_${id}.json`; a.click(); };
    window.imprimirNota = async (id) => { const d = await getDoc(doc(db, "evoluciones_psicologicas", id)); const ev = d.data(); const win = window.open('', '_blank'); win.document.write(`<html><body style="font-family:Arial; padding:40px;"><h2>INFORME LEGAL</h2><p>${ev.texto}</p><br>Firma: ${ev.autorRol}<script>window.print();<\/script></body></html>`); };

    window.idPaciente = idPaciente;
    cargarHistorial();
</script>
</body>
</html>
