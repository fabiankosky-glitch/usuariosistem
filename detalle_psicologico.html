<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HCE Bóveda Cifrada - Fundación Nuevos Caminos</title>
    
    <!-- CARGA CRÍTICA DE LIBRERÍAS DE SEGURIDAD (ORDEN OBLIGATORIO) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
        :root { --primary: #0f3460; --secondary: #16213e; --accent: #27ae60; --danger: #e74c3c; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); margin: 0; padding: 20px; font-size: 13px; }
        .container { max-width: 1400px; margin: auto; background: white; padding: 35px; border-radius: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .header { border-bottom: 3px solid var(--primary); padding-bottom: 15px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; }
        .btn-principal { background: var(--primary); color: white; padding: 12px 18px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; text-transform: uppercase; font-size: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        th { background: #f8f9fa; color: var(--primary); font-size: 10px; text-transform: uppercase; }
        .audit-badge { background: #eee; color: #666; padding: 3px 8px; border-radius: 5px; font-family: monospace; font-size: 9px; }
        .modal-legal { display: none; position: fixed; z-index: 10000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); overflow-y: auto; }
        .modal-content { background: white; margin: 2% auto; padding: 30px; border-radius: 25px; width: 95%; max-width: 1150px; border: 3px solid var(--primary); box-shadow: 0 25px 60px rgba(0,0,0,0.5); }
        .seccion-form { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        label { font-weight: bold; font-size: 10px; color: var(--primary); display: block; margin-bottom: 4px; text-transform: uppercase; }
        input, select { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 12px; }
        .box-judicial { background: #eef2f7; padding: 15px; border-radius: 12px; border-left: 5px solid #3498db; grid-column: span 2; }
        .box-soportes { background: #f0f4f8; padding: 15px; border-radius: 12px; border: 2px dashed var(--primary); grid-column: span 2; }
        .soporte-tag { background: white; padding: 8px; border-radius: 6px; margin-bottom: 5px; border: 1px solid #ddd; display: flex; justify-content: space-between; font-size: 11px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <h2 style="color: var(--primary); margin: 0;">🛡️ GESTIÓN TÉCNICA DE CONTRATACIÓN (E2EE)</h2>
            <small style="color: #666; font-weight: bold;">EXPEDIENTE FORENSE INTEGRAL | AUDITORÍA DIAN & POLNAL</small>
        </div>
        <div style="display:flex; gap:10px;">
            <button class="btn-principal" onclick="abrirModal()">➕ VINCULACIÓN CIVIL INTEGRAL</button>
            <button class="btn-principal" style="background:#6c757d" onclick="window.location.href='administracion.html'">⬅ PANEL CONTROL</button>
        </div>
    </div>
    <table>
        <thead>
            <tr>
                <th>CONTRATISTA / CC</th>
                <th>OBJETO / CARGO</th>
                <th>VENCIMIENTO PILA</th>
                <th>HASH INTEGRIDAD</th>
                <th>ESTADO</th>
                <th>CONTROL LEGAL</th>
            </tr>
        </thead>
        <tbody id="tablaPersonal"></tbody>
    </table>
</div>

<div id="modalVinculacion" class="modal-legal">
    <div class="modal-content">
        <h3 style="color: var(--primary); border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin-top: 0; text-align: left;">📑 EXPEDIENTE DE PRESTACIÓN DE SERVICIOS PROFESIONALES</h3>
        
        <div class="seccion-form">
            <div style="grid-column: span 4;"><p style="text-align:left; font-weight:bold; color:var(--accent); font-size:11px; margin:0;">1. IDENTIFICACIÓN Y AUTONOMÍA</p></div>
            <div><label>Nombre Completo:</label><input type="text" id="pNombre"></div>
            <div><label>Documento (CC/NIT):</label><input type="text" id="pCC"></div>
            <div><label>Código CIIU:</label><input type="text" id="pCIIU"></div>
            <div><label>Objeto Contractual:</label><input type="text" id="pObjeto"></div>
            <div><label>Vencimiento PILA:</label><input type="date" id="pPilaVence" style="border: 2px solid var(--danger);"></div>
            <div><label>PIN Firma (4 Dig):</label><input type="password" id="pPIN" maxlength="4" style="text-align:center; letter-spacing:5px;"></div>
            <div><label>Cargo / Rol:</label>
                <select id="pCargo">
                    <option value="Psicologia">Psicología</option>
                    <option value="Terapeuta">Terapeuta</option>
                    <option value="Director(a) Terapeutico">Director(a) Terapéutico</option>
                    <option value="Administrador">Administrador</option>
                </select>
            </div>
            <div><label>Tarjeta Profesional:</label><input type="text" id="pTP"></div>
        </div>

        <div class="seccion-form">
            <!-- BLOQUE DE VERIFICACIÓN (BOTÓN CORREGIDO) -->
            <div class="box-judicial">
                <label>🔍 VERIFICACIÓN DE ANTECEDENTES Y RUT:</label>
                <div style="display: flex; gap: 10px; margin-top: 10px;">
                    <button type="button" class="btn-principal" style="background:#003366; flex:1;" onclick="abrirPortal('dian')">🏦 VALIDAR RUT (DIAN)</button>
                    <button type="button" class="btn-principal" style="background:#003366; flex:1;" onclick="abrirPortal('policia')">🚓 ANTECEDENTES (POLNAL)</button>
                </div>
                <div style="margin-top:15px; border: 1px dashed #3498db; padding: 10px;">
                    <label style="font-size: 9px;">CARGAR CAPTURA DE PANTALLA DE VALIDACIÓN (EVIDENCIA):</label>
                    <input type="file" id="capturaJudicial" accept="image/*">
                    <!-- BOTÓN AGREGADO PARA VINCULAR EVIDENCIA -->
                    <button type="button" class="btn-principal" style="background:#34495e; width:100%; margin-top:5px;" onclick="vincularEvidenciaForense()">📂 VINCULAR CAPTURA AL EXPEDIENTE</button>
                    <div id="statusEv" style="font-size: 9px; color: #27ae60; margin-top: 5px; font-weight: bold;"></div>
                </div>
            </div>

            <!-- CARPETA DE SOPORTES -->
            <div class="box-soportes">
                <label>📁 CARPETA DE SOPORTES LEGALES (CIVIL/COMERCIAL):</label>
                <select id="pTipoDoc">
                    <option value="Contrato Prestación">Contrato de Prestación</option>
                    <option value="Diploma/Acta">Diploma de Idoneidad</option>
                    <option value="Rethus">Inscripción ReTHUS</option>
                    <option value="Referencias">Referencias Laborales</option>
                </select>
                <input type="file" id="archivoInput">
                <button class="btn-principal" style="width:100%; background:#34495e; margin-top:5px;" onclick="adicionarSoporte()">📂 VINCULAR SOPORTE AL EXPEDIENTE</button>
                <div id="listaPrevia" style="margin-top:10px; max-height: 80px; overflow-y: auto;"></div>
            </div>
        </div>

        <div style="margin-top:20px; display:flex; gap:15px;">
            <button class="btn-principal" style="background:var(--accent); flex:1; padding:15px;" onclick="guardarForense()">💾 SELLAR CONTRATO Y CIFRAR</button>
            <button class="btn-principal" style="background:var(--danger); flex:1; padding:15px;" onclick="cerrarModal()">CANCELAR</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://gstatic.com";
    import { getFirestore, collection, addDoc, getDocs, doc, getDoc, updateDoc, query, orderBy, serverTimestamp } from "https://gstatic.com";

    const firebaseConfig = {
        apiKey: "AIzaSyC78y2m79f9764f-YTuPYfP",
        authDomain: "://firebaseapp.com",
        projectId: "caminosnuevosdatabase",
        storageBucket: "caminosnuevosdatabase.firebasestorage.app",
        appId: "1:907500835423:web:f56b459ab4d57d92a81ea"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const LLAVE_ADMIN = "ADMIN2024*"; 
    let soportesTemp = [];

    const cifrar = (t) => CryptoJS.AES.encrypt(t, LLAVE_ADMIN).toString();
    const descifrar = (h) => {
        try { return CryptoJS.AES.decrypt(h, LLAVE_ADMIN).toString(CryptoJS.enc.Utf8); }
        catch(e) { return ""; }
    };

    window.abrirModal = () => document.getElementById('modalVinculacion').style.display = 'block';
    window.cerrarModal = () => { document.getElementById('modalVinculacion').style.display = 'none'; soportesTemp = []; document.getElementById('listaPrevia').innerHTML = ""; document.getElementById('statusEv').innerText = ""; };

    window.abrirPortal = (tipo) => {
        const url = tipo === 'dian' ? "https://muisca.dian.gov.co/WebRutMuisca/DefConsultaEstadoRUT.faces" : "https://antecedentes.policia.gov.co:7005/WebJudicial/index.xhtml";
        window.open(url, '_blank');
    };

    // FUNCIÓN PARA VINCULAR EL PANTALLAZO DE VALIDACIÓN
    window.vincularEvidenciaForense = () => {
        const input = document.getElementById('capturaJudicial');
        if (input.files.length === 0) return alert("❌ Seleccione el pantallazo de verificación primero.");
        const reader = new FileReader();
        reader.onload = (e) => {
            soportesTemp.push({ tipo: "Evidencia Validación Oficial", data: e.target.result });
            document.getElementById('statusEv').innerText = "✅ EVIDENCIA SELLADA Y VINCULADA";
            document.getElementById('listaPrevia').innerHTML += `<div class="soporte-tag">✅ Pantallazo Validación cargado</div>`;
        };
        reader.readAsDataURL(input.files[0]);
    };

    window.adicionarSoporte = () => {
        const fileInput = document.getElementById('archivoInput').files;
        const tipo = document.getElementById('pTipoDoc').value;
        if (fileInput.length === 0) return alert("Seleccione archivo.");
        const reader = new FileReader();
        reader.onload = (e) => {
            soportesTemp.push({ tipo: tipo, data: e.target.result });
            document.getElementById('listaPrevia').innerHTML += `<div class="soporte-tag">✅ ${tipo} cargado</div>`;
        };
        reader.readAsDataURL(fileInput[0]);
    };

    window.guardarForense = async () => {
        const d = {
            nombre: document.getElementById('pNombre').value, cc: document.getElementById('pCC').value,
            pila: document.getElementById('pPilaVence').value, pin: document.getElementById('pPIN').value,
            cargo: document.getElementById('pCargo').value, objeto: document.getElementById('pObjeto').value
        };
        if (!d.nombre || !d.pila || !d.pin) return alert("ALERTA: Faltan campos de Ley obligatorios.");
        try {
            const auditID = btoa(d.cc + Date.now()).substring(0,16);
            await addDoc(collection(db, "talento_humano_cifrado"), {
                info: { n: cifrar(d.nombre), cc: cifrar(d.cc), p: cifrar(d.pila), pin: cifrar(d.pin), car: cifrar(d.cargo), obj: cifrar(d.objeto) },
                expediente: soportesTemp.map(s => ({ t: s.tipo, a: cifrar(s.data) })),
                estado: "HABILITADO", hashIntegridad: auditID, fecha: new Date().toLocaleString(), timestamp: serverTimestamp()
            });
            alert("🎯 CONTRATO SELLADO CON HASH: " + auditID);
            location.reload();
        } catch(e) { alert(e.message); }
    };

    async function cargar() {
        const snap = await getDocs(query(collection(db, "talento_humano_cifrado"), orderBy("timestamp", "desc")));
        let h = "";
        snap.forEach(docSnap => {
            const d = docSnap.data();
            const color = d.estado === "HABILITADO" ? "var(--accent)" : "var(--danger)";
            h += `<tr>
                <td><strong>${descifrar(d.info.n)}</strong><br><small>${descifrar(d.info.cc)}</small></td>
                <td>${descifrar(d.info.obj)}<br><small>${descifrar(d.info.car)}</small></td>
                <td style="color:var(--danger); font-weight:bold;">${descifrar(d.info.p)}</td>
                <td><span class="audit-badge">${d.hashIntegridad}</span></td>
                <td style="color:${color}; font-weight:bold;">${d.estado}</td>
                <td><button class='btn-principal' style='background:#34495e' onclick="alert('Generando PDF...')">📄 PDF</button></td>
            </tr>`;
        });
        document.getElementById("tablaPersonal").innerHTML = h;
    }
    cargar();
</script>
</body>
</html>
