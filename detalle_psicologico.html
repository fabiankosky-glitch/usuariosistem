<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HCE Psiquiatría Integral - Fundación NC</title>
    
    <script src="https://cloudflare.com"></script>
    <script src="https://cloudflare.com"></script>

    <style>
        :root { --primary: #0f3460; --secondary: #16213e; --accent: #27ae60; --danger: #e74c3c; --bg: #1a1a2e; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: #333; margin: 0; padding: 10px; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 15px 50px rgba(0,0,0,0.5); text-align: center; }
        
        /* ESTILOS FORMATO */
        .form-header { display: grid; grid-template-columns: 1fr 2fr 1fr; border: 2px solid #000; margin-bottom: 20px; font-size: 11px; background: #fff; }
        .form-header div { padding: 10px; border-right: 1px solid #000; display: flex; align-items: center; justify-content: center; }
        .form-header div:last-child { border-right: none; text-align: left; flex-direction: column; align-items: flex-start; }

        .btn-principal { background: var(--primary); color: white; padding: 15px; width: 100%; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-bottom: 10px; transition: 0.3s; text-transform: uppercase; font-size: 12px; }
        .btn-principal:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }

        #areaRegistro { display: none; background: #fff; padding: 20px; border-radius: 15px; border: 2px solid var(--primary); margin-top: 20px; }
        
        label { font-weight: bold; font-size: 11px; color: var(--primary); margin-top: 8px; display: block; text-align: left; text-transform: uppercase; }
        textarea, input, select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #000; font-size: 13px; box-sizing: border-box; background: #fcfcfc; margin-bottom: 5px; }

        /* TARJETAS HISTORIAL */
        .evolucion-card { text-align: left; background: white; border-left: 10px solid #9b59b6; padding: 20px; margin-bottom: 20px; border-radius: 15px; position: relative; border: 1px solid #eee; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .bloque-aclaratoria { background: #fff9e6; padding: 15px; border-radius: 10px; margin-top: 15px; border-left: 5px solid #f1c40f; font-size: 12px; border: 1px solid #ffeeba; }

        .modal-legal { display: none; position: fixed; z-index: 10000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); overflow-y: auto; }
        .modal-content { background: white; margin: 5% auto; padding: 30px; border-radius: 25px; width: 90%; max-width: 500px; border: 3px solid var(--primary); text-align: center; }
        
        #video { width: 100%; border-radius: 10px; background: #000; margin-bottom: 10px; }
        #imgPreview { width: 100%; border-radius: 10px; border: 3px solid var(--accent); margin-bottom: 10px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2 id="nombrePaciente" style="color: var(--primary); margin-bottom: 5px;">HISTORIA CLÍNICA PSIQUIATRÍA</h2>
    <div style="background:#d1e7dd; padding:10px; border-radius:10px; margin-bottom:20px; font-size:11px; font-weight:bold; color:#0f5132; border:1px solid #badbcc;">
        🔒 BÓVEDA E2EE ACTIVADA | PROTOCOLO RES. 1995/99 | FORMATO NC-PSQ-01
    </div>

    <button class="btn-principal" onclick="validarAcceso('registro')">📂 INICIAR NUEVA EVOLUCIÓN CLÍNICA</button>
    <button class="btn-principal" style="background:#2980b9" onclick="validarAcceso('historial')">🔓 DESCIFRAR EXPEDIENTE COMPLETO</button>

    <!-- ÁREA DE REGISTRO UNIFICADA -->
    <div id="areaRegistro">
        <div class="form-header">
            <div><img src="https://placeholder.com" alt="Logo"></div>
            <div><strong>CENTRO DE REHABILITACION NUEVOS CAMINOS<br>NIT: 900753908-8</strong></div>
            <div><span>Código: NC-PSQ-01</span><span>Versión: 02</span><span>Vigencia: 2 Años</span></div>
        </div>

        <!-- MÓDULO CÁMARA -->
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas" style="display:none;"></canvas>
        <img id="imgPreview">
        <button class="btn-principal" style="background:#34495e; padding:8px; font-size:10px;" onclick="tomarFoto()">📸 CAPTURAR ANEXO FOTOGRÁFICO</button>

        <!-- FORMULARIO ESTRUCTURADO -->
        <label>1. Motivo de consulta:</label>
        <textarea id="fMotivo" rows="2"></textarea>

        <label>2. Enfermedad actual:</label>
        <textarea id="fEnfermedad" rows="4"></textarea>

        <label>3. Antecedentes personales y familiares:</label>
        <textarea id="fAntecedentes" rows="2"></textarea>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div>
                <label>4. Examen mental:</label>
                <textarea id="fExamen" rows="5"></textarea>
            </div>
            <div>
                <label>5. Plan de manejo y observaciones:</label>
                <textarea id="fPlan" rows="5"></textarea>
            </div>
        </div>

        <!-- VADEMÉCUM CIE-10 -->
        <label>Diagnósticos (CIE-10):</label>
        <div id="displayCie" style="background:#f1f1f1; padding:10px; border:1px solid #000; min-height:20px; margin-bottom:5px; font-size:11px; text-align:left;"></div>
        <select id="selectCie" onchange="agregarCie()">
            <option value="">-- SELECCIONE DIAGNÓSTICO --</option>
            <option value="F14.2|Dependencia a Cocaína">F14.2 Dependencia Cocaína</option>
            <option value="F10.2|Dependencia al Alcohol">F10.2 Dependencia Alcohol</option>
            <option value="F32.2|Depresión Grave">F32.2 Depresión Grave</option>
            <option value="X70|Riesgo Suicida Activo">X70 Riesgo Suicida</option>
        </select>
        
        <div style="margin-top:20px; display:flex; gap:10px;">
            <button class="btn-principal" style="background:var(--accent); flex:2;" onclick="guardarTodoIntegral()">💾 FIRMAR Y SELLAR EN BÓVEDA</button>
            <button class="btn-principal" style="background:var(--danger); flex:1;" onclick="location.reload()">CANCELAR</button>
        </div>
    </div>

    <div id="contenedorHistorial" style="margin-top: 30px;"></div>
</div>

<!-- MODAL DE PIN / ACLARATORIA -->
<div id="modalMaestro" class="modal-legal">
    <div class="modal-content">
        <h3 id="modalTit" style="color:var(--primary); margin-top:0; border-bottom:2px solid var(--primary);">Firma Digital</h3>
        <div id="modalCuerpo"></div>
        <button id="btnModalOk" class="btn-principal" style="background:var(--accent); margin-top:15px;">CONFIRMAR</button>
        <button onclick="cerrarModal()" style="background:none; border:none; color:var(--danger); cursor:pointer; margin-top:10px; font-weight:bold;">CANCELAR</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://gstatic.com";
    import { getFirestore, collection, addDoc, query, where, getDocs, orderBy, doc, getDoc, updateDoc, arrayUnion, serverTimestamp } from "https://gstatic.com";

    const firebaseConfig = {
        apiKey: "AIzaSyC78y2m79f9764f-YTuPYfP",
        authDomain: "://firebaseapp.com",
        projectId: "caminosnuevosdatabase",
        storageBucket: "caminosnuevosdatabase.firebasestorage.app",
        appId: "1:907500835423:web:f56b459ab4d57d92a81ea"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const idPaciente = new URLSearchParams(window.location.search).get("id");
    const LLAVE_MAESTRA = "FundacionNuevosCaminos2024*USC";

    let diagnosticos = [], fotoData = "", streamCam = null;

    const cifrar = (t) => CryptoJS.AES.encrypt(t, LLAVE_MAESTRA).toString();
    const descifrar = (h) => {
        try { return CryptoJS.AES.decrypt(h || "", LLAVE_MAESTRA).toString(CryptoJS.enc.Utf8); }
        catch(e) { return ""; }
    };

    // VALIDACIÓN DE PROFESIONALES
    window.validarAcceso = (accion, docId = null) => {
        const html = `<input type="password" id="pinP" style="text-align:center; font-size:28px; letter-spacing:10px;" maxlength="4">`;
        abrirModal("🔒 VALIDACIÓN DE IDENTIDAD", html, async () => {
            const pin = document.getElementById('pinP').value;
            const q = query(collection(db, "talento_humano_cifrado"));
            const snap = await getDocs(q);
            let prof = null;
            snap.forEach(d => { if(descifrar(d.data().identidad.pin_acceso) === pin) prof = d.data(); });

            if(prof && prof.estado !== "INACTIVO") {
                cerrarModal();
                sessionStorage.setItem("pNom", descifrar(prof.identidad.nombre));
                sessionStorage.setItem("pTP", descifrar(prof.identidad.tp));
                if(accion === 'registro') { document.getElementById('areaRegistro').style.display='block'; activarCamara(); }
                if(accion === 'historial') mostrarHistorial();
                if(accion === 'pdf') procesarPDF(docId);
                if(accion === 'aclarar') prepararAclaratoria(docId);
            } else { alert("ACCESO DENEGADO"); }
        });
    };

    window.abrirModal = (tit, html, func) => {
        document.getElementById('modalTit').innerText = tit;
        document.getElementById('modalCuerpo').innerHTML = html;
        document.getElementById('btnModalOk').onclick = func;
        document.getElementById('modalMaestro').style.display = 'block';
    };
    window.cerrarModal = () => document.getElementById('modalMaestro').style.display = 'none';

    // MÓDULO CÁMARA
    async function activarCamara() {
        streamCam = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        document.getElementById('video').srcObject = streamCam;
    }
    window.tomarFoto = () => {
        const v = document.getElementById('video'), c = document.getElementById('canvas');
        c.width = v.videoWidth; c.height = v.videoHeight;
        c.getContext('2d').drawImage(v, 0, 0);
        fotoData = c.toDataURL('image/jpeg', 0.6);
        document.getElementById('imgPreview').src = fotoData;
        document.getElementById('imgPreview').style.display = 'block';
        v.style.display = 'none';
    };

    window.agregarCie = () => {
        const s = document.getElementById('selectCie');
        const [c, d] = s.value.split('|');
        diagnosticos.push({ cod: c, desc: d });
        document.getElementById('displayCie').innerHTML = diagnosticos.map(x => `[${x.cod}] ${x.desc}<br>`).join('');
        s.value = "";
    };

    // GUARDADO INTEGRAL
    window.guardarTodoIntegral = async () => {
        const hce = {
            m: document.getElementById('fMotivo').value,
            e: document.getElementById('fEnfermedad').value,
            a: document.getElementById('fAntecedentes').value,
            ex: document.getElementById('fExamen').value,
            p: document.getElementById('fPlan').value
        };
        if(!hce.m || !hce.p) return alert("Complete los campos obligatorios.");

        await addDoc(collection(db, "evoluciones_psicologicas"), {
            idPaciente,
            dataHCE: cifrar(JSON.stringify(hce)),
            cie10: cifrar(JSON.stringify(diagnosticos)),
            foto: fotoData,
            autor: cifrar(sessionStorage.getItem("pNom")),
            tp: cifrar(sessionStorage.getItem("pTP")),
            fecha: new Date().toLocaleString(),
            timestamp: serverTimestamp(),
            hash: btoa(hce.m + Date.now()).substring(0,12),
            aclaratorias: []
        });
        alert("✅ EXPEDIENTE SELLADO."); location.reload();
    };

    window.mostrarHistorial = async () => {
        const q = query(collection(db, "evoluciones_psicologicas"), where("idPaciente", "==", idPaciente), orderBy("timestamp", "desc"));
        const snap = await getDocs(q);
        let h = "";
        snap.forEach(docSnap => {
            const d = docSnap.data();
            let c = d.dataHCE ? JSON.parse(descifrar(d.dataHCE)) : {m: descifrar(d.evolucion || d.texto)};
            h += `<div class="evolucion-card">
                <span style="float:right; font-size:10px; color:var(--accent);">ID: ${d.hash}</span>
                <strong>📅 ${d.fecha}</strong>
                <p><strong>MOTIVO:</strong> ${c.m}</p>
                <small>Firmado por: ${descifrar(d.autor)}</small>
                <div style="margin-top:10px;">
                    <button class="btn-principal" style="width:auto; padding:5px 10px; background:var(--secondary); font-size:9px;" onclick="validarAcceso('pdf', '${docSnap.id}')">📄 PDF PRO</button>
                    <button class="btn-principal" style="width:auto; padding:5px 10px; background:var(--accent); font-size:9px;" onclick="validarAcceso('aclarar', '${docSnap.id}')">🖋️ ACLARAR</button>
                </div>
                ${d.aclaratorias && d.aclaratorias.length > 0 ? `<div class="bloque-aclaratoria"><strong>NOTAS ACLARATORIAS:</strong><br>${d.aclaratorias.map(a=>`• [${a.fecha}] ${descifrar(a.texto)}`).join('<br>')}</div>` : ''}
            </div>`;
        });
        document.getElementById('contenedorHistorial').innerHTML = h || "Sin registros.";
    };

    window.prepararAclaratoria = (id) => {
        const h = `<textarea id="tAcl" rows="4" placeholder="Nota legal..."></textarea>`;
        abrirModal("🖋️ NUEVA ACLARATORIA", h, async () => {
            const txt = document.getElementById('tAcl').value;
            await updateDoc(doc(db, "evoluciones_psicologicas", id), {
                aclaratorias: arrayUnion({ texto: cifrar(txt), fecha: new Date().toLocaleString(), autor: cifrar(sessionStorage.getItem("pNom")) })
            });
            alert("NOTA VINCULADA."); location.reload();
        });
    };

    window.procesarPDF = async (id) => {
        const d = (await getDoc(doc(db, "evoluciones_psicologicas", id))).data();
        const pac = (await getDoc(doc(db, "pacientes", idPaciente))).data();
        const docPDF = new jspdf.jsPDF();
        let h = d.dataHCE ? JSON.parse(descifrar(d.dataHCE)) : {m: descifrar(d.evolucion)};

        docPDF.rect(10, 10, 190, 275); 
        docPDF.setFontSize(14); docPDF.text("HISTORIA CLINICA PSIQUIATRIA", 105, 20, {align:"center"});
        docPDF.setFontSize(8); docPDF.text("FUNDACIÓN NUEVOS CAMINOS | NIT: 900753908-8", 105, 25, {align:"center"});
        
        docPDF.line(10, 30, 200, 30);
        docPDF.text(`PACIENTE: ${pac.nombre.toUpperCase()} | ID: ${pac.cedula} | FECHA: ${d.fecha}`, 12, 35);
        docPDF.line(10, 38, 200, 38);

        let y = 45;
        const secs = [{t:"MOTIVO:", d:h.m}, {t:"ENFERMEDAD:", d:h.e}, {t:"ANTECEDENTES:", d:h.a}, {t:"EXAMEN:", d:h.ex}, {t:"PLAN:", d:h.p}];
        secs.forEach(s => {
            if(!s.d) return;
            docPDF.setFont(undefined, 'bold'); docPDF.text(s.t, 12, y);
            docPDF.setFont(undefined, 'normal');
            const l = docPDF.splitTextToSize(s.d, 180);
            docPDF.text(l, 12, y + 5);
            y += (l.length * 5) + 10;
        });

        if(d.foto) { docPDF.addImage(d.foto, 'JPEG', 12, y, 60, 45); y += 70; }

        docPDF.text("__________________________", 12, 260);
        docPDF.text(descifrar(d.autor) + " - TP: " + descifrar(d.tp), 12, 265);
        docPDF.text("Hash: " + d.hash, 12, 270);
        docPDF.save(`HC_${pac.nombre}.pdf`);
    };

    const p = await getDoc(doc(db, "pacientes", idPaciente));
    if(p.exists()) document.getElementById('nombrePaciente').innerText = "EXPEDIENTE: " + p.data().nombre.toUpperCase();
</script>
</body>
</html>
