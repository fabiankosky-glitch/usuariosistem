<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HCE Bóveda Cifrada - Fundación Nuevos Caminos</title>
    
    <!-- CARGA CRÍTICA DE LIBRERÍAS DE SEGURIDAD (ORDEN OBLIGATORIO) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

      <style>
        :root { --primary: #0f3460; --accent: #27ae60; --danger: #e74c3c; --bg: #1a1a2e; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: #333; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 40px; border-radius: 25px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
        .header-status { background: #d1e7dd; color: #0f5132; padding: 15px; border-radius: 12px; font-size: 13px; margin-bottom: 25px; font-weight: bold; border: 1px solid #badbcc; text-align: center; }
        .btn-principal { background: var(--primary); color: white; padding: 18px; width: 100%; border: none; border-radius: 15px; font-size: 17px; font-weight: bold; cursor: pointer; margin-bottom: 20px; transition: 0.3s; }
        #areaRegistro { display: none; background: #f8f9fa; padding: 30px; border-radius: 20px; border: 1.5px solid #dee2e6; margin-bottom: 40px; }
        textarea, input, select { width: 100%; padding: 14px; border-radius: 10px; border: 1px solid #ced4da; margin-bottom: 12px; font-size: 14px; box-sizing: border-box; }
        .evolucion-card { text-align: left; background: #fff; border-radius: 15px; padding: 25px; margin-bottom: 25px; position: relative; box-shadow: 0 8px 25px rgba(0,0,0,0.1); border: 1px solid #eee; }
        .hash-tag { position: absolute; top: 12px; right: 20px; font-size: 10px; color: var(--accent); font-family: 'Courier New', monospace; font-weight: bold; }
        .cie-box { background: #f9f9f9; border-radius: 10px; padding: 15px; margin: 15px 0; border: 1px solid #eee; font-size: 13px; }
        .bloque-aclaratoria { background: #fff9e6; padding: 20px; border-radius: 12px; margin-top: 20px; border: 1px solid #ffeeba; font-size: 12px; }
        .btn-mini { padding: 12px 18px; border: none; border-radius: 8px; color: white; cursor: pointer; font-size: 11px; font-weight: 700; text-transform: uppercase; margin-right: 8px; }
        .modal-legal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); }
        .modal-content { background: white; margin: 10% auto; padding: 35px; border-radius: 25px; width: 85%; max-width: 500px; border: 3px solid var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <h2 id="nombrePaciente">CARGANDO EXPEDIENTE MAESTRO...</h2>
    <div class="header-status">🔒 PROTECCIÓN USC | AES-256 | AUDITORÍA LEY 1995 ACTIVA</div>

    <button class="btn-principal" onclick="validarYAcceder('registro')">📂 NUEVA EVOLUCIÓN CLÍNICA</button>

    <div id="areaRegistro">
        <video id="video" style="width:100%; border-radius:15px; background:#000;" autoplay playsinline></video>
        <canvas id="canvas" style="display:none;"></canvas>
        <img id="imgPreview" style="display:none; width:100%; border-radius:15px; border: 4px solid #fff; margin-bottom:20px;">
        <button class="btn-principal" style="background:#34495e" onclick="capturarFoto()">📸 CAPTURAR ANEXO</button>

        <div id="displayCie" style="background:#fff; border:2px solid var(--primary); padding:15px; border-radius:12px; margin-bottom:15px; min-height:40px;"></div>
        <select id="selectCie" onchange="addCie()">
            <option value="">-- SELECCIONAR CIE-10 (F00-F99) --</option>
            <option value="F14.2|Dependencia a cocaína / Bazuco">F14.2 Cocaína/Bazuco</option>
            <option value="F22.0|Trastorno delirante permanente">F22.0 Paranoia</option>
            <option value="F25.0|Trastorno esquizoafectivo de tipo maníaco">F25.0 Esquizoafectivo</option>
        </select>

        <input type="text" id="motivo" placeholder="Motivo de la consulta...">
        <textarea id="evolucionTexto" rows="6" placeholder="Evolución clínica detallada..."></textarea>
        <button class="btn-principal" style="background:var(--accent)" onclick="finalizarYGuardar()">💾 FIRMAR Y SELLAR EN BÓVEDA</button>
        <button class="btn-principal" style="background:#95a5a6" onclick="location.reload()">CANCELAR</button>
    </div>

    <button id="btnHistorial" class="btn-principal" style="background:#2980b9" onclick="validarYAcceder('historial')">🔓 DESCIFRAR EXPEDIENTE COMPLETO</button>
    <div id="listadoEvoluciones"></div>
</div>

<div id="modalMaestro" class="modal-legal">
    <div class="modal-content">
        <h3 id="modalTitulo" style="color:var(--primary); margin-top:0; border-bottom:3px solid var(--primary);"></h3>
        <div id="modalCuerpo"></div>
        <div style="margin-top:25px; display:flex; gap:12px;">
            <button id="btnModalAccion" class="btn-mini" style="background:var(--accent); flex:1; padding:15px;">AUTORIZAR</button>
            <button onclick="cerrarModal()" class="btn-mini" style="background:var(--danger); flex:1; padding:15px;">CANCELAR</button>
        </div>
    </div>
</div>

<script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, addDoc, query, where, getDocs, serverTimestamp, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        const firebaseConfig = {
            apiKey: "AIzaSyC78y2m79f9764f-YTuPYfP",
            authDomain: "caminosnuevosdatabase.firebaseapp.com",
            projectId: "caminosnuevosdatabase",
            storageBucket: "caminosnuevosdatabase.firebasestorage.app",
            appId: "1:907500835423:web:f56b459ab4d57d92a81ea"
        };


    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const idPaciente = new URLSearchParams(window.location.search).get("id");
    const LLAVE_MAESTRA = "FundacionNuevosCaminos2024*USC";
    const CLAVE_CLINICA = "1234";

    let diagnosticosCie = [];
    let fotoData = "", camStream = null;

    const cifrar = (t) => CryptoJS.AES.encrypt(t, LLAVE_MAESTRA).toString();
    const descifrar = (h) => {
        try { 
            const b = CryptoJS.AES.decrypt(h || "", LLAVE_MAESTRA);
            return b.toString(CryptoJS.enc.Utf8) || "[]"; 
        } catch(e) { return "[]"; }
    };

    window.abrirModal = (tit, html, func) => {
        document.getElementById("modalTitulo").innerText = tit;
        document.getElementById("modalCuerpo").innerHTML = html;
        document.getElementById("btnModalAccion").onclick = func;
        document.getElementById("modalMaestro").style.display = "block";
    };
    window.cerrarModal = () => document.getElementById("modalMaestro").style.display = "none";

    window.validarYAcceder = (tipo, docId = null) => {
        const h = `<p>Ingrese su clave de firma digital autorizada:</p><input type="password" id="passM" style="width:100%; padding:12px; border:2px solid #ccc; border-radius:10px;">`;
        abrirModal("🔒 AUTENTICACIÓN DIGITAL", h, async () => {
            if (document.getElementById("passM").value === CLAVE_CLINICA) {
                cerrarModal();
                if (tipo === 'registro') activarCamara();
                if (tipo === 'historial') cargarHistorial();
                if (tipo === 'pdf') generarPDFLegal(docId);
                if (tipo === 'aclarar') prepararAclaratoria(docId);
                if (tipo === 'json') exportarJSON(docId);
            } else { alert("CLAVE INCORRECTA"); }
        });
    };

    async function activarCamara() {
        document.getElementById('areaRegistro').style.display = 'block';
        camStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        document.getElementById('video').srcObject = camStream;
    }

    window.capturarFoto = () => {
        const v = document.getElementById('video'), c = document.getElementById('canvas');
        c.width = v.videoWidth; c.height = v.videoHeight;
        c.getContext('2d').drawImage(v, 0, 0);
        fotoData = c.toDataURL('image/jpeg', 0.7);
        document.getElementById('imgPreview').src = fotoData;
        document.getElementById('imgPreview').style.display = 'block';
        v.style.display = 'none';
    };

    window.addCie = () => {
        const s = document.getElementById("selectCie");
        const [cod, desc] = s.value.split("|");
        diagnosticosCie.push({ cod, desc });
        document.getElementById("displayCie").innerHTML = diagnosticosCie.map(x => `• <strong>${x.cod}</strong>: ${x.desc}<br>`).join('');
        s.value = "";
    };

    window.finalizarYGuardar = async () => {
        const ev = document.getElementById("evolucionTexto").value;
        const prof = prompt("Ingrese su nombre y Registro Profesional:");
        if (!ev || !prof) return alert("Faltan datos obligatorios.");
        await addDoc(collection(db, "evoluciones_psicologicas"), {
            idPaciente,
            evolucion: cifrar(ev),
            motivo: cifrar(document.getElementById("motivo").value || "N/A"),
            diagnosticos: cifrar(JSON.stringify(diagnosticosCie)),
            foto: fotoData,
            fecha: new Date().toLocaleString(),
            firmaHash: btoa(ev + Date.now()).substring(0,16),
            autor: cifrar(prof),
            aclaratorias: []
        });
        alert("REGISTRO SELLADO."); location.reload();
    };

    window.cargarHistorial = async () => {
        const snap = await getDocs(query(collection(db, "evoluciones_psicologicas"), where("idPaciente", "==", idPaciente)));
        let h = "";
        snap.forEach(docSnap => {
            const d = docSnap.data();
            const diags = JSON.parse(descifrar(d.diagnosticos || d.cie10_array));
            h += `<div class="evolucion-card">
                <span class="hash-tag">HASH-ID: ${d.firmaHash || d.hash}</span>
                <p>🗓️ <strong>${d.fecha || d.fechaHora}</strong></p>
                <div class="cie-box"><strong>DIAGNÓSTICOS (CIE-10):</strong><br>${diags.map(x => `• ${x.cod}: ${x.desc}`).join('<br>')}</div>
                <p>${descifrar(d.evolucion || d.texto)}</p>
                <p style="font-size:10px; color:gray;">Firmado por: ${descifrar(d.autor || '')}</p>
                <div class="botones-accion">
                    <button class="btn-mini" style="background:#2c3e50" onclick="validarYAcceder('json', '${docSnap.id}')">JSON</button>
                    <button class="btn-mini" style="background:#e67e22" onclick="validarYAcceder('pdf', '${docSnap.id}')">📄 PDF/A</button>
                    <button class="btn-mini" style="background:#9b59b6" onclick="validarYAcceder('aclarar', '${docSnap.id}')">ACLARAR</button>
                    ${(d.aclaratorias && d.aclaratorias.length > 0) ? `<button class="btn-mini" style="background:#34495e" onclick="document.getElementById('acl-${docSnap.id}').style.display='block'">VER ACLARATORIA</button>` : ''}
                </div>
                <div id="acl-${docSnap.id}" class="bloque-aclaratoria" style="display:none;">
                    <strong>NOTAS ACLARATORIAS (RES. 1995/99):</strong><hr>
                    ${d.aclaratorias ? d.aclaratorias.map(a => `<div>[${a.fecha}] <strong>${descifrar(a.autor || '')}:</strong> ${descifrar(a.texto)}</div>`).join('<hr>') : ''}
                    <button class="btn-mini" style="background:#95a5a6; margin-top:10px;" onclick="document.getElementById('acl-${docSnap.id}').style.display='none'">CERRAR</button>
                </div>
            </div>`;
        });
        document.getElementById("listadoEvoluciones").innerHTML = h || "Sin registros.";
        document.getElementById("btnHistorial").style.display = 'none';
    };

    window.prepararAclaratoria = (id) => {
        const h = `<textarea id="tAcl" rows="4" placeholder="Nota aclaratoria..."></textarea><input type="text" id="autAcl" placeholder="Nombre profesional">`;
        abrirModal("🖋️ NUEVA NOTA ACLARATORIA", h, async () => {
            const nota = document.getElementById("tAcl").value;
            const aut = document.getElementById("autAcl").value;
            if (nota && aut) {
                await updateDoc(doc(db, "evoluciones_psicologicas", id), {
                    aclaratorias: arrayUnion({ texto: cifrar(nota), autor: cifrar(aut), fecha: new Date().toLocaleString() })
                });
                alert("Nota sellada."); location.reload();
            }
        });
    };

    window.generarPDFLegal = async (id) => {
        const ev = (await getDoc(doc(db, "evoluciones_psicologicas", id))).data();
        const pac = (await getDoc(doc(db, "pacientes", idPaciente))).data();
        const diags = JSON.parse(descifrar(ev.diagnosticos));
        const vent = window.open('', '_blank');
        vent.document.write(`<html><body style="font-family:'Times New Roman'; padding:40px;">
            <h2 style="text-align:center;">FUNDACIÓN NUEVOS CAMINOS</h2>
            <p><strong>PACIENTE:</strong> ${pac.nombre.toUpperCase()} | <strong>FECHA:</strong> ${ev.fecha}</p>
            <p><strong>DIAGNÓSTICOS:</strong><br>${diags.map(x=>`• ${x.cod}: ${x.desc}`).join('<br>')}</p>
            <p>${descifrar(ev.evolucion)}</p>
            <p style="margin-top:40px; border-top:1px solid #000; width:300px;">Firmado por: ${descifrar(ev.autor)}<br>HASH: ${ev.firmaHash}</p>
            <script>setTimeout(()=>window.print(), 1000);<\/script></body></html>`);
    };

    window.exportarJSON = async (id) => {
        const d = (await getDoc(doc(db, "evoluciones_psicologicas", id))).data();
        const blob = new Blob([JSON.stringify(d)], {type: "application/json"});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `HCE_${id}.json`; a.click();
    };

    const pSnap = await getDoc(doc(db, "pacientes", idPaciente));
    if (pSnap.exists()) document.getElementById("nombrePaciente").innerText = "EXPEDIENTE: " + pSnap.data().nombre.toUpperCase();
</script>
</body>
</html>
