<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HCE Psiquiatría Integral - Fundación NC</title>
    
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

 <style>
       :root { --primary: #0f3460; --secondary: #16213e; --accent: #27ae60; --danger: #e74c3c; --bg: #1a1a2e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #333; margin: 0; padding: 20px; font-size: 12px; }
        .container { max-width: 1350px; margin: auto; background: white; padding: 40px; border-radius: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
        .header-app { border-bottom: 4px solid var(--primary); padding-bottom: 20px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
        .btn-principal { background: var(--primary); color: white; padding: 20px; border: none; border-radius: 15px; font-size: 15px; font-weight: bold; cursor: pointer; transition: 0.3s; text-transform: none; }
        .btn-principal:hover { transform: translateY(-3px); background: #1a4a8d; }
        #areaRegistro { display: none; background: #fdfdfd; padding: 30px; border-radius: 25px; border: 2px solid #eee; margin-top: 30px; animation: slideUp 0.5s ease; }
        .seccion-clinica { background: white; padding: 25px; border-radius: 15px; border-left: 8px solid var(--primary); margin-bottom: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); text-align: left; }
        .titulo-seccion { font-weight: 900; color: var(--primary); text-transform: uppercase; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px; font-size: 14px; }
        .grid-medico { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        label { font-weight: bold; color: #555; font-size: 11px; display: block; margin-bottom: 5px; text-transform: uppercase; }
        textarea, input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc; font-size: 13px; box-sizing: border-box; }
        .evolucion-card { text-align: left; background: white; border-left: 10px solid #9b59b6; padding: 30px; margin-bottom: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); position: relative; }
        .btn-mini { padding: 10px 15px; border-radius: 8px; border: none; color: white; font-weight: bold; cursor: pointer; font-size: 10px; text-transform: uppercase; margin-right: 8px; margin-top: 10px; }
        .modal-legal { display: none; position: fixed; z-index: 10000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); }
        .modal-content { background: white; margin: 5% auto; padding: 40px; border-radius: 35px; width: 90%; max-width: 450px; border: 4px solid var(--primary); text-align: center; }
        #video { width: 100%; max-width: 400px; border-radius: 20px; background: #000; margin: auto; display: block; }
        #imgPreview { width: 100%; max-width: 400px; border-radius: 20px; border: 4px solid var(--accent); display: none; margin: auto; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
    </style>
    <script type="module">
        import { auth } from './firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = 'login.html';
            }
        });
    </script>
</head>
<body>

<div class="container">
    <div class="header-app">
        <div>
            <h1 id="nombrePaciente" style="margin:0; color:var(--primary); font-size: 32px;">CARPETA CLÍNICA</h1>
            <small style="color:#888; font-weight: 900;">CENTRO DE REHABILITACIÓN NUEVOS CAMINOS</small>
        </div>
        <div style="background:#d1e7dd; color:#0f5132; padding:12px 25px; border-radius:50px; font-weight:bold; font-size:11px;">🔒 SEGURIDAD NIVEL FORENSE ACTIVA</div>
    </div>
    <a href="carpetas.html" style="text-decoration:none; color:#7f8c8d; font-weight:bold; display:block; margin-bottom: 20px; text-align:center;">⬅ Volver a Carpetas</a>
    
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:25px;">
        <button class="btn-principal" onclick="validarAcceso('registro')">📂 Apertura de Folio Psiquiátrico</button>
        <button class="btn-principal" style="background:var(--secondary)" onclick="validarAcceso('historial')">🔓 Descifrar Archivo Clínico</button>
    </div>

    <!-- AREA DE REGISTRO INTEGRAL (SIN CORTES) -->
    <div id="areaRegistro">
        <div class="seccion-clinica">
            <div class="titulo-seccion">1. Identificación y Evidencia | <span id="numFolioVisual" style="color:var(--danger)">Folio No: --</span></div>
            <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 30px;">
                <div style="text-align:center;">
                    <video id="video" autoplay playsinline></video>
                    <canvas id="canvas" style="display:none;"></canvas>
                    <img id="imgPreview">
                    <button class="btn-mini" style="background:#34495e; width:100%; margin-top:15px;" onclick="tomarFoto()">📸 CAPTURAR IDENTIDAD</button>
                </div>
                <div class="grid-medico">
                    <div><label>Informante</label><input type="text" id="fInf"></div>
                    <div><label>Confiabilidad</label><select id="fConf"><option>Alta</option><option>Media</option><option>Baja</option></select></div>
                    <div><label>Peso (kg)</label><input type="number" id="vP" oninput="calcIMC()"></div>
                    <div><label>Talla (cm)</label><input type="number" id="vT" oninput="calcIMC()"></div>
                    <div><label>IMC</label><input type="text" id="vI" readonly style="background:#f1f1f1;"></div>
                    <div><label>Tensión Arterial</label><input type="text" id="vTA" placeholder="120/80"></div>
                </div>
            </div>
        </div>

        <div class="seccion-clinica">
            <div class="titulo-seccion">2. Anamnesis y Evolución</div>
            <label>Motivo de Consulta:</label><textarea id="fMot" rows="2"></textarea>
            <label style="margin-top:10px;">Enfermedad Actual:</label><textarea id="fEnf" rows="5"></textarea>
        </div>

        <div class="seccion-clinica">
            <div class="titulo-seccion">3. Examen Mental Dominios</div>
            <div class="grid-medico">
                <div><label>Porte y Actitud</label><textarea id="mPor"></textarea></div>
                <div><label>Pensamiento</label><textarea id="mPen"></textarea></div>
                <div><label>Afecto</label><textarea id="mAfe"></textarea></div>
                <div><label>Juicio</label><textarea id="mJui"></textarea></div>
                <div><label>Riesgo Suicida</label><select id="mRie"><option>Nulo</option><option>Bajo</option><option>Moderado</option><option>Alto</option></select></div>
            </div>
        </div>

        <div class="seccion-clinica">
            <div class="titulo-seccion">4. Diagnósticos CIE-10 (TRASTORNOS)</div>
            <div id="displayCie" style="padding:15px; background:#f8f9fa; border-radius:12px; margin-bottom:10px; min-height:30px; border:1px dashed #ccc;"></div>
            <select id="selectCie" onchange="addCie()">
                <option value="">-- SELECCIONE TRASTORNO --</option>
                <option value="F14.2|Dependencia a la Cocaína">F14.2 Cocaína</option>
                <option value="F10.2|Dependencia al Alcohol">F10.2 Alcohol</option>
                <option value="F32.9|Trastorno Depresivo">F32.9 Depresión</option>
                <option value="X70|Riesgo Suicida Activo">X70 Riesgo Suicida</option>
            </select>
        </div>

        <div class="seccion-clinica">
            <div class="titulo-seccion">5. Plan de Manejo</div>
            <textarea id="fPla" rows="5"></textarea>
        </div>

        <button class="btn-principal" style="background:var(--accent); font-size:18px;" onclick="guardarTodoDefinitivo()">💾 FIRMAR Y SELLAR FOLIO INTEGRAL</button>
    </div>

    <div id="contenedorHistorial" style="margin-top:50px;"></div>
</div>

<div id="modalMaestro" class="modal-legal">
    <div class="modal-content">
        <h2 style="color:var(--primary); margin:0;">Validación de Firma</h2>
        <select id="rolP" style="margin: 20px 0; height:50px; font-weight:bold;">
            <option value="Psicologia">Psicología</option>
            <option value="Psiquiatria">Psiquiatría</option>
            <option value="Administrador">Administrador</option>
        </select>
        <input type="password" id="pinP" style="text-align:center; font-size:35px; letter-spacing:12px; height:70px;" maxlength="4" placeholder="****">
        <button id="btnModalOk" class="btn-principal" style="margin-top:25px;">AUTORIZAR ACCIÓN</button>
        <button onclick="cerrarModal()" style="background:none; border:none; color:var(--danger); cursor:pointer; margin-top:15px; font-weight:bold;">CANCELAR</button>
    </div>
</div>

<script type="module">
    import { db, auth } from './firebase-config.js';
    import { getFirestore, collection, addDoc, query, where, getDocs, doc, getDoc, updateDoc, arrayUnion, serverTimestamp  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const idPaciente = new URLSearchParams(window.location.search).get("id");
    
    const LL_CL_INSEGURA = "FundacionNuevosCaminos2024*USC";

    let diagCie = [], fotoB64 = "", stream = null, nFolio = 0;

    const cifrar = (t) => CryptoJS.AES.encrypt(t, LL_CL_INSEGURA).toString();
    const descCl = (h) => { try { return CryptoJS.AES.decrypt(h || "", LL_CL_INSEGURA).toString(CryptoJS.enc.Utf8); } catch(e){return "";} };

    window.validarAcceso = async (accion, docId = null) => {
        console.log("✅ Acceso directo concedido a Módulo Psicológico (seguridad deshabilitada para demo).");
        
        const userSimulado = { displayName: "Admin Demo", email: "admin_demo@caminosnuevos.com" };
        const claimsSimulados = { rol: "admin_demo", admin: true };

        { 
            sessionStorage.setItem("pNom", userSimulado.displayName);
            sessionStorage.setItem("pTP", "N/A");

            if(accion === 'registro') { 
                const sc = await getDocs(query(collection(db, "evoluciones_psicologicas"), where("idPaciente", "==", idPaciente)));
                nFolio = sc.size + 1;
                document.getElementById('numFolioVisual').innerText = "Folio No: " + nFolio;
                document.getElementById('areaRegistro').style.display='block'; iniciarCam();
            }
            if(accion === 'historial') cargarHistorialUniversal();
            if(accion === 'pdf') generarReporteEstructural(docId);
            if(accion === 'aclarar') ejecutarAclarar(docId);
            if(accion === 'json') exportarForenseJSON(docId);
        }
    };

    async function iniciarCam() { try { stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }); document.getElementById('video').srcObject = stream; } catch(e){console.error(e);} }
    window.tomarFoto = () => { const v = document.getElementById('video'), c = document.getElementById('canvas'); c.width = v.videoWidth; c.height = v.videoHeight; c.getContext('2d').drawImage(v,0,0); fotoB64 = c.toDataURL('image/jpeg'); document.getElementById('imgPreview').src = fotoB64; document.getElementById('imgPreview').style.display='block'; };
    
    window.addCie = () => { 
        const s = document.getElementById('selectCie'), [c, d] = s.value.split('|'); if(!c) return;
        diagCie.push({ cod: c, desc: d }); 
        document.getElementById('displayCie').innerHTML = diagCie.map(x => `<span style="background:var(--primary); color:white; padding:5px 12px; margin:3px; border-radius:50px; display:inline-block;">${x.cod} - ${x.desc}</span>`).join('');
        s.value = ""; 
    };

    window.guardarTodoDefinitivo = async () => {
        const hce = {
            vits: { p: document.getElementById('vP').value, t: document.getElementById('vT').value, i: document.getElementById('vI').value, ta: document.getElementById('vTA').value },
            anam: { mot: document.getElementById('fMot').value, enf: document.getElementById('fEnf').value },
            mental: { por: document.getElementById('mPor').value, pen: document.getElementById('mPen').value, afe: document.getElementById('mAfe').value, jui: document.getElementById('mJui').value, rie: document.getElementById('mRie').value },
            cie: diagCie, plan: document.getElementById('fPla').value, folio: nFolio
        };
        await addDoc(collection(db, "evoluciones_psicologicas"), { idPaciente, dataHCE: cifrar(JSON.stringify(hce)), foto: fotoB64, autor: cifrar(sessionStorage.getItem("pNom")), tp: cifrar(sessionStorage.getItem("pTP")), fecha: new Date().toLocaleString(), hash: Math.random().toString(36).substring(7) });
        location.reload();
    };

    window.cargarHistorialUniversal = async () => {
        const q = query(collection(db, "evoluciones_psicologicas"), where("idPaciente", "==", idPaciente));
        const snap = await getDocs(q);
        let evs = [];
        snap.forEach(d => { 
            const data = d.data();
            const raw = descCl(data.dataHCE);
            if(raw) {
                try { evs.push({...data, c: JSON.parse(raw), id: d.id }); } catch(e) { evs.push({...data, c: {anam:{mot:"Formato heredado"}}, id: d.id }); }
            }
        });
        evs.sort((a,b) => new Date(b.fecha) - new Date(a.fecha));
        let h = "";
        evs.forEach(ev => {
            h += `<div class="evolucion-card">
                <span style="float:right; font-size:10px; color:green;">HASH: ${ev.hash}</span>
                <strong style="color:var(--primary)">📅 ${ev.fecha} | FOLIO No: ${ev.c.folio || 'N/A'}</strong>
                <p style="margin: 15px 0;"><strong>MOTIVO:</strong> ${ev.c.anam ? ev.c.anam.mot : (ev.c.mot || "Consulta")}</p>
                <div style="border-top:1px solid #eee; padding-top:15px;">
                    <button class="btn-mini" style="background:#2c3e50" onclick="validarAcceso('json', '${ev.id}')">JSON</button>
                    <button class="btn-mini" style="background:#e67e22" onclick="validarAcceso('pdf', '${ev.id}')">📄 PDF PRO</button>
                    <button class="btn-mini" style="background:#9b59b6" onclick="validarAcceso('aclarar', '${ev.id}')">🖋️ ACLARAR</button>
                    ${(ev.aclaratorias || []).length > 0 ? `<button class="btn-mini" style="background:#34495e" onclick="document.getElementById('vAcl-${ev.id}').style.display='block'">👁️ VER NOTAS (${ev.aclaratorias.length})</button>` : ''}
                </div>
                <div id="vAcl-${ev.id}" style="display:none; background:#fff9e6; padding:15px; margin-top:10px; border-radius:10px; font-size:11px;">
                    <strong>NOTAS ACLARATORIAS:</strong><br>${ev.aclaratorias ? ev.aclaratorias.map(a=>`• [${a.fecha}] ${descCl(a.texto)}`).join('<br>') : ''}
                    <button onclick="this.parentElement.style.display='none'" style="margin-top:5px; cursor:pointer;">Cerrar</button>
                </div>
            </div>`;
        });
        document.getElementById('contenedorHistorial').innerHTML = h || "Sin registros.";
    };

window.generarReporteEstructural = async (id) => {
    try {
        const dSnap = await getDoc(doc(db, "evoluciones_psicologicas", id));
        if(!dSnap.exists()) { alert("Documento no encontrado"); return; }
        
        const d = dSnap.data();
        const pSnap = await getDoc(doc(db, "pacientes", idPaciente));
        if(!pSnap.exists()) { alert("Datos del paciente no encontrados"); return; }
        
        const pac = pSnap.data();
        
        let c = {};
        try {
            const descryptedData = descCl(d.dataHCE);
            if(!descryptedData) throw new Error("No se pudo desencriptar");
            c = JSON.parse(descryptedData) || {};
        } catch(e) {
            console.error("Error al parsear HCE:", e);
            c = { 
                vits: { p: '--', t: '--', i: '--', ta: '--' }, 
                anam: { mot: 'Sin datos', enf: 'Sin datos' }, 
                mental: { por: '', pen: '', afe: '', jui: '', rie: '' },
                cie: [],
                plan: 'Sin datos'
            };
        }

        const { jsPDF } = window.jspdf;
        const docP = new jsPDF('p', 'mm', 'letter');
        
        const gray = [240, 240, 240];
        const marginX = 10;
        let currentY = 10;
        const maxWidth = 195;

        const drawRect = (x, y, w, h, fill = false) => {
            if(fill) docP.setFillColor(gray[0], gray[1], gray[2]);
            docP.rect(x, y, w, h, fill ? 'FD' : 'S');
        };

        const addPageIfNeeded = (minHeight) => {
            if(currentY + minHeight > 270) { docP.addPage(); currentY = 10; }
        };

        drawRect(marginX, currentY, maxWidth, 25);
        docP.line(55, currentY, 55, currentY + 25);
        docP.line(150, currentY, 150, currentY + 25);

        docP.setFont("helvetica", "bold");
        docP.setFontSize(8);
        docP.text("FUNDACIÓN NUEVOS CAMINOS", 32.5, currentY + 12, { align: "center" });
        
        docP.setFontSize(11);
        docP.text("HISTORIA CLÍNICA INTEGRAL", 102.5, currentY + 10, { align: "center" });
        docP.setFontSize(8);
        docP.text("CENTRO DE REHABILITACIÓN Y SALUD MENTAL", 102.5, currentY + 15, { align: "center" });
        docP.text("NIT: 900753908-8", 102.5, currentY + 20, { align: "center" });

        docP.setFontSize(7);
        docP.text("CÓDIGO: NC-HCE-01", 152, currentY + 7);
        docP.text("VERSIÓN: 03", 152, currentY + 12);
        docP.text("VIGENCIA: 2 AÑOS", 152, currentY + 17);
        docP.text(`FOLIO No: ${c.folio || '1'}`, 152, currentY + 22);

        currentY += 28;

        drawRect(marginX, currentY, maxWidth, 15, true);
        docP.setFontSize(9);
        docP.text(`APELLIDOS Y NOMBRES: ${(pac.nombre || 'N/A').toUpperCase()}`, marginX + 3, currentY + 6);
        docP.text(`DOCUMENTO DE IDENTIDAD: ${pac.cedula || 'N/A'}`, marginX + 3, currentY + 11);
        docP.text(`FECHA DE ATENCIÓN: ${d.fecha || new Date().toLocaleString()}`, 130, currentY + 6);
        docP.text(`EDAD: ${pac.edad || '--'} AÑOS`, 130, currentY + 11);

        currentY += 18;

        addPageIfNeeded(15);
        drawRect(marginX, currentY, maxWidth, 10);
        docP.line(marginX + 40, currentY, marginX + 40, currentY + 10);
        docP.line(marginX + 80, currentY, marginX + 80, currentY + 10);
        docP.line(marginX + 120, currentY, marginX + 120, currentY + 10);
        docP.line(marginX + 160, currentY, marginX + 160, currentY + 10);

        docP.setFontSize(8);
        docP.text(`PESO: ${c.vits.p || '--'} kg`, marginX + 2, currentY + 6);
        docP.text(`TALLA: ${c.vits.t || '--'} cm`, marginX + 42, currentY + 6);
        docP.text(`IMC: ${c.vits.i || '--'}`, marginX + 82, currentY + 6);
        docP.text(`T.A: ${c.vits.ta || '--'}`, marginX + 122, currentY + 6);
        docP.text(`FC/FR: ${c.vits.fc || '--'}`, marginX + 162, currentY + 6);

        currentY += 12;

        const renderSection = (title, content) => {
            addPageIfNeeded(12);
            docP.setFont("helvetica", "bold");
            drawRect(marginX, currentY, maxWidth, 6, true);
            docP.setFontSize(9);
            docP.text(title, marginX + 3, currentY + 4.5);
            currentY += 6;

            docP.setFont("helvetica", "normal");
            docP.setFontSize(8);
            const safeContent = String(content || "Sin registros en el sistema.");
            const splitText = docP.splitTextToSize(safeContent, maxWidth - 6);
            const boxHeight = Math.max(10, (splitText.length * 4.5) + 5);
            drawRect(marginX, currentY, maxWidth, boxHeight);
            docP.text(splitText, marginX + 3, currentY + 4);
            currentY += boxHeight + 2;
        };

        renderSection("MOTIVO DE CONSULTA", c.anam?.mot || "");
        renderSection("ENFERMEDAD ACTUAL", c.anam?.enf || "");
        
        const mentalText = `PORTE Y ACTITUD: ${c.mental?.por || ''}\nPENSAMIENTO: ${c.mental?.pen || ''}\nAFECTO: ${c.mental?.afe || ''}\nJUICIO Y RACIOCINIO: ${c.mental?.jui || ''}\nRIESGO: ${c.mental?.rie || ''}`;
        renderSection("EXAMEN DEL ESTADO MENTAL", mentalText);

        addPageIfNeeded(15);
        docP.setFont("helvetica", "bold");
        drawRect(marginX, currentY, maxWidth, 6, true);
        docP.setFontSize(9);
        docP.text("IMPRESIÓN DIAGNÓSTICA (CIE-10)", marginX + 3, currentY + 4.5);
        currentY += 6;
        
        const cieContent = c.cie && c.cie.length > 0 ? c.cie.map(x => `[${x.cod}] ${x.desc}`).join('\n') : "Sin diagnósticos registrados";
        docP.setFont("helvetica", "normal");
        docP.setFontSize(8);
        const cieText = docP.splitTextToSize(cieContent, maxWidth - 6);
        const cieHeight = Math.max(10, (cieText.length * 4.5) + 5);
        drawRect(marginX, currentY, maxWidth, cieHeight);
        docP.text(cieText, marginX + 3, currentY + 4);
        currentY += cieHeight + 2;

        renderSection("PLAN DE MANEJO Y RECOMENDACIONES", c.plan || "");

        if(d.aclaratorias && d.aclaratorias.length > 0) {
            addPageIfNeeded(20);
            docP.setFont("helvetica", "bold");
            drawRect(marginX, currentY, maxWidth, 6, true);
            docP.setFontSize(9);
            docP.text("NOTAS ACLARATORIAS Y ACTUALIZACIONES", marginX + 3, currentY + 4.5);
            currentY += 6;

            docP.setFont("helvetica", "normal");
            docP.setFontSize(7);
            
            let notasTexto = "";
            d.aclaratorias.forEach((nota, idx) => {
                const notaDescifrada = descCl(nota.texto) || nota.texto;
                notasTexto += `[${idx + 1}] Fecha: ${nota.fecha}\n${notaDescifrada}\n\n`;
            });
            
            const notasLines = docP.splitTextToSize(notasTexto, maxWidth - 6);
            const notasHeight = Math.max(15, (notasLines.length * 4) + 5);
            drawRect(marginX, currentY, maxWidth, notasHeight);
            docP.text(notasLines, marginX + 3, currentY + 4);
            currentY += notasHeight + 2;
        }

        addPageIfNeeded(50);
        if (d.foto) {
            try {
                docP.setFont("helvetica", "bold");
                docP.setFontSize(9);
                docP.text("ANEXO: REGISTRO FOTOGRÁFICO DE EVIDENCIA", marginX, currentY + 5);
                docP.addImage(d.foto, 'JPEG', marginX, currentY + 8, 45, 35);
                currentY += 50;
            } catch(imgErr) {
                console.warn("Error al agregar imagen:", imgErr);
            }
        }

        addPageIfNeeded(25);
        const footerY = currentY + 20;
        docP.line(marginX, footerY, marginX + 70, footerY);
        docP.setFont("helvetica", "normal");
        docP.setFontSize(9);
        docP.text("FIRMA DEL PROFESIONAL TRATANTE", marginX, footerY + 5);
        docP.text(descCl(d.autor || "") || "N/A", marginX, footerY + 10);
        docP.text(`R.M. / T.P: ${descCl(d.tp || "") || "N/A"}`, marginX, footerY + 15);

        docP.setFontSize(7);
        docP.setTextColor(100);
        docP.text(`Documento generado electrónicamente. Hash: ${d.hash || 'N/A'}`, 105, 275, { align: "center" });

        const nombreArchivo = `HC_FOLIO_${c.folio || '1'}_${(pac.nombre || 'paciente').replace(/ /g, "_")}.pdf`;
        docP.save(nombreArchivo);
        alert("✅ PDF generado correctamente: " + nombreArchivo);

    } catch (error) {
        console.error("Error en generación de PDF:", error);
        alert("❌ Error al generar el PDF. Verifique los datos e intente nuevamente.\nDetalles: " + error.message);
    }
};

    window.exportarForenseJSON = async (id) => {
        try {
            const d = (await getDoc(doc(db, "evoluciones_psicologicas", id))).data();
            const blob = new Blob([JSON.stringify(d, null, 2)], {type: "application/json"});
            const url = URL.createObjectURL(blob); 
            const a = document.createElement("a"); 
            a.href = url; 
            a.download = `EXPEDIENTE_${id}.json`; 
            a.click();
        } catch(err) {
            console.error("Error exportando JSON:", err);
            alert("Error al exportar JSON");
        }
    };

    window.ejecutarAclarar = (id) => { 
        const t = prompt("Ingrese nota marginal aclaratoria (No se puede borrar):"); 
        if(t) updateDoc(doc(db, "evoluciones_psicologicas", id), { aclaratorias: arrayUnion({ texto: cifrar(t), fecha: new Date().toLocaleString() }) }).then(()=>location.reload()); 
    };

    window.cerrarModal = () => document.getElementById('modalMaestro').style.display='none';
    
    console.log("✅ Acceso directo concedido a Módulo Psicológico (seguridad deshabilitada para demo).");
    try {
        const pRef = await getDoc(doc(db, "pacientes", idPaciente)); 
        if(pRef.exists()) {
            document.getElementById('nombrePaciente').innerText = pRef.data().nombre.toUpperCase();
        }
    } catch(e) {
        console.error("Error cargando paciente:", e);
    }
</script>
