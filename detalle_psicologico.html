<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HCE Psiquiatría Integral - Fundación NC</title>
    
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
          :root { --primary: #0f3460; --secondary: #16213e; --accent: #27ae60; --danger: #e74c3c; --bg: #1a1a2e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 15px 50px rgba(0,0,0,0.5); text-align: center; }
        .form-header { display: grid; grid-template-columns: 1fr 2fr 1fr; border: 2px solid #000; margin-bottom: 20px; font-size: 11px; background: #fff; }
        .form-header div { padding: 10px; border-right: 1px solid #000; display: flex; align-items: center; justify-content: center; }
        .form-header div:last-child { border-right: none; text-align: left; flex-direction: column; }
        .btn-blue { background: var(--primary); color: white; padding: 15px; width: 100%; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-bottom: 10px; transition: 0.3s; text-transform: uppercase; font-size: 13px; }
        #areaRegistro { display: none; background: #fff; padding: 20px; border-radius: 15px; border: 2px solid var(--primary); margin-top: 20px; text-align: left; }
        label { font-weight: bold; font-size: 11px; color: var(--primary); margin-top: 10px; display: block; text-transform: uppercase; }
        textarea, input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #000; font-size: 14px; box-sizing: border-box; background: #fcfcfc; margin-bottom: 8px; }
        .evolucion-card { text-align: left; background: white; border-left: 10px solid #9b59b6; padding: 20px; margin-bottom: 20px; border-radius: 15px; border: 1px solid #eee; position: relative; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .modal-legal { display: none; position: fixed; z-index: 10000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); overflow-y: auto; }
        .modal-content { background: white; margin: 5% auto; padding: 30px; border-radius: 30px; width: 90%; max-width: 450px; border: 4px solid var(--primary); text-align: center; }
        #video { width: 100%; border-radius: 10px; background: #000; margin-bottom: 10px; }
        #imgPreview { width: 100%; border-radius: 10px; border: 3px solid var(--accent); display: none; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2 id="nombrePaciente" style="color: var(--primary);">EXPEDIENTE MAESTRO</h2>
    <div style="background:#d1e7dd; padding:10px; border-radius:10px; margin-bottom:20px; font-size:11px; font-weight:bold; color:#0f5132; border:1px solid #badbcc;">🔒 SISTEMA USC-E2EE | VALIDACIÓN PROFESIONAL ACTIVA</div>

    <button class="btn-blue" onclick="validarAcceso('registro')">📂 INICIAR NUEVA EVOLUCIÓN CLÍNICA</button>
    <button class="btn-blue" style="background:#2980b9" onclick="validarAcceso('historial')">🔓 DESCIFRAR EXPEDIENTE COMPLETO</button>

    <div id="areaRegistro">
        <div class="form-header">
            <div>LOGOTIPO</div>
            <div><strong>CENTRO DE REHABILITACION NUEVOS CAMINOS<br>NIT: 900753908-8</strong></div>
            <div><span>Cod: NC-PSQ-01</span><span>Ver: 02</span></div>
        </div>

        <video id="video" autoplay playsinline></video>
        <canvas id="canvas" style="display:none;"></canvas>
        <img id="imgPreview">
        <button class="btn-blue" style="background:#34495e; padding:8px; font-size:10px;" onclick="tomarFoto()">📸 CAPTURAR ANEXO</button>

        <label>1. Motivo de consulta:</label><textarea id="fMotivo" rows="2"></textarea>
        <label>2. Enfermedad actual:</label><textarea id="fEnfermedad" rows="4"></textarea>
        <label>3. Antecedentes:</label><textarea id="fAntecedentes" rows="2"></textarea>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div><label>4. Examen mental:</label><textarea id="fExamen" rows="5"></textarea></div>
            <div><label>5. Plan de manejo:</label><textarea id="fPlan" rows="5"></textarea></div>
        </div>
        
        <button class="btn-blue" style="background:var(--accent); margin-top:15px;" onclick="guardarTodoMaestro()">💾 FIRMAR Y SELLAR</button>
    </div>
    <div id="contenedorHistorial" style="margin-top: 30px;"></div>
</div>

<div id="modalMaestro" class="modal-legal">
    <div class="modal-content">
        <h3 id="modalTit" style="color:var(--primary); margin-top:0;">IDENTIDAD DIGITAL</h3>
        <div id="modalCuerpo"></div>
        <button id="btnModalOk" class="btn-blue" style="background:var(--accent); margin-top:15px;">CONFIRMAR</button>
        <button onclick="cerrarModal()" style="background:none; border:none; color:var(--danger); cursor:pointer; margin-top:10px; font-weight:bold;">CANCELAR</button>
    </div>
</div>

<script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, where, getDocs, orderBy, doc, getDoc, updateDoc, arrayUnion, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        const firebaseConfig = {
            apiKey: "AIzaSyC78y2m79f9764f-YTuPYfP",
            authDomain: "caminosnuevosdatabase.firebaseapp.com",
            projectId: "caminosnuevosdatabase",
            storageBucket: "caminosnuevosdatabase.firebasestorage.app",
            appId: "1:907500835423:web:f56b459ab4d57d92a81ea"
        };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const idPaciente = new URLSearchParams(window.location.search).get("id");

    const LLAVE_CLINICA = "FundacionNuevosCaminos2024*USC";
    const LLAVE_ADMIN = "ADMIN2024*";

    let fotoData = "", streamCam = null;

    const cifrar = (t) => CryptoJS.AES.encrypt(t, LLAVE_CLINICA).toString();
    const descifrarClinico = (h) => {
        try { return CryptoJS.AES.decrypt(h || "", LLAVE_CLINICA).toString(CryptoJS.enc.Utf8); } catch(e) { return ""; }
    };
    const descifrarAdmin = (h) => {
        try { return CryptoJS.AES.decrypt(h || "", LLAVE_ADMIN).toString(CryptoJS.enc.Utf8); } catch(e) { return ""; }
    };

    window.validarAcceso = (accion) => {
        const h = `
            <label>Cargo:</label>
            <select id="rolP">
                <option value="Psicologia">Psicología</option>
                <option value="Terapeuta">Terapeuta</option>
                <option value="Director(a) Terapeutico">Director(a) Terapéutico</option>
                <option value="Psiquiatria">Psiquiatría</option>
                <option value="Medico">Médico</option>
                <option value="Director(a) General">Director(a) General</option>
                <option value="Administrador">Administrador</option>
            </select>
            <label>PIN Personal:</label>
            <input type="password" id="pinP" style="text-align:center; font-size:28px; letter-spacing:10px;" maxlength="4" autofocus>
        `;
        window.abrirModal("🔒 VALIDACIÓN DE FIRMA", h, async () => {
            const rSel = document.getElementById('rolP').value;
            const pSel = document.getElementById('pinP').value;
            const q = query(collection(db, "talento_humano_cifrado"));
            const snap = await getDocs(q);
            let profMatch = null;

            snap.forEach(d => {
                const data = d.data();
                if (data.info && data.info.pin) {
                    const pinReal = descifrarAdmin(data.info.pin);
                    const carReal = descifrarAdmin(data.info.car);
                    if (pinReal === pSel && carReal === rSel) profMatch = data;
                }
            });

            if (profMatch) {
                if (profMatch.estado === "INACTIVO") return alert("Acceso Revocado.");
                window.cerrarModal();
                sessionStorage.setItem("pNom", descifrarAdmin(profMatch.info.n));
                sessionStorage.setItem("pTP", descifrarAdmin(profMatch.info.tp || ""));
                if (accion === 'registro') { document.getElementById('areaRegistro').style.display='block'; activarCamara(); }
                if (accion === 'historial') cargarHistorial();
            } else {
                alert("❌ PIN o CARGO incorrectos.");
            }
        });
    };

    window.abrirModal = (tit, html, func) => {
        document.getElementById('modalTit').innerText = tit;
        document.getElementById('modalCuerpo').innerHTML = html;
        document.getElementById('btnModalOk').onclick = func;
        document.getElementById('modalMaestro').style.display = 'block';
    };
    window.cerrarModal = () => document.getElementById('modalMaestro').style.display = 'none';

    async function activarCamara() {
        try {
            streamCam = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            document.getElementById('video').srcObject = streamCam;
        } catch(e) { console.log("Cámara no activa."); }
    }

    window.tomarFoto = () => {
        const v = document.getElementById('video'), c = document.getElementById('canvas');
        c.width = v.videoWidth; c.height = v.videoHeight;
        c.getContext('2d').drawImage(v, 0, 0);
        fotoData = c.toDataURL('image/jpeg', 0.6);
        document.getElementById('imgPreview').src = fotoData;
        document.getElementById('imgPreview').style.display = 'block';
        v.style.display = 'none';
    };

    window.guardarTodoMaestro = async () => {
        const hce = {
            m: document.getElementById('fMotivo').value,
            e: document.getElementById('fEnfermedad').value,
            a: document.getElementById('fAntecedentes').value,
            ex: document.getElementById('fExamen').value,
            p: document.getElementById('fPlan').value
        };
        await addDoc(collection(db, "evoluciones_psicologicas"), {
            idPaciente, dataHCE: cifrar(JSON.stringify(hce)), foto: fotoData,
            autor: cifrar(sessionStorage.getItem("pNom")), tp: cifrar(sessionStorage.getItem("pTP")),
            fecha: new Date().toLocaleString(), timestamp: serverTimestamp(),
            hash: btoa(hce.m + Date.now()).substring(0,12)
        });
        alert("Expediente Sellado."); location.reload();
    };

    async function cargarHistorial() {
        const q = query(collection(db, "evoluciones_psicologicas"), where("idPaciente", "==", idPaciente), orderBy("timestamp", "desc"));
        const snap = await getDocs(q);
        let h = "";
        snap.forEach(d => {
            const dat = d.data();
            const c = JSON.parse(descifrarClinico(dat.dataHCE));
            h += `<div class="evolucion-card"><strong>📅 ${dat.fecha}</strong><p>Motivo: ${c.m}</p><small>Por: ${descifrarClinico(dat.autor)}</small></div>`;
        });
        document.getElementById('contenedorHistorial').innerHTML = h || "No hay registros.";
    }

    const snapP = await getDoc(doc(db, "pacientes", idPaciente));
    if(snapP.exists()) document.getElementById('nombrePaciente').innerText = "EXPEDIENTE: " + snapP.data().nombre.toUpperCase();
</script>
</body>
</html>
