<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestión - Inicio</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; display: flex; flex-direction: column; align-items: center; }
        
        /* Barra Superior */
        .header { background: #2c3e50; color: white; width: 100%; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
        .btn-exit { background: #e74c3c; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; text-decoration: none; font-weight: bold; font-size: 14px; }

        /* Botón de Registro Destacado */
        .main-action { margin: 30px 0; width: 90%; max-width: 400px; }
        .btn-registro { 
            width: 100%; background: #27ae60; color: white; border: none; padding: 20px; 
            font-size: 18px; font-weight: bold; border-radius: 50px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(39, 174, 96, 0.4); transition: 0.3s;
        }
        .btn-registro:hover { transform: scale(1.03); background: #219150; }

        /* Cuadrícula de Opciones */
        .menu-grid { 
            display: grid; grid-template-columns: repeat(2, 1fr); 
            gap: 20px; width: 90%; max-width: 450px; 
        }
        .menu-item { 
            background: white; padding: 35px 10px; border-radius: 15px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.05); text-align: center; 
            cursor: pointer; transition: 0.2s; border-bottom: 5px solid;
        }
        .menu-item:hover { transform: translateY(-5px); box-shadow: 0 6px 12px rgba(0,0,0,0.1); }
        .menu-item h3 { margin: 0; font-size: 16px; color: #34495e; }

        /* Colores de las secciones */
        .libros { border-color: #f1c40f; } 
        .historias { border-color: #3498db; }
        .ingresos { border-color: #e67e22; }
        .admin { border-color: #95a5a6; }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin:0; font-size: 18px;">💾 Sistema de Gestión</h2>
    <button id="logout" class="btn-exit">Cerrar Sesión</button>
</div>

<div class="main-action">
    <button id="btn-registro" class="btn-registro" onclick="window.location.href='registro.html'">
        ➕ AGREGAR PACIENTE
    </button>
</div>

<div class="menu-grid">
   <div id="item-libros" class="menu-item libros" onclick="window.location.href='libros.html'">
        <h3>📚 Libros</h3>
    </div>

    <div class="menu-item historias" onclick="window.location.href='historias.html?v=' + Date.now()">
        <h3>📋 Historias Clínicas</h3>
    </div>

    <div class="menu-item ingresos" onclick="window.location.href='ingresos.html'">
        <h3>📝 Libro de Ingresos</h3>
    </div>

    <div id="item-admin" class="menu-item admin" onclick="window.location.href='administracion.html'">
        <h3>⚙️ Administración</h3>
    </div>
</div>

<script>
    // 1. VALIDACIÓN DE SEGURIDAD (Mano Dura)
    // Si no está autenticado, lo devuelve al login inmediatamente
    if (sessionStorage.getItem('autenticado') !== 'true') {
        window.location.href = 'login.html';
    }

    // 2. LÓGICA DE ROLES (Ocultar botones)
    const rol = sessionStorage.getItem('rolActivo');

    document.addEventListener("DOMContentLoaded", function() {
        // Roles asistenciales: No ven Libros ni Administración
        if (rol === 'psicologia' || rol === 'terapeuta') {
            document.getElementById('item-libros').style.display = 'none';
            document.getElementById('item-admin').style.display = 'none';
            
            // Si el terapeuta tampoco debe registrar pacientes, descomenta la línea de abajo:
            // document.getElementById('btn-registro').style.display = 'none';
        }

        // Director Terapéutico: No ve Administración del sistema
        if (rol === 'director_terapeutico') {
            document.getElementById('item-admin').style.display = 'none';
        }
    });

    // 3. FUNCIÓN DE CERRAR SESIÓN
    document.getElementById('logout').addEventListener('click', function() {
        if(confirm("¿Seguro que desea cerrar la sesión actual?")) {
            sessionStorage.clear(); // Limpia toda la seguridad
            window.location.href = 'login.html'; // Expulsa a la puerta
        }
    });
</script>

</body>
</html>
