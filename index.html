<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Caminos Nuevos</title>
    <!-- 1. CARGAMOS FIREBASE DE FORMA SIMPLE (SIN IMPORTS) -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>

    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f7f6; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        video { width: 100%; border-radius: 10px; background: #000; margin-bottom: 10px; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; font-size: 16px; }
        button { background: #27ae60; color: white; border: none; font-weight: bold; cursor: pointer; }
        #btnCapturar { background: #2980b9; }
        canvas { display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>Registro de Paciente</h2>
    <input type="text" id="nombreP" placeholder="Nombre completo">
    <video id="video" autoplay playsinline></video>
    <button id="btnCapturar">📸 TOMAR FOTO</button>
    <button id="btnGuardar">🚀 GUARDAR Y CREAR CARPETAS</button>
    <canvas id="canvas"></canvas>
</div>

<script>
    // 2. CONFIGURACIÓN
    const firebaseConfig = {
        apiKey: "AIzaSyC78y2K4T9rMFMVsG_UQxTmPANzV7Yapf8",
        authDomain: "://firebaseapp.com",
        projectId: "caminosnuevosdatabase",
        storageBucket: "caminosnuevosdatabase.firebasestorage.app",
        appId: "1:907500835423:web:f50b459a84f5d7d92a81ea"
    };

    // Inicializar Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let fotoBase64 = null;

    // 3. ENCENDER CÁMARA
    const video = document.getElementById('video');
    navigator.mediaDevices.getUserMedia({ video: true })
        .then(stream => { video.srcObject = stream; })
        .catch(err => alert("Error: Activa la cámara en el candado de la URL"));

    // 4. TOMAR FOTO
    document.getElementById('btnCapturar').onclick = function() {
        const canvas = document.getElementById('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        fotoBase64 = canvas.toDataURL('image/jpeg', 0.5);
        alert("✅ Foto capturada con éxito");
    };

    // 5. GUARDAR Y CREAR CARPETAS
    document.getElementById('btnGuardar').onclick = async function() {
        const nombre = document.getElementById('nombreP').value;
        if(!nombre || !fotoBase64) return alert("Falta el nombre o la foto");

        this.innerText = "⏳ Guardando...";
        this.disabled = true;

        try {
            // Guardar paciente
            const res = await db.collection("pacientes").add({
                nombre: nombre,
                foto: fotoBase64,
                fecha: new Date().toLocaleString()
            });

            // Crear las 3 carpetas automáticamente
            const carpetas = ["Clinica", "Terapeutica", "Psicologica"];
            for (let c of carpetas) {
                await db.collection("pacientes").doc(res.id).collection("carpetas").doc(c).set({
                    creado: true,
                    fecha: new Date().toISOString()
                });
            }

            alert("🚀 ¡TODO GUARDADO! Paciente y carpetas listas.");
            location.reload();
        } catch(e) {
            alert("Error: " + e.message);
            this.innerText = "🚀 GUARDAR Y CREAR CARPETAS";
            this.disabled = false;
        }
    };
</script>
</body>
</html>
