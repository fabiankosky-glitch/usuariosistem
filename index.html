<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caminos Nuevos - Sistema</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f4f7f6; }
        .card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        video { width: 100%; border-radius: 10px; background: #000; }
        button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; color: white; }
        #btnCapturar { background: #2980b9; }
    </style>
</head>
<body>

<div class="card">
    <h2>Registro de Paciente</h2>
    <video id="video" autoplay playsinline></video>
    <button id="btnCapturar">📸 PROBAR CÁMARA</button>
    <canvas id="canvas" style="display:none;"></canvas>
</div>

<script>
    const video = document.getElementById('video');

    // ESTO ENCIENDE LA CÁMARA SIN ERRORES DE FIREBASE
    navigator.mediaDevices.getUserMedia({ video: true })
        .then(stream => { 
            video.srcObject = stream; 
            console.log("Cámara encendida");
        })
        .catch(err => {
            alert("Error: Dale permiso a la cámara en el candado de arriba.");
        });

    document.getElementById('btnCapturar').onclick = () => {
        alert("¡Botón funcionando! La cámara está lista.");
    };
</script>
</body>
</html>
