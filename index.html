<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caminos Nuevos - Sistema</title>
    <style>
        :root { --primary: #2c3e50; --success: #27ae60; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; }
        video { width: 100%; border-radius: 10px; background: #000; margin-bottom: 10px; }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; }
        button { background: var(--success); color: white; border: none; font-weight: bold; cursor: pointer; }
        #btnCapturar { background: #2980b9; }
        canvas { display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>Registro de Paciente</h2>
    <input type="text" id="nombreP" placeholder="Nombre completo">
    <video id="video" autoplay playsinline></video>
    <button id="btnCapturar">📸 Tomar Foto</button>
    <button id="btnGuardar">🚀 Guardar en la Nube</button>
    <canvas id="canvas"></canvas>
</div>

<script type="module">
    // URLs CORREGIDAS PARA QUE NO DEN ERROR DE CORS
import { initializeApp } from "https://gstatic.com.js";
import { getFirestore, collection, addDoc, doc, setDoc } from "https://gstatic.com.js";
    const firebaseConfig = {
        apiKey: "AIzaSyC78y2K4T9rMFMVsG_UQxTmPANzV7Yapf8",
        authDomain: "://firebaseapp.com",
        projectId: "caminosnuevosdatabase",
        storageBucket: "caminosnuevosdatabase.firebasestorage.app",
        messagingSenderId: "907500835423",
        appId: "1:907500835423:web:f50b459a84f5d7d92a81ea"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let fotoBase64 = null;

    const video = document.getElementById('video');

    // Iniciar cámara automáticamente
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
        .then(stream => { video.srcObject = stream; })
        .catch(err => alert("Error: Activa el permiso de cámara en el candado de arriba."));

    // Lógica del Botón Capturar
    document.getElementById('btnCapturar').addEventListener('click', () => {
        const canvas = document.getElementById('canvas');
        canvas.width = video.videoWidth; 
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        fotoBase64 = canvas.toDataURL('image/jpeg', 0.6); 
        alert("✅ Foto lista para guardar");
    });

    // Lógica del Botón Guardar
    document.getElementById('btnGuardar').addEventListener('click', async () => {
        const nombre = document.getElementById('nombreP').value;
        if(!nombre || !fotoBase64) return alert("Escribe el nombre y toma la foto");

        try {
            const docRef = await addDoc(collection(db, "pacientes"), {
                nombre: nombre,
                foto: fotoBase64,
                fecha: new Date().toLocaleString()
            });

            const carpetas = ["Clinica", "Terapeutica", "Psicologica"];
            for (let c of carpetas) {
                await setDoc(doc(db, `pacientes/${docRef.id}/carpetas`, c), { creado: true });
            }

            alert("🚀 ¡DATOS GUARDADOS EN FIREBASE!");
            location.reload(); 
        } catch (e) {
            alert("Error: " + e.message);
        }
    });
</script>
</body>
</html>
